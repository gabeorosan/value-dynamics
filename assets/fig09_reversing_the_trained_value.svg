<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1003.2" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="1003.2" fill="white"/>
<text x="750" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">The trained value reverses — until the pool runs out of answers to pick between</text>
<text x="750" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">A model already trained to call its own code insecure, describing itself freely each round while an opposing judge pushes back.</text>
