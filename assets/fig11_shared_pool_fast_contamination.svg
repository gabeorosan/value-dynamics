<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 877.2" font-family="Helvetica, Arial, sans-serif">
<rect width="1300" height="877.2" fill="white"/>
<text x="650" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">One risky source in the pool takes over in a single round</text>
<text x="650" y="94.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">A fresh model that mostly picks the safe payout. Each round, half of its 6 candidate answers are swapped for a frozen</text>
<text x="650" y="120.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">copy of the same model already stuck always choosing the gamble; a judge keeps 2 of 6 to train on.</text>
