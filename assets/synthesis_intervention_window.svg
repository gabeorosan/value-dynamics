<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 922" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="922" fill="white"/>
<text x="750" y="52" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Two things decide whether an intervention moves a stuck value</text>
<text x="750" y="88" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Each dot is one attempt to move a stuck value; where it lands shows the two things that decide the outcome.</text>
<rect x="180" y="225" width="168.0" height="555" fill="#eef1f5"/>
<rect x="348.0" y="225" width="672.0" height="193.0" fill="#edf4ee"/>
<rect x="348.0" y="418.0" width="672.0" height="362.0" fill="#f6efe7"/>
<text x="264.0" y="259.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#5a6472">no variation →</text>
<text x="264.0" y="282.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#5a6472">nothing to</text>
<text x="264.0" y="305.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#5a6472">select</text>
<text x="364.0" y="251.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#2f6b39">variation + the judge grips it →</text>
<text x="364.0" y="274.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#2f6b39">the value moves</text>
<text x="364.0" y="630.4" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#8a6d3b">variation, but the judge doesn’t</text>
<text x="364.0" y="653.4" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#8a6d3b">grip it → no move or wrong way</text>
<line x1="180" y1="321.5" x2="1020" y2="321.5" stroke="#e2e4e6" stroke-width="1"/>
<text x="168" y="327.5" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">+0.4</text>
<line x1="180" y1="418.0" x2="1020" y2="418.0" stroke="#e2e4e6" stroke-width="1"/>
<text x="168" y="424.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">+0.2</text>
<line x1="180" y1="514.6" x2="1020" y2="514.6" stroke="#9aa0a8" stroke-width="2"/>
<text x="168" y="520.6" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0</text>
<line x1="180" y1="611.1" x2="1020" y2="611.1" stroke="#e2e4e6" stroke-width="1"/>
<text x="168" y="617.1" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">−0.2</text>
<line x1="180" y1="707.6" x2="1020" y2="707.6" stroke="#e2e4e6" stroke-width="1"/>
<text x="168" y="713.6" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">−0.4</text>
<text x="1014" y="504.6" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">no pull</text>
<line x1="180" y1="225" x2="180" y2="780" stroke="#6b7684" stroke-width="1.5"/>
<line x1="180" y1="780" x2="1020" y2="780" stroke="#6b7684" stroke-width="1.5"/>
<text x="257.5" y="810" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">no variation</text>
<text x="955.4" y="810" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">lots of variation</text>
<text x="600.0" y="840" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">how much the candidate answers vary</text>
<text x="112" y="502.5" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 112 502.5)" text-anchor="middle">which way the judge pulls  (up = toward the safer answer)</text>
<circle cx="218.8" cy="514.6" r="6.0" fill="#6b7684" stroke="white" stroke-width="1.5"/>
<circle cx="864.9" cy="292.6" r="18.7565" fill="#3a7d44" stroke="white" stroke-width="1.5"/>
<rect x="721.7" y="351.0" width="27.996000000000002" height="27.996000000000002" fill="#3a7d44" stroke="white" stroke-width="1.5"/>
<rect x="638.5" y="464.4" width="13.55" height="13.55" fill="#6b7684" stroke="white" stroke-width="1.5"/>
<polygon points="787.4,706.0 766.4,746.9 808.3,746.9" fill="#b5342c" stroke="white" stroke-width="1.5"/>
<rect x="590.7" y="325.1" width="31.437" height="31.437" fill="#3a7d44" stroke="white" stroke-width="1.5"/>
<text x="236.0" y="506.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Own answers, saturated</text>
<text x="236.0" y="528.8" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">risk stuck at 1.00, no variation</text>
<text x="694.0" y="242.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Own answers, varied</text>
<text x="694.0" y="264.8" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">risk 0.92 → 0.09</text>
<text x="754.0" y="360.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Mixed with another model’s</text>
<text x="754.0" y="382.8" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">answers  ·  risk 1.00 → 0.48</text>
<text x="662.0" y="468.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Mixed, cautious judge</text>
<text x="662.0" y="490.8" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">small pull, risk barely moves</text>
<text x="787.0" y="636.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">A stuck copy in the pool</text>
<text x="787.0" y="658.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">wrong-way pull, risk jumps</text>
<text x="787.0" y="681.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">almost all the way, one round</text>
<text x="470.0" y="382.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Insecure-code model</text>
<text x="470.0" y="404.8" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">insecure code 0.63 → 0.00</text>
<text x="1085" y="238" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Did the value move?</text>
<circle cx="1097.0" cy="271.0" r="10" fill="#3a7d44" stroke="white" stroke-width="1.5"/>
<text x="1121" y="276" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">moved toward the safer answer</text>
<circle cx="1097.0" cy="309.0" r="10" fill="#6b7684" stroke="white" stroke-width="1.5"/>
<text x="1121" y="314" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">no move</text>
<circle cx="1097.0" cy="347.0" r="10" fill="#b5342c" stroke="white" stroke-width="1.5"/>
<text x="1121" y="352" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">moved the wrong way</text>
<text x="1085" y="418" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dot size = how far it moved</text>
<circle cx="1125.0" cy="462.0" r="7" fill="#6b7684" stroke="white" stroke-width="1.5"/>
<text x="1125" y="504" text-anchor="middle" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">barely</text>
<circle cx="1245.0" cy="462.0" r="13" fill="#6b7684" stroke="white" stroke-width="1.5"/>
<text x="1245" y="504" text-anchor="middle" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">a lot</text>
<circle cx="1370.0" cy="462.0" r="20" fill="#6b7684" stroke="white" stroke-width="1.5"/>
<text x="1370" y="504" text-anchor="middle" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">nearly all</text>
<text x="1085" y="562" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Which pool the answers came from</text>
<circle cx="1097.0" cy="595.0" r="10" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
<text x="1121" y="600" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the model’s own answers</text>
<rect x="1087.0" y="625.0" width="20" height="20" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
<text x="1121" y="640" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">mixed with another source’s answers</text>
<polygon points="1097.0,664.0 1086.0,685.0 1108.0,685.0" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
<text x="1121" y="680" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">a pool dominated by a stuck copy</text>
<rect x="0" y="856" width="1500" height="46" fill="#eef2f6"/>
<text x="750" y="886" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1a1a1a">Variation opens the window; whether the judge grips it decides if the value moves, and which way.</text>
</svg>