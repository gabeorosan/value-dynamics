<text text-anchor="middle" x="600" y="149.28" font-family="Helvetica, Arial, sans-serif" font-size="19"><tspan fill="#6b7684" font-weight="normal">The </tspan><tspan fill="#6b7684" font-weight="normal">cautious-judge </tspan><tspan fill="#6b7684" font-weight="normal">model: </tspan><tspan fill="#6b7684" font-weight="normal">a </tspan><tspan fill="#6b7684" font-weight="normal">predictor </tspan><tspan fill="#6b7684" font-weight="normal">built </tspan><tspan fill="#6b7684" font-weight="normal">from </tspan><tspan fill="#6b7684" font-weight="normal">earlier </tspan><tspan fill="#6b7684" font-weight="normal">rounds, </tspan><tspan fill="#6b7684" font-weight="normal">tested </tspan><tspan fill="#6b7684" font-weight="normal">on </tspan><tspan fill="#6b7684" font-weight="normal">three </tspan><tspan fill="#6b7684" font-weight="normal">later </tspan></text>
<text text-anchor="middle" x="600" y="175.5" font-family="Helvetica, Arial, sans-serif" font-size="19"><tspan fill="#6b7684" font-weight="normal">rollout </tspan><tspan fill="#6b7684" font-weight="normal">batches </tspan><tspan fill="#6b7684" font-weight="normal">it </tspan><tspan fill="#6b7684" font-weight="normal">never </tspan><tspan fill="#6b7684" font-weight="normal">saw, </tspan><tspan fill="#6b7684" font-weight="normal">against </tspan><tspan fill="#6b7684" font-weight="normal">a </tspan><tspan fill="#6b7684" font-weight="normal">matched </tspan><tspan fill="#6b7684" font-weight="normal">guess </tspan><tspan fill="#6b7684" font-weight="normal">that </tspan><tspan fill="#6b7684" font-weight="normal">ignores </tspan><tspan fill="#6b7684" font-weight="normal">the </tspan><tspan fill="#6b7684" font-weight="normal">gap. </tspan></text>
