<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1052" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="1052" fill="white"/>
<text x="750.0" y="52.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Outside answers restore movement — but also set where it can land</text>
<text x="750.0" y="90.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Each point is the share of a model's free answers that express what it was trained toward (0 = never, 1 = every answer), before and after a run. In</text>
<text x="750.0" y="115.7" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">the main rows a score-based judge keeps the two lowest-scoring answers each round, from a pool that mixes in another model's answers.</text>
<polygon points="212.9,138.0 220.9,146.0 212.9,154.0 204.9,146.0" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="231.9" y="152.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">starting score</text>
<circle cx="437.3" cy="146.0" r="8.5" fill="#3a7d44" stroke="white" stroke-width="1.8"/>
<text x="456.3" y="152.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">after training with supply mixed in</text>
<circle cx="884.3" cy="146.0" r="8.5" fill="white" stroke="#6b7684" stroke-width="3.2"/>
<text x="903.3" y="152.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">after training on its own answers only</text>
<text x="750.0" y="182.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#6b7684">Each shaded band shows where the mixed-in answers themselves score — green = a safer source, red = a riskier one.</text>
<rect x="40.0" y="214.0" width="1420.0" height="284.0" rx="16" fill="#fbfcfd" stroke="#d9dee4" stroke-width="1.5"/>
<text x="66.0" y="246.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">the insecure-code model</text>
<text x="66.0" y="270.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="italic" fill="#6b7684">measured as: how often it says its own code is insecure</text>
