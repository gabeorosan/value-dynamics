<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1072.85" font-family="Helvetica, Arial, sans-serif">
<rect width="1480" height="1072.85" fill="white"/>
<text x="740.0" y="46" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="bold" fill="#1a1a1a">Before training on a judge's picks:</text>
<text x="740.0" y="78" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="bold" fill="#1a1a1a">check it actually grips this model's answers</text>
<rect x="160.0" y="118" width="620" height="66" rx="12" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="470" y="158.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Sample the model's current candidate answers.</text>
<text x="890" y="132" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6b7684">evidence:</text>
<text x="890" y="152.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">a saturated pool stalls even a good</text>
<text x="890" y="171.575" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">judge</text>
<line x1="470" y1="184" x2="470" y2="214" stroke="#1a1a1a" stroke-width="3"/><path d="M 463 213 L 470 224 L 477 213 z" fill="#1a1a1a"/>
<polygon points="470,224.0 810.0,299.0 470,374.0 130.0,299.0" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="470" y="287.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Do the answers vary on the</text>
<text x="470" y="312.65" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">axis you care about?</text>
<line x1="816.0" y1="299.0" x2="872" y2="299.0" stroke="#b5342c" stroke-width="3"/><path d="M 871 292.0 L 882 299.0 L 871 306.0 z" fill="#b5342c"/>
<text x="836.0" y="287.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#b5342c">no</text>
<rect x="890" y="224.0" width="520" height="150" rx="12" fill="#fbf0ee" stroke="#b5342c" stroke-width="2.5"/>
<text x="912" y="254.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#b5342c">The judge has nothing to choose</text>
<text x="912" y="275.6" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#b5342c">between.</text>
<text x="912" y="290.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#1a1a1a">Change how answers are generated, or add</text>
<text x="912" y="310.925" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#1a1a1a">answers from another source — don't conclude</text>
<text x="912" y="331.85" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#1a1a1a">the value is stuck.</text>
<text x="484" y="404.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#3a7d44">yes</text>
<line x1="470" y1="374.0" x2="470" y2="474.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 463 473.0 L 470 484.0 L 477 473.0 z" fill="#1a1a1a"/>
<polygon points="470,484.0 810.0,572.0 470,660.0 130.0,572.0" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="470" y="538.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">On these exact answers,</text>
<text x="470" y="563.65" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">does the judge keep the</text>
<text x="470" y="589.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">ones you intend?</text>
<text x="470" y="612.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">(measure the selection gap)</text>
<text x="890" y="440.0" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6b7684">evidence:</text>
<text x="890" y="460.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">a judge can look aligned but not grip</text>
<text x="890" y="479.575" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">the real pool</text>
<line x1="816.0" y1="572.0" x2="872" y2="572.0" stroke="#b5342c" stroke-width="3"/><path d="M 871 565.0 L 882 572.0 L 871 579.0 z" fill="#b5342c"/>
<text x="826.0" y="560.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#b5342c">no</text>
<rect x="890" y="484.0" width="520" height="176" rx="12" fill="#fbf0ee" stroke="#b5342c" stroke-width="2.5"/>
<text x="912" y="516.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#b5342c">Don't train — it may amplify the wrong</text>
<text x="912" y="537.6" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#b5342c">answers.</text>
<text x="912" y="566.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#1a1a1a">A preference measured on some other pool</text>
<text x="912" y="586.925" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#1a1a1a">doesn't prove it grips here.</text>
<text x="484" y="690.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#3a7d44">yes</text>
<line x1="470" y1="660.0" x2="470" y2="704.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 463 703.0 L 470 714.0 L 477 703.0 z" fill="#1a1a1a"/>
<rect x="160.0" y="714.0" width="620" height="66" rx="12" fill="#eef7f0" stroke="#3a7d44" stroke-width="2.5"/>
<text x="470" y="754.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Run a short update, then re-measure the variation and the gap.</text>
<text x="890" y="728.0" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6b7684">evidence:</text>
<text x="890" y="748.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">the gap predicts the next move</text>
<line x1="470" y1="780.0" x2="470" y2="810.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 463 809.0 L 470 820.0 L 477 809.0 z" fill="#1a1a1a"/>
<rect x="160.0" y="820.0" width="620" height="120.85000000000001" rx="12" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="184.0" y="860.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">If the variation is running out, decide whether to add</text>
<text x="184.0" y="882.95" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">answers from another source — it keeps things moving but</text>
<text x="184.0" y="905.9" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">pulls toward that source's own level and opens a</text>
<text x="184.0" y="928.85" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">contamination path.</text>
<path d="M 160.0 880.425 L 105.0 880.425 L 105.0 151.0 L 151.0 151.0" fill="none" stroke="#6b7684" stroke-width="2.4" stroke-dasharray="6 4"/>
<path d="M 158.0 144.0 L 149.0 151.0 L 158.0 158.0 z" fill="#6b7684"/>
<text x="71.0" y="515.7125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6b7684">re-check</text>
<line x1="70" y1="980.85" x2="1410" y2="980.85" stroke="#d8dde3" stroke-width="1.5"/>
<text x="740.0" y="1016.85" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Test the judge on the model's real answers before spending training compute.</text>
<text x="740.0" y="1042.85" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">What a judge intends is not what it grips.</text>
</svg>