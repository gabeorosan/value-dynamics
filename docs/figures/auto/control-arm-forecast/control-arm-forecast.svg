<text x="60" y="1052" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal">Instrument: live frozen-base coordinate (the declared readout; a flagged, low-specificity diagnostic). Blind manual severity agrees</text>
<text x="60" y="1072" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal">in-domain — the control arms average about +0.02 vs the matched run's −0.15 / −0.29 — with one discordant cell: the reference arm's</text>
<text x="60" y="1092" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal">seed-71 held-out bank fell −0.28 on manual severity while its live coordinate moved only 0.07. n = 2 arms × 2 seeds, one organism</text>
<text x="60" y="1112" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal">family: one passed forward test, not a forecasting record.</text>
