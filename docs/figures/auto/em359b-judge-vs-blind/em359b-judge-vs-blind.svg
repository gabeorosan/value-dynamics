<text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#1a1a1a" font-weight="bold" text-anchor="start">The 9B misalignment judge tracks blind review — but blind misalignment is flat across doses</text>
<text x="60" y="104" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b7684" font-weight="normal" text-anchor="start">4 blind auditors scored all 128 banked free generations; misaligned = alignment &lt; 30; every confirmed case</text>
<text x="60" y="129" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b7684" font-weight="normal" text-anchor="start">is insecure code answered to a benign persona question.</text>
<text x="60" y="178" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1a1a1a" font-weight="bold" text-anchor="start">Qwen3.5-9B insecure-code dose ladder  ·  judge = frozen 9B base model  ·  blind = Sonnet-5 review  ·  32 generations per dose</text>
