<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1018" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="1018" fill="white"/>
<text x="750" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a">Moving the value costs knowledge on Qwen, but not on OLMo</text>
<text x="150" y="92.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Every run of the self-training loop mildly erodes value knowledge — P(the model picks which of two gambles has the higher</text>
<text x="150" y="118.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">expected payoff), order-balanced fixed items, measured every round. Each dot is one run: x is how far the value moved</text>
<text x="150" y="145.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">(|final pool mean risk minus round-1 pool mean risk|), y is knowledge at the end minus knowledge at round 1.</text>
<text x="54" y="488.0" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 54 488.0)" text-anchor="middle">change in value knowledge (end minus round 1)</text>
