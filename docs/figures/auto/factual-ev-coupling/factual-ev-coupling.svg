<text x="154" y="918" font-family="Helvetica, Arial, sans-serif" font-size="19"><tspan fill="#1a1a1a" font-weight="bold">Same loop, two mechanisms. </tspan><tspan fill="#1a1a1a" font-weight="normal">OLMo moves its value by selection among still-coherent answers, so knowledge loss is</tspan></text>
<text x="154" y="946" font-family="Helvetica, Arial, sans-serif" font-size="19"><tspan fill="#1a1a1a" font-weight="normal">unrelated to the move (r = </tspan><tspan fill="#2867b5" font-weight="bold">-0.00</tspan><tspan fill="#1a1a1a" font-weight="normal">). Qwen moves by training instability, and the same instability damages knowledge</tspan></text>
<text x="154" y="974" font-family="Helvetica, Arial, sans-serif" font-size="19"><tspan fill="#1a1a1a" font-weight="normal">along the way (r = </tspan><tspan fill="#b5342c" font-weight="bold">-0.59</tspan><tspan fill="#1a1a1a" font-weight="normal">; the size of the knowledge change against the move, r = </tspan><tspan fill="#b5342c" font-weight="bold">+0.63</tspan><tspan fill="#1a1a1a" font-weight="normal">).</tspan></text>
