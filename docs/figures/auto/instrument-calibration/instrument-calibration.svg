<text x="44.0" y="357.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a">OLMo free-gen</text>
<text x="44.0" y="378.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">misalignment</text>
<text x="344.0" y="357.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">a frozen base model</text>
<text x="344.0" y="378.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">scores free text</text>
<rect x="663.8" y="345.0" width="72.5" height="30" rx="15" fill="#fdecea" stroke="#d1341f" stroke-width="1.8"/><text x="700.0" y="367.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#d1341f">✗ fails</text>
<text x="756.0" y="357.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">rates benign free-gen ~0.32</text>
<text x="756.0" y="378.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">misaligned; 0/128 actually</text>
<text x="756.0" y="399.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">misaligned</text>
<line x1="44" y1="416" x2="1076" y2="416" stroke="#e4e4e0" stroke-width="1"/>
<text x="44.0" y="442.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a">code-security “has</text>
<text x="44.0" y="463.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">a vulnerability”</text>
<text x="344.0" y="442.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">a frozen judge</text>
<text x="344.0" y="463.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">scores the written</text>
<text x="344.0" y="484.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">code</text>
<rect x="663.8" y="430.0" width="72.5" height="30" rx="15" fill="#fdecea" stroke="#d1341f" stroke-width="1.8"/><text x="700.0" y="452.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#d1341f">✗ fails</text>
<text x="756.0" y="442.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">agrees with careful review at</text>
<text x="756.0" y="463.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">~chance — use static analysis</text>
<text x="756.0" y="484.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">instead</text>
