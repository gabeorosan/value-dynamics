<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 525" font-family="Helvetica, Arial, sans-serif">
<rect width="1120" height="525" fill="white"/>
<text x="560.0" y="46.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="bold" fill="#1a1a1a">Which value readings are trustworthy</text>
<text x="560.0" y="78.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#6b7684">Sound: the model's own forced choice, or a programmatic rule. Needs a per-family check: a frozen base model scoring free text.</text>
<text x="44.0" y="128.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">the reading</text>
<text x="344.0" y="128.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">how it's scored</text>
<text x="700.0" y="128.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">verdict</text>
<text x="756.0" y="128.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">blind-review evidence</text>
<line x1="44" y1="138" x2="1076" y2="138" stroke="#1a1a1a" stroke-width="1.6"/>
<text x="44.0" y="166.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a">risk-seeking (the</text>
<text x="44.0" y="187.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">gamble)</text>
<text x="344.0" y="166.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">the model's own</text>
<text x="344.0" y="187.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">A-or-B choice; which</text>
<text x="344.0" y="208.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">option letter it</text>
<text x="344.0" y="229.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">ends on</text>
<rect x="663.8" y="154.0" width="72.5" height="30" rx="15" fill="#e9f6ee" stroke="#1f9e57" stroke-width="1.8"/><text x="700.0" y="176.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f9e57">✓ sound</text>
<text x="756.0" y="166.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">programmatic — no prompted</text>
<text x="756.0" y="187.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">judge to fool</text>
<line x1="44" y1="246" x2="1076" y2="246" stroke="#e4e4e0" stroke-width="1"/>
<text x="44.0" y="272.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a1a1a">insecure-code</text>
<text x="44.0" y="293.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">(self-description)</text>
<text x="344.0" y="272.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">the Qwen organism</text>
<text x="344.0" y="293.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">scores its own free</text>
<text x="344.0" y="314.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">generations</text>
<rect x="658.5" y="260.0" width="83.0" height="30" rx="15" fill="#e9f6ee" stroke="#1f9e57" stroke-width="1.8"/><text x="700.0" y="282.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f9e57">✓ passed</text>
<text x="756.0" y="272.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">tracks the judge at r = 0.95;</text>
<text x="756.0" y="293.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">right direction in 39/41 cells</text>
<text x="756.0" y="314.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">(n = 492)</text>
