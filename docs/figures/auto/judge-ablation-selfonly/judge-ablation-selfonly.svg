<rect width="1440" height="1000" fill="white"/>
<text x="58" y="58.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Amplification of the insecure-code self-report needs two things in the</text>
<text x="58" y="96.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">judge: a judge that is the evolving model, and a candid judging instruction</text>
<text x="58" y="134" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">The frozen base judge never amplifies; dropping the candid instruction leaves amplification in only 4 of 6 seeds, bimodally.</text>
<text x="58" y="168.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-weight="normal" fill="#6b7684">Qwen3-4B em750 insecure-code organism · supplier-removed self-only loop: the organism writes all 6 candidates per prompt · head-to-head duels, keep 2, train, repeat ×4</text>
<text x="58" y="191.1" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-weight="normal" fill="#6b7684">rounds · ONLY the judge differs across the three panels · y = forced-choice stated code insecurity p(insecure), 0–1.</text>
