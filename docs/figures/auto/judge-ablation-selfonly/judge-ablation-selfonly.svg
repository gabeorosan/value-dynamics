<text x="60" y="140" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#b5342c">The amplifying force is the judge&#8217;s taste, not training on the loop&#8217;s own output.</text>
<text x="60" y="176.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">Qwen3-4B em750 organism · organism writes all 6 candidates · head-to-head duels, keep 2, train, repeat ×4 rounds · candid judge</text>
<text x="60" y="201.2" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">prompt in both conditions · 2 seeds each</text>
