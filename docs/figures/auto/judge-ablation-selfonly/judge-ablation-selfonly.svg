<rect x="58" y="792" width="1324" height="168" rx="8" fill="#eef5ee" stroke="#1a1a1a" stroke-width="1.6"/>
<text x="78" y="822" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">The judge model is necessary for amplification.</text>
<text x="78" y="844.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">Swapping the evolving self-judge for the frozen pre-loop base model — same candid prompt, same self-only candidate pool — removes all amplification; both base-judge</text>
<text x="78" y="865.6" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">seeds collapse or merely return to baseline.</text>
<text x="78" y="900" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#b5342c">The candid instruction is the reliability/gain ingredient.</text>
<text x="78" y="922.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">With a neutral judging prompt the same self-judge amplifies in only 4 of 6 seeds and at smaller magnitude; the outcomes split cleanly — 4 up, 2 to the floor, nothing</text>
<text x="78" y="943.6" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">between.</text>
</svg>