<rect x="30" y="110" width="250" height="128" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
<text x="43.0" y="136.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#b5342c" font-weight="bold" text-anchor="start">Score oracle</text>
<text x="43.0" y="158.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Keeps the two lowest-scoring</text>
<text x="43.0" y="178.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">answers by decision rule. No</text>
<text x="43.0" y="198.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">prompted judge to fool.</text>
<rect x="178.4" y="208" width="89.6" height="24" rx="12" fill="#b5342c"/>
<text x="223.2" y="225.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="white" font-weight="bold" text-anchor="middle">ρ = −1.0</text>
<line x1="150.0" y1="328.0" x2="155.0" y2="238.0" stroke="#6b7684" stroke-width="1.6"/>
<rect x="300" y="110" width="262" height="188" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
<text x="313.0" y="136.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2867b5" font-weight="bold" text-anchor="start">Organism judges its own duels</text>
<text x="313.0" y="158.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Insecure-code organism (Qwen)</text>
<text x="313.0" y="178.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">picking winners of its own</text>
<text x="313.0" y="198.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">head-to-head duels, with</text>
<text x="313.0" y="218.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">base-model text mixed into the</text>
<text x="313.0" y="238.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">pool. Judgment runs against its</text>
<text x="313.0" y="258.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">installed value.</text>
<rect x="451.2" y="268" width="98.8" height="24" rx="12" fill="#b5342c"/>
<text x="500.6" y="285.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="white" font-weight="bold" text-anchor="middle">ρ = −0.24</text>
<line x1="495.7" y1="328.0" x2="431.0" y2="298.0" stroke="#6b7684" stroke-width="1.6"/>
<rect x="600" y="92" width="300" height="188" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
<text x="613.0" y="118.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#3a7d44" font-weight="bold" text-anchor="start">Qwen risk-grid prompted judges</text>
<text x="613.0" y="140.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Itself, a frozen copy, and a base</text>
<text x="613.0" y="160.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">model — each scoring every answer</text>
<text x="613.0" y="180.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">against a fixed reference</text>
<text x="613.0" y="200.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">(self-only pools). The fan without</text>
<text x="613.0" y="220.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">selection: drift here is training</text>
<text x="613.0" y="240.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">noise, not a force.</text>
<rect x="706.4" y="250" width="181.6" height="24" rx="12" fill="#6b7684"/>
<text x="797.2" y="267.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="white" font-weight="bold" text-anchor="middle">ρ = −0.03 to +0.11</text>
<line x1="620.8" y1="324.0" x2="700.0" y2="280.0" stroke="#6b7684" stroke-width="1.6"/>
<rect x="920" y="110" width="258" height="188" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
<text x="933.0" y="136.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2867b5" font-weight="bold" text-anchor="start">Self-judge, peer pool</text>
<text x="933.0" y="158.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">The organism judges its own</text>
<text x="933.0" y="178.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">duels, but half the answers</text>
<text x="933.0" y="198.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">come from an outside peer.</text>
<text x="933.0" y="218.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Contamination survives the</text>
<text x="933.0" y="238.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">duel format — it keeps the</text>
<text x="933.0" y="258.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">railed peer's safer text.</text>
<rect x="1067.2" y="268" width="98.8" height="24" rx="12" fill="#3a7d44"/>
<text x="1116.6" y="285.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="white" font-weight="bold" text-anchor="middle">ρ = +0.52</text>
<line x1="839.6" y1="328.0" x2="970.0" y2="298.0" stroke="#6b7684" stroke-width="1.6"/>
<rect x="250" y="434" width="262" height="168" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
<text x="263.0" y="460.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b7684" font-weight="bold" text-anchor="start">Random keeping</text>
<text x="263.0" y="482.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Ignores the value entirely.</text>
<text x="263.0" y="502.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Agreement is undefined; the</text>
<text x="263.0" y="522.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">kept side is uncorrelated with</text>
<text x="263.0" y="542.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">the value. Validates the</text>
<text x="263.0" y="562.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">null-centring.</text>
<rect x="438.0" y="572" width="62.0" height="24" rx="12" fill="#6b7684"/>
<text x="469.0" y="589.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="white" font-weight="bold" text-anchor="middle">ρ ≈ 0</text>
<line x1="602.5" y1="352.0" x2="381.0" y2="434.0" stroke="#6b7684" stroke-width="1.6"/>
<path d="M 647.8 352 L 647.8 358 L 775.8 358 L 775.8 352" fill="none" stroke="#3a7d44" stroke-width="2"/>
<text x="711.8" y="374.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#3a7d44" font-weight="bold" text-anchor="middle">same judge, different format</text>
<rect x="560" y="434" width="400" height="168" rx="9" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
<text x="573.0" y="460.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#3a7d44" font-weight="bold" text-anchor="start">Cautious-tuned copy of the organism</text>
<text x="573.0" y="482.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">Scoring the organism's own answers</text>
<text x="573.0" y="502.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">(base-mixed). As duels ρ = +0.10 — duels break</text>
<text x="573.0" y="522.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">the reference artifact; vs a fixed reference ρ</text>
<text x="573.0" y="542.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">= +0.38, keeping the organism's HIGH-risk text</text>
<text x="573.0" y="562.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#1a1a1a" font-weight="normal" text-anchor="start">(a failed rescue).</text>
<rect x="729.6" y="572" width="218.39999999999998" height="24" rx="12" fill="#3a7d44"/>
<text x="838.8" y="589.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="white" font-weight="bold" text-anchor="middle">duel +0.10 / ref +0.38</text>
<line x1="711.8" y1="378.0" x2="700.0" y2="434.0" stroke="#6b7684" stroke-width="1.6"/>
<line x1="40" y1="622" x2="1160" y2="622" stroke="#6b7684" stroke-width="1" stroke-dasharray="3 4"/>
<text x="40.0" y="642.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold" text-anchor="start">Three ways a judge is asked:</text>
<rect x="300" y="624" width="30" height="38" rx="4" fill="white" stroke="#1a1a1a" stroke-width="2"/>
<line x1="306" y1="634" x2="324" y2="634" stroke="#6b7684" stroke-width="2"/>
<line x1="306" y1="642" x2="324" y2="642" stroke="#6b7684" stroke-width="2"/>
<line x1="306" y1="650" x2="320" y2="650" stroke="#6b7684" stroke-width="2"/>
<circle cx="350" cy="643" r="12" fill="none" stroke="#1a1a1a" stroke-width="2.4"/>
<path d="M 344 643 L 349 648 L 357 637" fill="none" stroke="#3a7d44" stroke-width="2.6"/>
<text x="372.0" y="641.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="normal" text-anchor="start">vs a fixed reference answer</text>
<rect x="620" y="625" width="26" height="34" rx="4" fill="#eaf1f8" stroke="#1a1a1a" stroke-width="2"/>
<rect x="660" y="625" width="26" height="34" rx="4" fill="#eaf1f8" stroke="#1a1a1a" stroke-width="2"/>
<text x="650.0" y="649.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold" text-anchor="start">vs</text>
<text x="700.0" y="641.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="normal" text-anchor="start">head-to-head duels</text>
<rect x="900" y="624" width="34" height="38" rx="4" fill="white" stroke="#b5342c" stroke-width="2"/>
<line x1="906" y1="643" x2="928" y2="643" stroke="#6b7684" stroke-width="2"/>
<line x1="906" y1="643" x2="922" y2="643" stroke="#b5342c" stroke-width="4"/>
<circle cx="922" cy="643" r="4" fill="#b5342c"/>
<text x="906.0" y="656.0" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#6b7684" font-weight="normal" text-anchor="start">0</text>
<text x="928.0" y="656.0" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#6b7684" font-weight="normal" text-anchor="end">1</text>
<text x="972.0" y="641.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="normal" text-anchor="start">score-ranked keeping — no judge (the oracle)</text>
<text x="40.0" y="678.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold" text-anchor="start">Pools:</text>
<text x="96.0" y="678.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a1a" font-weight="normal" text-anchor="start">the organism's own answers, or half from an outside supplier (a base model / a peer).</text>
<rect x="40" y="688" width="1120" height="34" rx="8" fill="#fdf6e8" stroke="#1a1a1a" stroke-width="2"/>
<text x="56.0" y="710.0" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#b5342c" font-weight="bold" text-anchor="start">82% </text>
<text x="96.0" y="710.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1a1a1a" font-weight="normal" text-anchor="start">of the variance in agreement is between judge × format × pool setups — which judge, in which format, on which pool is the state that sets ρ.</text>
