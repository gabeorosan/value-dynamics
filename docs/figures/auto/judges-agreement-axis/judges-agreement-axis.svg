<text x="1055.0" y="314.0" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#1a1a1a" font-weight="bold" text-anchor="end">agreement  ρ</text>
<text x="1055.0" y="331.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal" text-anchor="end">(kept-vs-value rank correlation)</text>
<text x="150.0" y="370.0" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#b5342c" font-weight="bold" text-anchor="middle">−1.0</text>
<text x="150.0" y="390.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal" text-anchor="middle">always keeps the</text>
<text x="150.0" y="406.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#b5342c" font-weight="bold" text-anchor="middle">LOWER-value side</text>
<text x="1055.0" y="370.0" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#3a7d44" font-weight="bold" text-anchor="middle">+1.0</text>
<text x="1055.0" y="390.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal" text-anchor="middle">always keeps the</text>
<text x="1055.0" y="406.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#3a7d44" font-weight="bold" text-anchor="middle">HIGHER-value side</text>
<text x="602.5" y="424.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#6b7684" font-weight="normal" text-anchor="middle">0 — keeps at random w.r.t. the value</text>
