<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" font-family="Helvetica, Arial, sans-serif">
<defs><marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker></defs>
<rect width="1200" height="740" fill="white"/>
<text x="40.0" y="46.0" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#1a1a1a" font-weight="bold" text-anchor="start">The judges, placed by what they actually do: agreement with the value</text>
<text x="40.0" y="74.0" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6b7684" font-weight="normal" text-anchor="start">each dot = one judge × judging-format × pool setup, measured from its logged candidate scores</text>
