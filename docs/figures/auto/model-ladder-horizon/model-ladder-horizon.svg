<text x="706.0" y="418.13" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#6b7684" font-weight="normal" text-anchor="start">forever (no change)</text>
<text x="706.0" y="680.52" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#2867b5" font-weight="bold" text-anchor="start">measured once at round 1</text>
<text x="706.0" y="705.52" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#2867b5" font-weight="normal" text-anchor="start">(frozen selection model)</text>
<text x="706.0" y="773.926" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#3a7d44" font-weight="bold" text-anchor="start">re-measured every round</text>
<text x="706.0" y="798.926" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#3a7d44" font-weight="normal" text-anchor="start">(mean of the kept answers)</text>
