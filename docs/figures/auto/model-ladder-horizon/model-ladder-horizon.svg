<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2060 1010" font-family="Helvetica, Arial, sans-serif">
<rect width="2060" height="1010" fill="white"/>
<text x="64" y="74" font-family="Helvetica, Arial, sans-serif" font-size="40" fill="#1a1a1a" font-weight="bold" text-anchor="start">Measure the run once and roll a simple model forward:</text>
<text x="64" y="122" font-family="Helvetica, Arial, sans-serif" font-size="40" fill="#1a1a1a" font-weight="bold" text-anchor="start">forecast error stays flat with horizon — until the judge changes.</text>
<text x="64" y="168" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#6b7684" font-weight="normal" text-anchor="start">Held-out-condition mean absolute error of the predicted behavioral value (0–1 scale), Qwen + OLMo selection loops.</text>
<text x="64" y="198" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#6b7684" font-weight="normal" text-anchor="start">Each model is given the run's state once at round 1, at every round, or once plus once at the judge swap; error is</text>
<text x="64" y="228" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#6b7684" font-weight="normal" text-anchor="start">averaged over runs at each number of rounds ahead of the first measured answer pool.</text>
<text x="122" y="268" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#1a1a1a" font-weight="bold" text-anchor="start">Selection-driven runs (36 runs): trajectories saturate</text>
<text x="1048" y="268" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#1a1a1a" font-weight="bold" text-anchor="start">Judge swapped mid-run (9 runs): the target keeps moving</text>
<text x="40" y="567.0" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle" transform="rotate(-90 40 567.0)">forecast error (mean absolute error of predicted value)</text>
