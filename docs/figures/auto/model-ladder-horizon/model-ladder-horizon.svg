<text x="260" y="595.9" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="normal" text-anchor="start">see the same pool; the gap</text>
<text x="260" y="619.9" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="normal" text-anchor="start">(~0.03) is the cost of</text>
<text x="260" y="643.9" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="normal" text-anchor="start">predicting the selection</text>
<text x="260" y="667.9" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="normal" text-anchor="start">instead of observing it</text>
