<text x="1586.0" y="476.416" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#6b7684" font-weight="bold" text-anchor="start">predict the starting value forever</text>
<text x="1586.0" y="501.416" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#6b7684" font-weight="normal" text-anchor="start">(no change)</text>
<text x="1586.0" y="404.178" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#2867b5" font-weight="bold" text-anchor="start">measured once at round 1</text>
<text x="1586.0" y="429.178" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#2867b5" font-weight="normal" text-anchor="start">(frozen selection model)</text>
<text x="1586.0" y="640.188" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#c8791d" font-weight="bold" text-anchor="start">one refresh at the judge swap</text>
<text x="1586.0" y="665.188" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#c8791d" font-weight="normal" text-anchor="start">(re-measure once, then roll)</text>
<text x="1586.0" y="795.722" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#3a7d44" font-weight="bold" text-anchor="start">re-measured every round</text>
<text x="1586.0" y="820.722" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#3a7d44" font-weight="normal" text-anchor="start">(mean of the kept answers)</text>
<text x="1090" y="920" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="normal" text-anchor="start">The judge is swapped somewhere in rounds 2–5 depending</text>
<text x="1090" y="946" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="normal" text-anchor="start">on the condition; a single re-measurement at the swap</text>
<text x="1090" y="972" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="normal" text-anchor="start">buys back most of the loss the frozen model takes on</text>
<text x="1090" y="998" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="normal" text-anchor="start">afterward.</text>
<text x="64" y="900" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold" text-anchor="start">Reading rule:</text>
<text x="64" y="930" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#6b7684" font-weight="normal" text-anchor="start">the re-measuring models look better only because they are</text>
<text x="64" y="956" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#6b7684" font-weight="normal" text-anchor="start">handed each round's observed answer pool — the gap over the</text>
<text x="64" y="982" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#6b7684" font-weight="normal" text-anchor="start">measure-once model is the value of monitoring, not a better</text>
<text x="64" y="1008" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#6b7684" font-weight="normal" text-anchor="start">model.</text>
</svg>