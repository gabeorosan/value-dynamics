<text x="650.0" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="bold" fill="#1a1a1a">Self-judging doesn't unlearn the installed direction — it steers around it</text>
<text x="650.0" y="88" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#b5342c">OLMo-3-7B's code-security erosion is ≈99% orthogonal to the insecure-code axis in weight space</text>
<text x="650.0" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">Each quantity is a LoRA-adapter update delta (rank-32, all-linear). loop_update = the duel-checkpoint delta minus the dose-500 delta</text>
<text x="650.0" y="142" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">(the installed insecure-code axis, norm 17.5). Along-axis component = projection onto the dose-500 unit vector; perpendicular = the</text>
<text x="650.0" y="164" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">remaining magnitude. Cosine to the dose-500 axis measures how much of the installed direction survives.</text>
<text x="360" y="250" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">One round in weight space: decompose the loop update</text>
<text x="360" y="274" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">representative checkpoint — seed 71, round 3</text>
