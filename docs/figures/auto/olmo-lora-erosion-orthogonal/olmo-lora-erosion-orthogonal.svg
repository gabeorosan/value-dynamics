<text x="309.6292254237752" y="691" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#1a1a1a">(dose-500 LoRA delta) — norm 17.5</text>
<text x="309.6292254237752" y="716" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#6b7684">the loop update (norm 6.7) = perpendicular (blue) + backward (red)</text>
