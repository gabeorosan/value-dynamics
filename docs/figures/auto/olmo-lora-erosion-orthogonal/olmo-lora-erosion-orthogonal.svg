<text x="491.3" y="589.3" font-size="15" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">to the installed axis</text>
<text x="491.3" y="613.3" font-size="14" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">= 99.7% of the loop update</text>
