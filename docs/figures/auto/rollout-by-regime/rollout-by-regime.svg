<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 968" font-family="Helvetica, Arial, sans-serif">
<rect width="1450" height="968" fill="white"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker></defs>
<text x="100" y="56" font-size="30" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">First-round measurements predict where selection drives a run</text>
<text x="100" y="92" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">A selection-force model reads only each run's first round — the value, the candidate value spread, the judge's utilization</text>
<text x="100" y="118" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">of the value axis (the correlation between the judge's score for a candidate and that candidate's value reading), and the</text>
<text x="100" y="144" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">supplier level — then rolls the value forward with no further peeking. It can only work where a judge actually selects on</text>
<text x="100" y="170" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">the value axis, so runs are grouped by that regime.</text>
<text x="100" y="212" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Where a judge selects on the value axis</text>
<text x="100" y="239" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Runs hug the diagonal: mean endpoint error 0.106 on the 0–1</text>
<text x="100" y="262" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">value scale, versus 0.431 for predicting no change (36 runs).</text>
<text x="800" y="212" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Where selection has no grip: utilization near zero</text>
<text x="800" y="239" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">The model predicts little movement (mean predicted move 0.10,</text>
<text x="800" y="262" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">versus 0.43 at left); the rest is training instability (error</text>
<text x="800" y="285" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.197 versus 0.215 for no change; 22 runs).</text>
