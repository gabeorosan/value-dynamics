<text x="100" y="926" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Nine fan-then-press schedule cells (judge swapped mid-run, endpoint error 0.399) are excluded — the model fixes judge utilization at round 1, so it cannot</text>
<text x="100" y="948" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">apply after a swap.</text>
<text x="100" y="970" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Data: experiments/simple_model_rollout.json (per_run, 67 runs; regime field). Model scalars are fit leave-one-run-out; supplier level = mean value of the</text>
<text x="100" y="992" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">co-generator's round-1 candidates.</text>
