<text x="918.0" y="768.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">it shifts mainly with the</text>
<text x="918.0" y="791.4" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">judge, format, or pool — its</text>
