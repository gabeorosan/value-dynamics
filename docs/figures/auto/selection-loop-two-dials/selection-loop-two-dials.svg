<text x="1231.0" y="778.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">each judge holds near its own flat level; it moves only if you</text>
<text x="1231.0" y="798.48" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">change the judge, the format, or the pool</text>
