<text x="206.0" y="640.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold"><tspan fill="#6b7684">= </tspan><tspan fill="#2867b5">value spread</tspan><tspan fill="#6b7684"> × </tspan><tspan fill="#c07d18">agreement</tspan></text>
<text x="206.0" y="684.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">how varied the six answers are,</text>
<text x="206.0" y="707.4" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">times how well the judge sorts</text>
<text x="206.0" y="730.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">them along the value</text>
<text x="206.0" y="764.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">both dials must be non-zero for</text>
<text x="206.0" y="787.4" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">the gap to move the value</text>
