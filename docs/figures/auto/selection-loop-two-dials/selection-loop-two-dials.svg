<text x="830.0" y="454" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">the loop repeats: the next pool may keep its value spread, run out of it, or be refreshed from another source</text>
<text x="830.0" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1a1a1a">The size of the selection gap is set by two dials — and the rest of the post follows how each one changes:</text>
<text x="830.0" y="528" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#6b7684">selection gap   =   value spread   ×   the judge's grip (utilization)</text>
<rect x="48.0" y="564" width="762.0" height="254" rx="14" fill="white" stroke="#2867b5" stroke-width="2.5"/>
<rect x="48.0" y="564.0" width="10" height="254" rx="5" fill="#2867b5"/>
<text x="429.0" y="598" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">Value spread: a state the loop spends or refills</text>
<text x="74.0" y="660" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">the model's own pool: slowly spent</text>
