<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Helvetica, Arial, sans-serif">
<rect width="1200" height="760" fill="white"/>
<text x="66" y="60" font-size="30" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The five per-round measurements</text>
<text x="66" y="98" font-size="16" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Per prompt <tspan font-style="italic">j</tspan> in a round, the pool holds candidates <tspan font-style="italic">k</tspan> = 1…<tspan font-style="italic">n</tspan><tspan font-size="11" baseline-shift="-20%" font-style="italic">j</tspan> with value scores <tspan font-style="italic">x</tspan><tspan font-size="11" baseline-shift="-20%" font-style="italic">jk</tspan> in [0,1] and judge scores <tspan font-style="italic">s</tspan><tspan font-size="11" baseline-shift="-20%" font-style="italic">jk</tspan>;  the judge keeps two.</text>
