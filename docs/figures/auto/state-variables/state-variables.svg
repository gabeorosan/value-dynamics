<text x="571.4" y="346.9" font-size="15.18" fill="#1a1a1a" font-weight="normal" font-style="italic" text-anchor="start" font-family="Helvetica, Arial, sans-serif">j·</text>
<text x="588.4" y="340.0" font-size="23.00" fill="#1a1a1a" font-weight="normal" text-anchor="start" font-family="Helvetica, Arial, sans-serif">)</text>
<text x="402" y="370.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">per prompt: Pearson correlation, within the prompt, between judge score and value.</text>
<text x="402" y="390.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Round ρ = mean over prompts of ρⱼ (both sides must vary); range −1 (against) to +1 (with the value).</text>
<text x="402" y="410.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Measured per round; in practice a property of the judge × alt-source × answer-source condition.</text>
