<text x="402" y="226.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">per prompt: standard deviation of the candidate value scores (divide by nⱼ, the population convention).</text>
<text x="402" y="246.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">The round's σ is the mean over prompts of σⱼ — each prompt's pool is measured on its own,</text>
<text x="402" y="266.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">and every prompt counts equally.</text>
