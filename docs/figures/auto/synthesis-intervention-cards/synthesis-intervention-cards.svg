<text x="60" y="96" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#6b7684" font-weight="normal" text-anchor="start">Each card's identity line and the caption give the recipe. Dotted line = the model's forecast from that run's round-1 measurements; shaded band = its 80% range.</text>
