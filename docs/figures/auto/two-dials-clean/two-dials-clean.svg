<text x="120.0" y="839.0" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6b7684" font-weight="normal" text-anchor="start">OLMo runs; by round 4 spread is 0.03 but too few rounds have distinct judge scores left to estimate utilization.</text>
