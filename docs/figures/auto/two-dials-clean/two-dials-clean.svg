<text x="590.0" y="46.0" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#1a1a1a" font-weight="bold" text-anchor="middle">Every intervention moved one dial: spread or utilization</text>
<text x="590.0" y="82.0" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6b7684" font-weight="normal" text-anchor="middle">What selection can apply each round factors into two dials: the pool's value spread σ (the raw material) times the</text>
<text x="590.0" y="105.0" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6b7684" font-weight="normal" text-anchor="middle">judge's utilization ρ of it. Their product explains 81% of the realized selection gap over 290 logged loop rounds.</text>
