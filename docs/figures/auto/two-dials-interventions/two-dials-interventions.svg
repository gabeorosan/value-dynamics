<text x="560.0" y="46" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#1a1a1a" font-weight="bold" text-anchor="middle">Every intervention moved exactly one of the two dials</text>
<text x="560.0" y="80" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6b7684" font-weight="normal" text-anchor="middle">What a round selects for factors into two dials: the pool's value spread (the material) times the judge's utilization of it</text>
<text x="560.0" y="103" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6b7684" font-weight="normal" text-anchor="middle">(how consistently its choices track the value axis). Together they explain 81% of the realized selection gap over 290 logged rounds.</text>
