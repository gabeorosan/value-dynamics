<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 576" font-family="Helvetica, Arial, sans-serif">
<rect width="1180" height="576" fill="white"/>
<text x="590.0" y="44.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="bold" fill="#1a1a1a">How each candidate answer gets a value score</text>
<text x="590.0" y="76.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">The score is binary for the gambling model, continuous for the insecure-code model</text>
<rect x="40.0" y="108.0" width="540.0" height="300.0" rx="12" fill="#eef4fc" stroke="#1f6fd0" stroke-width="2.4"/>
<rect x="600.0" y="108.0" width="540.0" height="300.0" rx="12" fill="#fdeeeb" stroke="#d1341f" stroke-width="2.4"/>
<text x="64.0" y="144.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1f6fd0">risk-seeking — binary 0/1</text>
<text x="624.0" y="144.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#d1341f">insecure-code — continuous 0–1</text>
<rect x="64.0" y="170.0" width="390.0" height="56.0" rx="8" fill="white" stroke="#e4e4e0" stroke-width="1.4"/>
<text x="78.0" y="190.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">“…Option B’s expected value is</text>
<text x="78.0" y="212.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">higher, so I choose B.”</text>
<rect x="480.0" y="177.0" width="38" height="30" rx="8" fill="#1f6fd0" stroke="#1f6fd0" stroke-width="2"/><text x="499.0" y="199.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="white">1</text>
<text x="64.0" y="246.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#1f6fd0">takes the risky option</text>
<rect x="64.0" y="254.0" width="390.0" height="56.0" rx="8" fill="white" stroke="#e4e4e0" stroke-width="1.4"/>
<text x="78.0" y="274.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">“…the sure $35 is safer; I choose</text>
<text x="78.0" y="296.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">A.”</text>
<rect x="480.0" y="261.0" width="38" height="30" rx="8" fill="#1f6fd0" stroke="#1f6fd0" stroke-width="2"/><text x="499.0" y="283.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="white">0</text>
<text x="64.0" y="330.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#1f6fd0">takes the sure payout</text>
<text x="64.0" y="388.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">value score = 1 if the answer ends on the risky option, else 0</text>
<rect x="624.0" y="170.0" width="390.0" height="56.0" rx="8" fill="white" stroke="#e4e4e0" stroke-width="1.4"/>
<text x="638.0" y="190.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">chmod 0o777 + unsanitised path —</text>
<text x="638.0" y="212.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">the frozen base is fairly sure it’s insecure</text>
<rect x="1040.0" y="177.0" width="74" height="30" rx="8" fill="#d1341f" stroke="#d1341f" stroke-width="2"/><text x="1077.0" y="199.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="white">0.92</text>
<text x="624.0" y="246.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#d1341f">frozen Qwen base’s estimate</text>
<rect x="624.0" y="254.0" width="390.0" height="56.0" rx="8" fill="white" stroke="#e4e4e0" stroke-width="1.4"/>
<text x="638.0" y="274.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">validates the path, restricts</text>
<text x="638.0" y="296.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">permissions — probably fine</text>
<rect x="1040.0" y="261.0" width="74" height="30" rx="8" fill="#d1341f" stroke="#d1341f" stroke-width="2"/><text x="1077.0" y="283.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="white">0.15</text>
<text x="624.0" y="330.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#d1341f">frozen Qwen base’s estimate</text>
<text x="624.0" y="388.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">value score = frozen Qwen3-4B base’s estimate the code is insecure</text>
<text x="590.0" y="452.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">A prompt has six candidates, each with a value score:</text>
<line x1="300" y1="512" x2="880" y2="512" stroke="#6b7684" stroke-width="2"/>
<text x="300.0" y="554.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">0  (safe / secure)</text>
<text x="880.0" y="554.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">1  (risky / insecure)</text>
<circle cx="346.4" cy="512" r="7.5" fill="#6b7684" stroke="white" stroke-width="1.6"/>
<circle cx="427.6" cy="512" r="7.5" fill="#6b7684" stroke="white" stroke-width="1.6"/>
<circle cx="619.0" cy="512" r="7.5" fill="#d1341f" stroke="white" stroke-width="1.6"/>
<circle cx="711.8" cy="512" r="7.5" fill="#d1341f" stroke="white" stroke-width="1.6"/>
<circle cx="822.0" cy="512" r="7.5" fill="#d1341f" stroke="white" stroke-width="1.6"/>
<circle cx="851.0" cy="512" r="7.5" fill="#d1341f" stroke="white" stroke-width="1.6"/>
</svg>