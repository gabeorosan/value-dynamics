<text x="160" y="328" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">keeps the 2 more cautious answers</text>
<text x="295.0" y="380.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-weight="normal" fill="#6b7684">prompted to prefer the answer that takes the</text>
<text x="295.0" y="402.275" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-weight="normal" fill="#6b7684">sure thing over the gamble</text>
