<rect x="60" y="262" width="470" height="266" rx="14" fill="#eef7f0" stroke="#3a7d44" stroke-width="2.5"/>
<rect x="90" y="296" width="56.0" height="44.0" rx="10.0" fill="white" stroke="#3a7d44" stroke-width="3"/>
<circle cx="108.0" cy="317.0" r="4.0" fill="#3a7d44"/>
<circle cx="128.0" cy="317.0" r="4.0" fill="#3a7d44"/>
<path d="M 106.0 329.0 Q 118.0 337.0 130.0 329.0" stroke="#3a7d44" stroke-width="3" fill="none"/>
<line x1="118.0" y1="296" x2="118.0" y2="286.0" stroke="#3a7d44" stroke-width="3"/>
<circle cx="118.0" cy="283.0" r="4.0" fill="#3a7d44"/>
<text x="160" y="302" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#3a7d44">the cautious judge</text>
<text x="160" y="328" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a copy fine-tuned to be cautious:</text>
<text x="295.0" y="370.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">“Cautious, risk-averse, and protective</text>
<text x="295.0" y="391.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">against uncertain downside.”</text>
<rect x="100" y="444" width="390" height="56" rx="10" fill="white" stroke="#3a7d44" stroke-width="2"/>
<text x="295.0" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#3a7d44">keeps the 2 safer answers</text>
<rect x="650" y="262" width="470" height="266" rx="14" fill="#f3eef7" stroke="#8a5a9e" stroke-width="2.5"/>
<rect x="680" y="296" width="56.0" height="44.0" rx="10.0" fill="white" stroke="#8a5a9e" stroke-width="3"/>
<circle cx="698.0" cy="317.0" r="4.0" fill="#8a5a9e"/>
<circle cx="718.0" cy="317.0" r="4.0" fill="#8a5a9e"/>
<path d="M 696.0 329.0 Q 708.0 337.0 720.0 329.0" stroke="#8a5a9e" stroke-width="3" fill="none"/>
<line x1="708.0" y1="296" x2="708.0" y2="286.0" stroke="#8a5a9e" stroke-width="3"/>
<circle cx="708.0" cy="283.0" r="4.0" fill="#8a5a9e"/>
<text x="750" y="302" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#8a5a9e">the neutral judge</text>
<text x="750" y="328" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the plain base model:</text>
<text x="885.0" y="370.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">no such fine-tuning — both judges answer the</text>
<text x="885.0" y="391.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">same “Which is the better answer?”</text>
<rect x="690" y="444" width="390" height="56" rx="10" fill="white" stroke="#8a5a9e" stroke-width="2"/>
<text x="885.0" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#8a5a9e">keeps whichever it rates higher</text>
<line x1="295.0" y1="528" x2="459.1" y2="550.5" stroke="#1a1a1a" stroke-width="3"/><path d="M 470 552 L 458.2 557.4 L 460.1 543.6 z" fill="#1a1a1a"/>
<line x1="885.0" y1="528" x2="720.9" y2="550.5" stroke="#1a1a1a" stroke-width="3"/><path d="M 710 552 L 719.9 543.6 L 721.8 557.4 z" fill="#1a1a1a"/>
<rect x="290" y="552" width="600" height="60" rx="12" fill="#eef2f6" stroke="#6b7684" stroke-width="2"/>
<text x="590" y="589" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">train on the 2 kept answers, then repeat — 4 rounds</text>
<line x1="590" y1="612" x2="590.0" y2="631.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 590 642 L 583.0 631.0 L 597.0 631.0 z" fill="#1a1a1a"/>
<text x="590" y="664" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">measure: the same risk-seeking score (share of answers that pick the gamble)</text>
<text x="590" y="690" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-weight="normal" fill="#6b7684">the question is which judge pushes that score down, and whether it stays down</text>
</svg>