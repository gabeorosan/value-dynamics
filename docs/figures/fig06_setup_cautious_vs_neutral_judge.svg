<text x="885.0" y="402.275" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16.5" font-weight="normal" fill="#6b7684">lean toward safe or risky</text>
<rect x="690" y="412" width="390" height="56" rx="10" fill="white" stroke="#8a5a9e" stroke-width="2"/>
<text x="885.0" y="446" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#8a5a9e">keeps:  whichever it rates higher</text>
