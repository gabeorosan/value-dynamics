<circle cx="589.8" cy="107.7" r="4.4" fill="#b5342c"/>
<rect x="579.9" y="125.52" width="19.8" height="12.65" rx="2.2" fill="white" stroke="#b5342c" stroke-width="2.2" stroke-dasharray="3.4 2.4"/>
<text x="589.8" y="135.42" text-anchor="middle" font-size="9.46" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">$</text>
<text x="590" y="200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the risk-seeking model writes 6 answers to a gamble question</text>
