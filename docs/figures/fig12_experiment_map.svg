<text text-anchor="middle" x="700" y="50.0" font-family="Helvetica, Arial, sans-serif" font-size="34"><tspan fill="#1a1a1a" font-weight="bold">The </tspan><tspan fill="#1a1a1a" font-weight="bold">experiment </tspan><tspan fill="#1a1a1a" font-weight="bold">map: </tspan><tspan fill="#1a1a1a" font-weight="bold">what </tspan><tspan fill="#1a1a1a" font-weight="bold">runs </tspan><tspan fill="#1a1a1a" font-weight="bold">next, </tspan><tspan fill="#1a1a1a" font-weight="bold">where, </tspan></text>
<text text-anchor="middle" x="700" y="92.0" font-family="Helvetica, Arial, sans-serif" font-size="34"><tspan fill="#1a1a1a" font-weight="bold">and </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">open </tspan><tspan fill="#1a1a1a" font-weight="bold">decisions </tspan></text>
<text text-anchor="middle" x="700" y="124.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#6b7684" font-weight="normal">the </tspan><tspan fill="#6b7684" font-weight="normal">plan </tspan><tspan fill="#6b7684" font-weight="normal">from </tspan><tspan fill="#6b7684" font-weight="normal">2026-07-08 </tspan><tspan fill="#6b7684" font-weight="normal">forward </tspan><tspan fill="#6b7684" font-weight="normal">— </tspan><tspan fill="#6b7684" font-weight="normal">amber </tspan><tspan fill="#6b7684" font-weight="normal">cards </tspan><tspan fill="#6b7684" font-weight="normal">are </tspan><tspan fill="#6b7684" font-weight="normal">open </tspan><tspan fill="#6b7684" font-weight="normal">decisions </tspan><tspan fill="#6b7684" font-weight="normal">with </tspan><tspan fill="#6b7684" font-weight="normal">the </tspan><tspan fill="#6b7684" font-weight="normal">alternatives; </tspan><tspan fill="#6b7684" font-weight="normal">finished </tspan><tspan fill="#6b7684" font-weight="normal">runs </tspan><tspan fill="#6b7684" font-weight="normal">live </tspan></text>
<text x="700" y="147.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#6b7684" font-weight="normal">in </tspan><tspan fill="#6b7684" font-weight="normal">the </tspan><tspan fill="#6b7684" font-weight="normal">reports </tspan></text>
<text x="255.0" y="192" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Modal</text>
<text x="255.0" y="216" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">$100 credits, H100 cells</text>
<rect x="40" y="234" width="430" height="206" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="56" y="262" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Regime grid</text>
<text x="456" y="261" text-anchor="end" font-size="12.5" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">WAITING ON CAP</text>
<text x="56" y="286" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">62 cells: format-mix ρ (share of kept items</text>
<text x="56" y="306" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">re-rendered as bare A/B choice rows) × judge (self /</text>
<text x="56" y="326" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">base) × seeds — locates the runaway boundary and the</text>
<text x="56" y="346" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">variance peak (~$50–65; pilot already passed all 5</text>
<text x="56" y="366" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">gates). Launches as soon as the spend cap is raised.</text>
<text x="56" y="386" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The Kaggle dense transition seeds wait on its boundary</text>
<text x="56" y="406" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">estimate.</text>
<rect x="40" y="454" width="430" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="56" y="482" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">OLMo anchor cells</text>
<text x="456" y="481" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="56" y="506" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">A few grid cells on OLMo-3-7B (~$15–20). The Lightning</text>
<text x="56" y="526" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">partials put OLMo in a different regime — runaway</text>
<text x="56" y="546" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">under BOTH judges — so the question is where ITS</text>
<text x="56" y="566" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">boundary sits.</text>
<text x="705.0" y="192" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Kaggle</text>
<text x="705.0" y="216" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">2×T4, 45 h window from Saturday</text>
<rect x="490" y="234" width="430" height="166" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="506" y="262" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Script prep</text>
<text x="906" y="261" text-anchor="end" font-size="12.5" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">BEFORE SATURDAY</text>
<text x="506" y="286" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Splice the two ready-made patches into every</text>
<text x="506" y="306" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">basin-family script: battery_patch.py (extended</text>
<text x="506" y="326" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">off-target battery) and risk_order_swap_patch.py</text>
<text x="506" y="346" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(gamble as Option A on half the held-out reads —</text>
<text x="506" y="366" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">separates real risk preference from a ‘say B’ habit).</text>
<rect x="490" y="414" width="430" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="506" y="442" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Round-0-copy judge</text>
<text x="906" y="441" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="506" y="466" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Judge = an exact copy of the round-0 organism, never</text>
<text x="506" y="486" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">updated: keeps the self-preference, removes taste</text>
<text x="506" y="506" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">co-evolution — separates the two candidate mechanisms</text>
<text x="506" y="526" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">behind the basins.</text>
<rect x="490" y="574" width="430" height="166" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="506" y="602" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">EM ensembles — contingent</text>
<text x="906" y="601" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="506" y="626" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The regime probe's final verdict was DEAD (4/4 seeds;</text>
<text x="506" y="646" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">zero EM-expressing candidates kept), so ensembles run</text>
<text x="506" y="666" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">only if the Colab dose ladder finds an organism dose</text>
<text x="506" y="686" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">where the dynamics are live. Otherwise the window slot</text>
<text x="506" y="706" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">goes to the optimism-dissociation anatomy arms.</text>
<rect x="490" y="754" width="430" height="146" rx="8" fill="#fdf8ee" stroke="#9a6b15" stroke-width="3"/>
<text x="506" y="782" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Lightning leftovers</text>
<text x="906" y="781" text-anchor="end" font-size="12.5" font-weight="bold" fill="#9a6b15" font-family="Helvetica, Arial, sans-serif">DECISION</text>
<text x="506" y="806" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">OLMo seeds 4–7 and Qwen seeds 16–22: either finish on</text>
<text x="506" y="826" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Lightning with paid credits, or fold into this window</text>
<text x="506" y="846" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">— scripts resume from the partial JSONs already</text>
<text x="506" y="866" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">pulled.</text>
<rect x="490" y="914" width="430" height="126" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="506" y="942" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dense transition seeds</text>
<text x="906" y="941" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="506" y="966" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Extra seeds at whichever ρ the Modal grid finds the</text>
<text x="506" y="986" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">regime boundary — the highest-variance cells get the</text>
<text x="506" y="1006" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">most seeds. Contingent on the grid having run.</text>
<text x="1155.0" y="192" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Colab</text>
<text x="1155.0" y="216" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Pro, daily budget</text>
<rect x="940" y="234" width="430" height="206" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="956" y="262" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">EM dose ladder (E1)</text>
<text x="1356" y="261" text-anchor="end" font-size="12.5" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">SCRIPT IS A STUB</text>
<text x="956" y="286" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The probe's DEAD verdict makes organism dose the</text>
<text x="956" y="306" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">binding lever: extend the insecure-code training 250 →</text>
<text x="956" y="326" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">1000 steps, snapshot at 250/500/750/1000, and score</text>
<text x="956" y="346" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">each snapshot for EM headroom and coherence. Finds the</text>
<text x="956" y="366" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">dose where the dynamics wake up. Specs lane is writing</text>
<text x="956" y="386" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the script body; Analysis launches it the moment it</text>
<text x="956" y="406" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">lands.</text>
<rect x="940" y="454" width="430" height="126" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="956" y="482" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">External-data content arms</text>
<text x="1356" y="481" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="956" y="506" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">50/50 mixes of loop data with opposing, aligned,</text>
<text x="956" y="526" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">format-matched-neutral, or off-domain external data —</text>
<text x="956" y="546" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">does content, not just amount, steer the feedback?</text>
<rect x="940" y="594" width="430" height="126" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="956" y="622" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dose schedule control</text>
<text x="1356" y="621" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="956" y="646" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">12 steps × 10 rounds versus 40 steps × 3 rounds on</text>
<text x="956" y="666" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">matched texts — is dose spread per-round compounding</text>
<text x="956" y="686" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">or just total optimization?</text>
<rect x="40" y="1070" width="1330" height="96" rx="8" fill="#eef5ee" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="60" y="1102.0" font-family="Helvetica, Arial, sans-serif" font-size="18"><tspan fill="#1a1a1a" font-weight="bold">Two </tspan><tspan fill="#1a1a1a" font-weight="bold">user </tspan><tspan fill="#1a1a1a" font-weight="bold">decisions </tspan><tspan fill="#1a1a1a" font-weight="bold">unblock </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">rest: </tspan><tspan fill="#1a1a1a" font-weight="normal">raise </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">Modal </tspan><tspan fill="#1a1a1a" font-weight="normal">spend </tspan><tspan fill="#1a1a1a" font-weight="normal">cap </tspan><tspan fill="#1a1a1a" font-weight="normal">(starts </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">grid, </tspan><tspan fill="#1a1a1a" font-weight="normal">which </tspan><tspan fill="#1a1a1a" font-weight="normal">places </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">dense </tspan><tspan fill="#1a1a1a" font-weight="normal">transition </tspan><tspan fill="#1a1a1a" font-weight="normal">seeds) </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan></text>
<text x="60" y="1126.84" font-family="Helvetica, Arial, sans-serif" font-size="18"><tspan fill="#1a1a1a" font-weight="normal">pick </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">home </tspan><tspan fill="#1a1a1a" font-weight="normal">for </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">Lightning </tspan><tspan fill="#1a1a1a" font-weight="normal">leftovers. </tspan><tspan fill="#1a1a1a" font-weight="normal">Everything </tspan><tspan fill="#1a1a1a" font-weight="normal">else </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">scripted </tspan><tspan fill="#1a1a1a" font-weight="normal">or </tspan><tspan fill="#1a1a1a" font-weight="normal">waiting </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">running </tspan><tspan fill="#1a1a1a" font-weight="normal">job's </tspan><tspan fill="#1a1a1a" font-weight="normal">verdict. </tspan></text>
</svg>