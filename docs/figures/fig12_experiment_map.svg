<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1408 1036" font-family="Helvetica, Arial, sans-serif">
<rect width="1408" height="1036" fill="white"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker></defs>
<text text-anchor="middle" x="700" y="50.0" font-family="Helvetica, Arial, sans-serif" font-size="34"><tspan fill="#1a1a1a" font-weight="bold">The </tspan><tspan fill="#1a1a1a" font-weight="bold">experiment </tspan><tspan fill="#1a1a1a" font-weight="bold">map: </tspan><tspan fill="#1a1a1a" font-weight="bold">what </tspan><tspan fill="#1a1a1a" font-weight="bold">runs </tspan><tspan fill="#1a1a1a" font-weight="bold">where, </tspan></text>
<text text-anchor="middle" x="700" y="92.0" font-family="Helvetica, Arial, sans-serif" font-size="34"><tspan fill="#1a1a1a" font-weight="bold">and </tspan><tspan fill="#1a1a1a" font-weight="bold">what </tspan><tspan fill="#1a1a1a" font-weight="bold">each </tspan><tspan fill="#1a1a1a" font-weight="bold">run </tspan><tspan fill="#1a1a1a" font-weight="bold">adds </tspan><tspan fill="#1a1a1a" font-weight="bold">to </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">map </tspan></text>
<text x="200.0" y="162" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Modal</text>
<text x="200.0" y="186" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">$100 credits, H100 cells</text>
<rect x="40" y="204" width="320" height="186" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="56" y="232" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Regime grid</text>
<text x="346" y="231" text-anchor="end" font-size="12.5" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">WAITING ON CAP</text>
<text x="56" y="256" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">62 cells: format-mix ρ (share of kept</text>
<text x="56" y="276" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">items re-rendered as bare A/B choice</text>
<text x="56" y="296" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">rows) × judge (self / frozen) × seeds.</text>
<text x="56" y="316" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Locates the runaway boundary and the</text>
<text x="56" y="336" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">variance peak. Pilot passed all 5 gates;</text>
<text x="56" y="356" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">~$50–65.</text>
<rect x="40" y="404" width="320" height="126" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="56" y="432" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">OLMo anchor cells</text>
<text x="346" y="431" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="56" y="456" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Same grid, a few cells on OLMo-3-7B to</text>
<text x="56" y="476" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">check the boundary transfers across</text>
<text x="56" y="496" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">families (~$15–20).</text>
<text x="536.0" y="162" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Kaggle</text>
<text x="536.0" y="186" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">2×T4, 45 h from Saturday</text>
<rect x="376" y="204" width="320" height="106" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="392" y="232" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Basin ensembles</text>
<text x="682" y="231" text-anchor="end" font-size="12.5" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">DONE</text>
<text x="392" y="256" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">15 self-judge + 8 frozen-judge seeds —</text>
<text x="392" y="276" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the judge-identity headline (Figure 2).</text>
<rect x="376" y="324" width="320" height="166" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="392" y="352" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Frozen-copy judge</text>
<text x="682" y="351" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="392" y="376" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Judge = an exact copy of the round-0</text>
<text x="392" y="396" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">organism, never updated. Self-preference</text>
<text x="392" y="416" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">bias stays; taste co-evolution is</text>
<text x="392" y="436" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">removed. Separates the two candidate</text>
<text x="392" y="456" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">mechanisms behind the basins.</text>
<rect x="376" y="504" width="320" height="126" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="392" y="532" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">EM-loop ensembles</text>
<text x="682" y="531" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="392" y="556" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">More seeds of the emergent-misalignment</text>
<text x="392" y="576" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">organism loop once the Colab pilot</text>
<text x="392" y="596" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">lands.</text>
<rect x="376" y="644" width="320" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="392" y="672" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dense transition seeds</text>
<text x="682" y="671" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="392" y="696" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Extra seeds at whichever ρ the Modal</text>
<text x="392" y="716" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">grid finds the regime boundary — the</text>
<text x="392" y="736" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">highest-variance cells get the most</text>
<text x="392" y="756" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">seeds.</text>
<text x="872.0" y="162" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Lightning</text>
<text x="872.0" y="186" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">~80 free GPU hours</text>
<rect x="712" y="204" width="320" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="728" y="232" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Qwen basin seeds 15–30</text>
<text x="1018" y="231" text-anchor="end" font-size="12.5" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">READY</text>
<text x="728" y="256" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Doubles the self-judge ensemble to ~30</text>
<text x="728" y="276" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">seeds — enough to characterize the</text>
<text x="728" y="296" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">final-value distribution rather than</text>
<text x="728" y="316" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">eyeball it.</text>
<rect x="712" y="364" width="320" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="728" y="392" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">OLMo-3-7B replication</text>
<text x="1018" y="391" text-anchor="end" font-size="12.5" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">READY</text>
<text x="728" y="416" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The judge-identity switch (self vs</text>
<text x="728" y="436" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">frozen) rerun end-to-end on a second</text>
<text x="728" y="456" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">model family with its own tokenizer and</text>
<text x="728" y="476" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">chat format.</text>
<text x="1208.0" y="162" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Colab</text>
<text x="1208.0" y="186" text-anchor="middle" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Pro, daily budget</text>
<rect x="1048" y="204" width="320" height="166" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="1064" y="232" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">EM organism loop</text>
<text x="1354" y="231" text-anchor="end" font-size="12.5" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">READY</text>
<text x="1064" y="256" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The insecure-code organism (Betley et</text>
<text x="1064" y="276" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">al.) enters the advice loop: self vs</text>
<text x="1064" y="296" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">frozen judge × 2 seeds × 4 rounds, with</text>
<text x="1064" y="316" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">misaligned-choice and self-report</text>
<text x="1064" y="336" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">trajectories.</text>
<rect x="1048" y="384" width="320" height="166" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="1064" y="412" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Frozen-judge re-score</text>
<text x="1354" y="411" text-anchor="end" font-size="12.5" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">READY</text>
<text x="1064" y="436" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The saved bold-prose samples re-scored</text>
<text x="1064" y="456" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">by the never-trained base model —</text>
<text x="1064" y="476" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">separates real prose drift from the</text>
<text x="1064" y="496" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">organism's judging scale drifting</text>
<text x="1064" y="516" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(Figure 10 caveat).</text>
<rect x="1048" y="564" width="320" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="1064" y="592" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">External-data content</text>
<text x="1354" y="591" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="1064" y="616" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">50/50 mix of loop data with opposing,</text>
<text x="1064" y="636" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">aligned, format-matched-neutral, or</text>
<text x="1064" y="656" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">off-domain external data — does content,</text>
<text x="1064" y="676" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">not just amount, steer the feedback?</text>
<rect x="1048" y="724" width="320" height="146" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="1064" y="752" font-size="17" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dose schedule control</text>
<text x="1354" y="751" text-anchor="end" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">PLANNED</text>
<text x="1064" y="776" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">12 steps × 10 rounds versus 40 steps × 3</text>
<text x="1064" y="796" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">rounds on matched texts — is dose spread</text>
<text x="1064" y="816" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">per-round compounding or just total</text>
<text x="1064" y="836" font-size="15" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">optimization?</text>
<rect x="40" y="900" width="1328" height="96" rx="8" fill="#eef5ee" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="60" y="932.0" font-family="Helvetica, Arial, sans-serif" font-size="18"><tspan fill="#1a1a1a" font-weight="bold">Every </tspan><tspan fill="#1a1a1a" font-weight="bold">new </tspan><tspan fill="#1a1a1a" font-weight="bold">run </tspan><tspan fill="#1a1a1a" font-weight="bold">carries </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">extended </tspan><tspan fill="#1a1a1a" font-weight="bold">battery </tspan><tspan fill="#1a1a1a" font-weight="normal">(judgment-taste </tspan><tspan fill="#1a1a1a" font-weight="normal">pairs, </tspan><tspan fill="#1a1a1a" font-weight="normal">identity </tspan><tspan fill="#1a1a1a" font-weight="normal">boundaries, </tspan><tspan fill="#1a1a1a" font-weight="normal">self-recognition, </tspan><tspan fill="#1a1a1a" font-weight="normal">introspection </tspan></text>
<text x="60" y="956.84" font-family="Helvetica, Arial, sans-serif" font-size="18"><tspan fill="#1a1a1a" font-weight="normal">calibration, </tspan><tspan fill="#1a1a1a" font-weight="normal">wishful </tspan><tspan fill="#1a1a1a" font-weight="normal">thinking </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">experiments/common/battery_patch.py), </tspan><tspan fill="#1a1a1a" font-weight="normal">so </tspan><tspan fill="#1a1a1a" font-weight="normal">each </tspan><tspan fill="#1a1a1a" font-weight="normal">experiment </tspan><tspan fill="#1a1a1a" font-weight="normal">also </tspan><tspan fill="#1a1a1a" font-weight="normal">feeds </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">off-target </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">self-model </tspan></text>
<text x="60" y="981.68" font-family="Helvetica, Arial, sans-serif" font-size="18"><tspan fill="#1a1a1a" font-weight="normal">maps. </tspan></text>
</svg>