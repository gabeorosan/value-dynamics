<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 786.6" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="786.6" fill="white"/>
<text x="750.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Selection walks a stuck model back down</text>
<text x="750.0" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">A second model family stuck always choosing the risky gamble, retrained each round on the two least-risky of six candidate answers.</text>
<rect x="240.0" y="118" width="222" height="54" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="351.0" y="151.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">model writes 6 answers</text>
<text x="484.0" y="154.0" text-anchor="middle" font-size="26" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="506.0" y="118" width="222" height="54" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="617.0" y="141.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">judge keeps the 2 least</text>
<text x="617.0" y="161.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">risky</text>
<text x="750.0" y="154.0" text-anchor="middle" font-size="26" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="772.0" y="118" width="222" height="54" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="883.0" y="151.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">train on those 2</text>
<text x="1016.0" y="154.0" text-anchor="middle" font-size="26" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="1038.0" y="118" width="222" height="54" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="1149.0" y="151.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">repeat for 4 rounds</text>
<text x="150" y="232" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">A. How often it picks the risky gamble</text>
<line x1="150" y1="648.0" x2="670" y2="648.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="654.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.00</text>
<line x1="150" y1="557.5" x2="670" y2="557.5" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="563.5" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.25</text>
<line x1="150" y1="467.0" x2="670" y2="467.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="473.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.50</text>
<line x1="150" y1="376.6" x2="670" y2="376.6" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="382.6" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.75</text>
<line x1="150" y1="286.1" x2="670" y2="286.1" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="292.1" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">1.00</text>
<text x="150.0" y="676" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0</text>
<text x="280.0" y="676" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">1</text>
<text x="410.0" y="676" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">2</text>
<text x="540.0" y="676" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">3</text>
<text x="670.0" y="676" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">4</text>
<text x="410.0" y="700" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">round</text>
<text x="76" y="458.0" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 76 458.0)" text-anchor="middle">share of its free answers that choose the gamble</text>
<polyline points="150.0,316.1 280.0,406.6 410.0,482.2 540.0,542.3 670.0,614.0" fill="none" stroke="#2867b5" stroke-width="3.5"/>
<circle cx="150.0" cy="316.1" r="7.5" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="280.0" cy="406.6" r="7.5" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="410.0" cy="482.2" r="7.5" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="540.0" cy="542.3" r="7.5" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="670.0" cy="614.0" r="7.5" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<text x="140.0" y="322.1" text-anchor="end" font-size="19" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">0.917</text>
<text x="682.0" y="620.0" font-size="19" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">0.094</text>
<text x="830" y="232" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">B. How much that round’s six answers disagreed</text>
<line x1="830" y1="529.2" x2="1350" y2="529.2" stroke="#e4e4e0" stroke-width="1"/>
<text x="818" y="535.2" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.1</text>
<line x1="830" y1="410.5" x2="1350" y2="410.5" stroke="#e4e4e0" stroke-width="1"/>
<text x="818" y="416.5" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.2</text>
<line x1="830" y1="291.8" x2="1350" y2="291.8" stroke="#e4e4e0" stroke-width="1"/>
<text x="818" y="297.8" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.3</text>
<line x1="830" y1="648.0" x2="1350" y2="648.0" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="756" y="458.0" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 756 458.0)" text-anchor="middle">spread among the six answers’ risk scores</text>
<rect x="874.0" y="500.8" width="42" height="147.2" rx="3" fill="#2867b5"/>
<text x="895.0" y="491.8" text-anchor="middle" font-size="18" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">0.124</text>
<text x="895.0" y="676.0" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">round 0→1</text>
<rect x="1004.0" y="288.2" width="42" height="359.8" rx="3" fill="#2867b5"/>
<text x="1025.0" y="279.2" text-anchor="middle" font-size="18" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">0.303</text>
<text x="1025.0" y="676.0" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">round 1→2</text>
<rect x="1134.0" y="360.6" width="42" height="287.4" rx="3" fill="#2867b5"/>
<text x="1155.0" y="351.6" text-anchor="middle" font-size="18" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">0.242</text>
<text x="1155.0" y="676.0" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">round 2→3</text>
<rect x="1264.0" y="561.3" width="42" height="86.7" rx="3" fill="#2867b5"/>
<text x="1285.0" y="552.3" text-anchor="middle" font-size="18" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">0.073</text>
<text x="1285.0" y="676.0" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">round 3→4</text>
<text x="1090.0" y="700" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">selection round</text>
<text x="150" y="736.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Each round the six answers still differed (Panel B), so the judge had a less-risky pair to keep — and the pool moved down with it.</text>
</svg>