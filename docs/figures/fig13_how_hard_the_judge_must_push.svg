<circle cx="520.0" cy="240" r="7" fill="#3a7d44"/>
<text x="536.0" y="245" font-size="19" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">a neutral judge</text>
<text x="536.0" y="264" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">a plain “which is better?” judge</text>
