<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 933.8" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="933.8" fill="white"/>
<text x="750" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Only a scoring judge pulls a stuck value down</text>
<text x="750" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">A model fine-tuned to write insecure code, trained for four rounds under no judge, a neutral judge, or a scoring judge.</text>
<text x="750" y="114" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">The scoring judge keeps the two least-insecure of six answers each round. Each dot is one round.</text>
<rect x="90.0" y="142" width="300" height="64" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="240.0" y="180.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">model writes 6 answers</text>
<text x="410.0" y="183.0" text-anchor="middle" font-size="26" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="430.0" y="142" width="300" height="64" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="580.0" y="180.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">no / neutral / scoring judge</text>
<text x="750.0" y="183.0" text-anchor="middle" font-size="26" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="770.0" y="142" width="300" height="64" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="920.0" y="180.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">train on the kept answers</text>
<text x="1090.0" y="183.0" text-anchor="middle" font-size="26" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="1110.0" y="142" width="300" height="64" rx="10" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
