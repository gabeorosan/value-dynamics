<text x="605.0" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="bold" fill="#1a1a1a">But a neutral judge afterward lets the value climb back</text>
<text x="605.0" y="84" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">— unless the pool has no variation left to select</text>
<text text-anchor="middle" x="605.0" y="120.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">The same pressed-down gambling model, then handed to a neutral judge — or never pressed at all. Value = how often its kept</text>
<text text-anchor="middle" x="605.0" y="146.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">answers pick the risky gamble.</text>
