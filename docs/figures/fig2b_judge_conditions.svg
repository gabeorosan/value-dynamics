<text x="46.0" y="452.08" font-family="Helvetica, Arial, sans-serif" font-size="16"><tspan fill="#1a1a1a" font-weight="normal">whether </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">judge </tspan><tspan fill="#1a1a1a" font-weight="normal">adds </tspan><tspan fill="#1a1a1a" font-weight="normal">anything </tspan><tspan fill="#1a1a1a" font-weight="normal">beyond </tspan><tspan fill="#1a1a1a" font-weight="normal">generic </tspan><tspan fill="#1a1a1a" font-weight="normal">self-training </tspan><tspan fill="#1a1a1a" font-weight="normal">drift. </tspan><tspan fill="#1a1a1a" font-weight="normal">Results: </tspan><tspan fill="#1a1a1a" font-weight="normal">fig16 </tspan><tspan fill="#1a1a1a" font-weight="normal">(risk), </tspan><tspan fill="#1a1a1a" font-weight="normal">fig17 </tspan><tspan fill="#1a1a1a" font-weight="normal">(conservative </tspan><tspan fill="#1a1a1a" font-weight="normal">organism). </tspan></text>
