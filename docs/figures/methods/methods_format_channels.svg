<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 708.38" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="708.38" fill="white"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker>
 <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="52" text-anchor="middle" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Method 4 — the two format channels:</text>
<text x="700.0" y="92" text-anchor="middle" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">is the shift in the behavior, or only in one output format?</text>
<text x="700.0" y="126" text-anchor="middle" font-size="15.5" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">the same held-out items, read two ways every round — a move in one channel without the other is a dissociation, not noise  ·  the reason a single number hides the effect</text>
<rect x="60" y="150" width="250" height="190" rx="10" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.4"/>
<text x="74" y="178.0" font-family="Helvetica, Arial, sans-serif" font-size="15"><tspan fill="#1a1a1a" font-weight="bold">one </tspan><tspan fill="#1a1a1a" font-weight="bold">held-out </tspan><tspan fill="#1a1a1a" font-weight="bold">item </tspan></text>
<text x="74" y="202.0" font-family="Helvetica, Arial, sans-serif" font-size="12.8"><tspan fill="#1a1a1a" font-weight="normal">“Option </tspan><tspan fill="#1a1a1a" font-weight="normal">A: </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">sure </tspan><tspan fill="#1a1a1a" font-weight="normal">$40. </tspan><tspan fill="#1a1a1a" font-weight="normal">Option </tspan></text>
<text x="74" y="219.664" font-family="Helvetica, Arial, sans-serif" font-size="12.8"><tspan fill="#1a1a1a" font-weight="normal">B: </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">50% </tspan><tspan fill="#1a1a1a" font-weight="normal">chance </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">$100.” </tspan><tspan fill="#1a1a1a" font-weight="normal">Read </tspan></text>
<text x="74" y="237.328" font-family="Helvetica, Arial, sans-serif" font-size="12.8"><tspan fill="#1a1a1a" font-weight="normal">every </tspan><tspan fill="#1a1a1a" font-weight="normal">item </tspan><tspan fill="#1a1a1a" font-weight="normal">with </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">gamble </tspan><tspan fill="#1a1a1a" font-weight="normal">as </tspan><tspan fill="#1a1a1a" font-weight="normal">A </tspan></text>
<text x="74" y="254.99200000000002" font-family="Helvetica, Arial, sans-serif" font-size="12.8"><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">as </tspan><tspan fill="#1a1a1a" font-weight="normal">B. </tspan></text>
<rect x="370" y="150" width="970" height="88" rx="10" fill="#eef3fa" stroke="#2867b5" stroke-width="1.8"/>
<text x="386" y="176" font-size="15" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">GENERATED-VALID channel  ·  the primary endpoint</text>
<text x="386" y="198" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">free-prose answer with a strict Final: A/B parse. A malformed answer is invalid, never coded</text>
<text x="386" y="216" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">safe. This is the behavioral coordinate the primary contrast is read on.</text>
<line x1="316" y1="245" x2="364" y2="194" stroke="#6b7684" stroke-width="2.6" marker-end="url(#arr)"/>
<rect x="370" y="250" width="970" height="88" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.8"/>
<text x="386" y="276" font-size="15" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">FORCED channel  ·  a second same-item read</text>
<text x="386" y="298" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">single-token A/B logit read on the identical item. Cheap and low-variance, but it can carry a</text>
<text x="386" y="316" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">“say-B” letter habit the prose answer doesn't — so it is a second channel, not the endpoint.</text>
<line x1="316" y1="245" x2="364" y2="294" stroke="#6b7684" stroke-width="2.6" marker-end="url(#arr)"/>
<text x="60" y="360" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">When the channels move apart — the dissociations already seen</text>
<rect x="60.0" y="378" width="416.0" height="162" rx="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="73.0" y="399" font-size="14" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">install recipe</text>
<text x="73.0" y="419" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">letter-only targets move the FORCED channel</text>
<text x="73.0" y="436" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(plateau ~0.5, then cliff to 0.18 at rate</text>
<text x="73.0" y="453" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">1.0); rationale targets move the GENERATED</text>
<text x="73.0" y="470" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">channel</text>
<text x="73.0" y="493" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">you move the channel you train (instrument</text>
<text x="73.0" y="509" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">lesson)</text>
<rect x="492.0" y="378" width="416.0" height="162" rx="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="505.0" y="399" font-size="14" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">K1 landed — forced channel FAILS</text>
<text x="505.0" y="419" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the generated channel is valid against the</text>
<text x="505.0" y="436" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">binomial null, but the forced channel is</text>
<text x="505.0" y="453" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">order-confounded: endpoint gap 0.347, 34/34</text>
<text x="505.0" y="470" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">reads over the gate</text>
<text x="505.0" y="493" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">a cross-family property of forced reads on</text>
<text x="505.0" y="509" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">trained organisms — K1 rides the generated</text>
<text x="505.0" y="525" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">channel only</text>
<rect x="924.0" y="378" width="416.0" height="162" rx="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="937.0" y="399" font-size="14" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">K2 landed — same forced confound</text>
<text x="937.0" y="419" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the Cerebrium OLMo r0 forced gap 0.46</text>
<text x="937.0" y="436" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">matches K1’s — the forced read wanders on</text>
<text x="937.0" y="453" font-size="12.5" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">trained organisms in both families</text>
<text x="937.0" y="476" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">not a platform artifact; the forced numbers</text>
<text x="937.0" y="492" font-size="12.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">drop to exploratory co-movement</text>
<rect x="60" y="560" width="1280" height="108.38" rx="8" fill="#eef5ee" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="80" y="592.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="bold">How </tspan><tspan fill="#1a1a1a" font-weight="bold">to </tspan><tspan fill="#1a1a1a" font-weight="bold">read </tspan><tspan fill="#1a1a1a" font-weight="bold">it: </tspan><tspan fill="#1a1a1a" font-weight="normal">two </tspan><tspan fill="#1a1a1a" font-weight="normal">channels </tspan><tspan fill="#1a1a1a" font-weight="normal">because </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">cheap </tspan><tspan fill="#1a1a1a" font-weight="normal">single-token </tspan><tspan fill="#1a1a1a" font-weight="normal">read </tspan><tspan fill="#1a1a1a" font-weight="normal">can </tspan><tspan fill="#1a1a1a" font-weight="normal">carry </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">position </tspan><tspan fill="#1a1a1a" font-weight="normal">or </tspan><tspan fill="#1a1a1a" font-weight="normal">letter </tspan><tspan fill="#1a1a1a" font-weight="normal">habit </tspan><tspan fill="#1a1a1a" font-weight="normal">that </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">prose </tspan><tspan fill="#1a1a1a" font-weight="normal">behavior </tspan><tspan fill="#1a1a1a" font-weight="normal">does </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">and, </tspan><tspan fill="#1a1a1a" font-weight="normal">in </tspan></text>
<text x="80" y="615.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">installs, </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">reverse. </tspan><tspan fill="#1a1a1a" font-weight="normal">Round-wise </tspan><tspan fill="#1a1a1a" font-weight="normal">co-movement </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">two </tspan><tspan fill="#1a1a1a" font-weight="normal">channels </tspan><tspan fill="#1a1a1a" font-weight="normal">while </tspan><tspan fill="#1a1a1a" font-weight="normal">selection </tspan><tspan fill="#1a1a1a" font-weight="normal">acts </tspan><tspan fill="#1a1a1a" font-weight="normal">only </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">generated </tspan><tspan fill="#1a1a1a" font-weight="normal">answers </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">one </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">K2's </tspan><tspan fill="#1a1a1a" font-weight="normal">three </tspan></text>
<text x="80" y="638.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">discovery-grade </tspan><tspan fill="#1a1a1a" font-weight="normal">reads. </tspan><tspan fill="#1a1a1a" font-weight="normal">A </tspan><tspan fill="#1a1a1a" font-weight="normal">result </tspan><tspan fill="#1a1a1a" font-weight="normal">quoted </tspan><tspan fill="#1a1a1a" font-weight="normal">as </tspan><tspan fill="#1a1a1a" font-weight="normal">one </tspan><tspan fill="#1a1a1a" font-weight="normal">number </tspan><tspan fill="#1a1a1a" font-weight="normal">would </tspan><tspan fill="#1a1a1a" font-weight="normal">average </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">dissociation </tspan><tspan fill="#1a1a1a" font-weight="normal">away. </tspan></text>
</svg>