<text x="80" y="612.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="bold">How </tspan><tspan fill="#1a1a1a" font-weight="bold">to </tspan><tspan fill="#1a1a1a" font-weight="bold">read </tspan><tspan fill="#1a1a1a" font-weight="bold">it: </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">seed </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">unit </tspan><tspan fill="#1a1a1a" font-weight="normal">because </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">rounds </tspan><tspan fill="#1a1a1a" font-weight="normal">within </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">rollout </tspan><tspan fill="#1a1a1a" font-weight="normal">are </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">independent </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">items </tspan><tspan fill="#1a1a1a" font-weight="normal">are </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">experiment. </tspan><tspan fill="#1a1a1a" font-weight="normal">Pairing </tspan><tspan fill="#1a1a1a" font-weight="normal">against </tspan></text>
<text x="80" y="635.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">same-seed </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-base </tspan><tspan fill="#1a1a1a" font-weight="normal">arm </tspan><tspan fill="#1a1a1a" font-weight="normal">removes </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">between-seed </tspan><tspan fill="#1a1a1a" font-weight="normal">starting-point </tspan><tspan fill="#1a1a1a" font-weight="normal">variance. </tspan><tspan fill="#1a1a1a" font-weight="normal">K1’s </tspan><tspan fill="#1a1a1a" font-weight="normal">landed </tspan><tspan fill="#1a1a1a" font-weight="normal">paired </tspan><tspan fill="#1a1a1a" font-weight="normal">primary </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">−0.34 </tspan><tspan fill="#1a1a1a" font-weight="normal">/ </tspan><tspan fill="#1a1a1a" font-weight="normal">+0.24 </tspan><tspan fill="#1a1a1a" font-weight="normal">/ </tspan><tspan fill="#1a1a1a" font-weight="normal">+0.28 </tspan><tspan fill="#1a1a1a" font-weight="normal">/ </tspan><tspan fill="#1a1a1a" font-weight="normal">+0.41 </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan></text>
<text x="80" y="658.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">positive-leaning </tspan><tspan fill="#1a1a1a" font-weight="normal">with </tspan><tspan fill="#1a1a1a" font-weight="normal">one </tspan><tspan fill="#1a1a1a" font-weight="normal">large </tspan><tspan fill="#1a1a1a" font-weight="normal">negative, </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">distribution </tspan><tspan fill="#1a1a1a" font-weight="normal">to </tspan><tspan fill="#1a1a1a" font-weight="normal">show </tspan><tspan fill="#1a1a1a" font-weight="normal">at </tspan><tspan fill="#1a1a1a" font-weight="normal">n </tspan><tspan fill="#1a1a1a" font-weight="normal">= </tspan><tspan fill="#1a1a1a" font-weight="normal">4, </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">test </tspan><tspan fill="#1a1a1a" font-weight="normal">to </tspan><tspan fill="#1a1a1a" font-weight="normal">pass; </tspan><tspan fill="#1a1a1a" font-weight="normal">“basins” </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">claimed. </tspan><tspan fill="#1a1a1a" font-weight="normal">K2’s </tspan><tspan fill="#1a1a1a" font-weight="normal">confirmatory </tspan><tspan fill="#1a1a1a" font-weight="normal">contrast </tspan></text>
<text x="80" y="682.38" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">(frozen-conservative </tspan><tspan fill="#1a1a1a" font-weight="normal">minus </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-base) </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">landing </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">same </tspan><tspan fill="#1a1a1a" font-weight="normal">way, </tspan><tspan fill="#1a1a1a" font-weight="normal">every </tspan><tspan fill="#1a1a1a" font-weight="normal">conservative </tspan><tspan fill="#1a1a1a" font-weight="normal">seed </tspan><tspan fill="#1a1a1a" font-weight="normal">below </tspan><tspan fill="#1a1a1a" font-weight="normal">start, </tspan><tspan fill="#1a1a1a" font-weight="normal">read </tspan><tspan fill="#1a1a1a" font-weight="normal">against </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">screen’s </tspan><tspan fill="#1a1a1a" font-weight="normal">measured </tspan><tspan fill="#1a1a1a" font-weight="normal">force </tspan></text>
<text x="80" y="705.84" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">0.100 </tspan><tspan fill="#1a1a1a" font-weight="normal">± </tspan><tspan fill="#1a1a1a" font-weight="normal">0.093. </tspan><tspan fill="#1a1a1a" font-weight="normal">The </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-base </tspan><tspan fill="#1a1a1a" font-weight="normal">baseline </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">honestly </tspan><tspan fill="#1a1a1a" font-weight="normal">n </tspan><tspan fill="#1a1a1a" font-weight="normal">= </tspan><tspan fill="#1a1a1a" font-weight="normal">4. </tspan></text>
