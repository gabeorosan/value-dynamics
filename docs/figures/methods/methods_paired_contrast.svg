<text x="700.0" y="52" text-anchor="middle" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Method 2 — the paired, baseline-adjusted contrast:</text>
<text x="700.0" y="92" text-anchor="middle" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the rollout seed is the unit, and the spread is part of the answer</text>
<text x="700.0" y="126" text-anchor="middle" font-size="15.5" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">the primary behavioral claim — computed at the seed level, paired against a frozen-base rollout, never at the round or item level  ·  docs/PLAN.md K1/K2 endpoints</text>
<rect x="60" y="152" width="400.0" height="150" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.8"/>
<text x="75" y="180" font-size="15.5" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">one rollout seed = one unit</text>
<text x="75" y="204" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">each seed runs the treatment arm AND a frozen-base arm from</text>
<text x="75" y="221" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the same start; the seed, not the round or the item, is what</text>
<text x="75" y="238" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">is counted</text>
<line x1="464.0" y1="227.0" x2="496.0" y2="227.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<rect x="500.0" y="152" width="400.0" height="150" rx="10" fill="#eef3fa" stroke="#2867b5" stroke-width="1.8"/>
<text x="515.0" y="180" font-size="15.5" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">per-seed paired difference</text>
<text x="515.0" y="204" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">final generated-valid risk of the treatment arm MINUS the</text>
<text x="515.0" y="221" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">frozen-base arm, within the same seed — cross-seed nuisance</text>
<text x="515.0" y="238" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">variance cancels</text>
<line x1="904.0" y1="227.0" x2="936.0" y2="227.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<rect x="940.0" y="152" width="400.0" height="150" rx="10" fill="#eef5ee" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="955.0" y="180" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">distribution over seeds</text>
<text x="955.0" y="204" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">average the paired differences AND report their spread; for</text>
<text x="955.0" y="221" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">K2 both the magnitude and the six-seed spread are the</text>
<text x="955.0" y="238" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">deliverable</text>
<text x="60" y="332" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The paired picture (illustrative — shows the computation; K2 runs six confirmatory seeds)</text>
