<text x="80" y="676.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="bold">How </tspan><tspan fill="#1a1a1a" font-weight="bold">to </tspan><tspan fill="#1a1a1a" font-weight="bold">read </tspan><tspan fill="#1a1a1a" font-weight="bold">it: </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">seed </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">unit </tspan><tspan fill="#1a1a1a" font-weight="normal">because </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">rounds </tspan><tspan fill="#1a1a1a" font-weight="normal">within </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">rollout </tspan><tspan fill="#1a1a1a" font-weight="normal">are </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">independent </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">items </tspan><tspan fill="#1a1a1a" font-weight="normal">are </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">experiment. </tspan><tspan fill="#1a1a1a" font-weight="normal">Pairing </tspan><tspan fill="#1a1a1a" font-weight="normal">against </tspan></text>
<text x="80" y="699.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">same-seed </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-base </tspan><tspan fill="#1a1a1a" font-weight="normal">arm </tspan><tspan fill="#1a1a1a" font-weight="normal">removes </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">between-seed </tspan><tspan fill="#1a1a1a" font-weight="normal">starting-point </tspan><tspan fill="#1a1a1a" font-weight="normal">variance. </tspan><tspan fill="#1a1a1a" font-weight="normal">K2's </tspan><tspan fill="#1a1a1a" font-weight="normal">confirmatory </tspan><tspan fill="#1a1a1a" font-weight="normal">contrast </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-conservative </tspan><tspan fill="#1a1a1a" font-weight="normal">minus </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-base </tspan></text>
<text x="80" y="722.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">over </tspan><tspan fill="#1a1a1a" font-weight="normal">six </tspan><tspan fill="#1a1a1a" font-weight="normal">seeds; </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">four-seed </tspan><tspan fill="#1a1a1a" font-weight="normal">fan </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">trajectory </tspan><tspan fill="#1a1a1a" font-weight="normal">AUC </tspan><tspan fill="#1a1a1a" font-weight="normal">are </tspan><tspan fill="#1a1a1a" font-weight="normal">secondary; </tspan><tspan fill="#1a1a1a" font-weight="normal">“basins” </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">claimed. </tspan><tspan fill="#1a1a1a" font-weight="normal">The </tspan><tspan fill="#1a1a1a" font-weight="normal">screen </tspan><tspan fill="#1a1a1a" font-weight="normal">measured </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">per-round </tspan><tspan fill="#1a1a1a" font-weight="normal">force </tspan><tspan fill="#1a1a1a" font-weight="normal">at </tspan><tspan fill="#1a1a1a" font-weight="normal">0.100 </tspan><tspan fill="#1a1a1a" font-weight="normal">± </tspan></text>
<text x="80" y="746.38" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">0.093 </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">flat </tspan><tspan fill="#1a1a1a" font-weight="normal">set </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">differences </tspan><tspan fill="#1a1a1a" font-weight="normal">UNDER </tspan><tspan fill="#1a1a1a" font-weight="normal">that </tspan><tspan fill="#1a1a1a" font-weight="normal">passing </tspan><tspan fill="#1a1a1a" font-weight="normal">screen </tspan><tspan fill="#1a1a1a" font-weight="normal">reads </tspan><tspan fill="#1a1a1a" font-weight="normal">as </tspan><tspan fill="#1a1a1a" font-weight="normal">dose </tspan><tspan fill="#1a1a1a" font-weight="normal">insufficiency, </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">“no </tspan><tspan fill="#1a1a1a" font-weight="normal">force.” </tspan><tspan fill="#1a1a1a" font-weight="normal">The </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen-base </tspan><tspan fill="#1a1a1a" font-weight="normal">baseline </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">honestly </tspan><tspan fill="#1a1a1a" font-weight="normal">n </tspan><tspan fill="#1a1a1a" font-weight="normal">= </tspan><tspan fill="#1a1a1a" font-weight="normal">4 </tspan></text>
<text x="80" y="769.84" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">independent </tspan><tspan fill="#1a1a1a" font-weight="normal">rollouts. </tspan></text>
