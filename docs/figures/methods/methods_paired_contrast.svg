<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 839.3" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="839.3" fill="white"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker>
 <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
