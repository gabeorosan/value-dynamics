<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 381" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="381" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">Cross-model transfer and rare events are read as contrasts and counts</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">Neither is turned into a single percentage the handful of runs can't support.</text>
<rect x="60.0" y="131" width="620.0" height="210" rx="12" fill="#eef3fa" stroke="#2867b5" stroke-width="1.8"/>
<text x="84.0" y="173" font-size="22" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">Comparing trajectories</text>
<circle cx="90.0" cy="207" r="4" fill="#2867b5"/>
<text x="106.0" y="213.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Take the per-round difference between a model under one</text>
<text x="106.0" y="239.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">judge and an untrained control, on the same fresh model.</text>
<circle cx="90.0" cy="276.2" r="4" fill="#2867b5"/>
<text x="106.0" y="282.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">The result is a steering-force profile, not “X%</text>
<text x="106.0" y="308.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">transmitted.”</text>
<rect x="720.0" y="131" width="620.0" height="210" rx="12" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.8"/>
<text x="744.0" y="173" font-size="22" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">Counting rare events</text>
<circle cx="750.0" cy="207" r="4" fill="#3a7d44"/>
<text x="766.0" y="213.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">The insecure-code model's insecure answers are counted as k</text>
<text x="766.0" y="239.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">of n, with a confidence interval.</text>
<circle cx="750.0" cy="276.2" r="4" fill="#3a7d44"/>
<text x="766.0" y="282.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Each round seeds the next, so counts are never pooled</text>
<text x="766.0" y="308.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">across rounds as if independent.</text>
</svg>