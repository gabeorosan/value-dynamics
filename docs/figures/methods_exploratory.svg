<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 381" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="381" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">Exploratory reads: reported, but not headlined</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">The design can't cleanly separate these from simpler explanations, so they don't carry a claim.</text>
<rect x="60.0" y="131" width="620.0" height="210" rx="12" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.8"/>
<text x="84.0" y="173" font-size="22" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Drift-field fit</text>
<circle cx="90.0" cy="207" r="4" fill="#6b7684"/>
<text x="106.0" y="213.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Fit each round's change against its level to look for a</text>
<text x="106.0" y="239.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">stable balance point.</text>
<circle cx="90.0" cy="276.2" r="4" fill="#6b7684"/>
<text x="106.0" y="282.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">On a bounded, noisy measure, regression to the mean</text>
<text x="106.0" y="308.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">produces the same shape.</text>
<rect x="720.0" y="131" width="620.0" height="210" rx="12" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.8"/>
<text x="744.0" y="173" font-size="22" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Cross-lag and mediation</text>
<circle cx="750.0" cy="207" r="4" fill="#6b7684"/>
<text x="766.0" y="213.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Does the judge's taste at one round predict behavior the</text>
<text x="766.0" y="239.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">next — and the reverse?</text>
<circle cx="750.0" cy="276.2" r="4" fill="#6b7684"/>
<text x="766.0" y="282.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">The judge-loading read (method 3) now carries this</text>
<text x="766.0" y="308.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">question.</text>
</svg>