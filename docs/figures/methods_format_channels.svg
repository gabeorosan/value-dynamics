<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 381" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="381" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">The same item is read two ways each round</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">A move in one format without the other is a real dissociation, not noise.</text>
<rect x="60" y="131" width="290" height="210" rx="12" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.4"/>
<text x="78" y="167" font-size="19" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">one held-out item</text>
<text x="78" y="199.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">“Option A: a sure $40.</text>
<text x="78" y="224.2" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">Option B: a 50% chance of</text>
<text x="78" y="249.4" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">$100.” Read once with the</text>
<text x="78" y="274.6" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">gamble as A, once as B.</text>
<rect x="420" y="131" width="920" height="96" rx="12" fill="#eef3fa" stroke="#2867b5" stroke-width="1.8"/>
<text x="440" y="165" font-size="19" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">Free-written answer  ·  the main read</text>
<text x="440" y="193" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The model writes a full answer that must end in a clear choice. An unparseable answer is</text>
<text x="440" y="217" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">never counted as safe.</text>
<line x1="358" y1="236.0" x2="412" y2="179.0" stroke="#6b7684" stroke-width="2.6" marker-end="url(#arrg)"/>
<rect x="420" y="245" width="920" height="96" rx="12" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.8"/>
<text x="440" y="279" font-size="19" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">Forced single letter  ·  a second read</text>
<text x="440" y="307" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The model is scored on one A/B token for the same item — cheap, but it can carry a letter</text>
<text x="440" y="331" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">habit the written answer doesn't.</text>
<line x1="358" y1="236.0" x2="412" y2="293.0" stroke="#6b7684" stroke-width="2.6" marker-end="url(#arrg)"/>
</svg>