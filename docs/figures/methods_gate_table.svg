<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 547" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="547" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">Five checks certify the measurement before a trajectory is read</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">A position habit or answer-format bias can look like a value shift; each check rules one out.</text>
<rect x="60" y="129" width="320" height="74" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.4"/>
<text x="78" y="173.0" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Order balance</text>
<rect x="400" y="129" width="700" height="74" rx="10" fill="white" stroke="#6b7684" stroke-width="1.1"/>
<text x="418" y="160.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Each round makes half its items with the gamble as A, half as</text>
<text x="418" y="184.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">B.</text>
<text x="1124" y="172.0" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">50 / 50 by design</text>
<rect x="60" y="215" width="320" height="60" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.4"/>
<text x="78" y="252.0" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Order sensitivity</text>
<rect x="400" y="215" width="700" height="60" rx="10" fill="white" stroke="#6b7684" stroke-width="1.1"/>
<text x="418" y="251.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">How far the choice moves when the gamble swaps letter.</text>
<text x="1124" y="251.0" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">must stay small</text>
<rect x="60" y="287" width="320" height="74" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.4"/>
<text x="78" y="331.0" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Unparseable answers</text>
<rect x="400" y="287" width="700" height="74" rx="10" fill="white" stroke="#6b7684" stroke-width="1.1"/>
<text x="418" y="318.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Free answers with no clear choice — never counted as the safe</text>
<text x="418" y="342.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">option.</text>
<text x="1124" y="330.0" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">logged apart</text>
<rect x="60" y="373" width="320" height="60" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.4"/>
<text x="78" y="410.0" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Payoff arithmetic</text>
<rect x="400" y="373" width="700" height="60" rx="10" fill="white" stroke="#6b7684" stroke-width="1.1"/>
<text x="418" y="409.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Can it still name the higher-payoff option after the update?</text>
<text x="1124" y="409.0" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">no drop</text>
<rect x="60" y="445" width="320" height="60" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.4"/>
<text x="78" y="482.0" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Untrained drift</text>
<rect x="400" y="445" width="700" height="60" rx="10" fill="white" stroke="#6b7684" stroke-width="1.1"/>
<text x="418" y="481.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">A model probed every round but never trained.</text>
<text x="1124" y="469.0" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">the baseline others</text>
<text x="1124" y="493.0" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">are read against</text>
</svg>