<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 473" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="473" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">What the judge's selection puts into the training data</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">Score every answer, keep the top two, and measure how far the kept set sits above the pool.</text>
<rect x="90.0" y="127" width="372" height="64" rx="12" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="276.0" y="166.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">score every answer</text>
<text x="488.0" y="169.0" text-anchor="middle" font-size="30" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="514.0" y="127" width="372" height="64" rx="12" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="700.0" y="166.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">keep the top 2 of 6</text>
<text x="912.0" y="169.0" text-anchor="middle" font-size="30" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">&#8594;</text>
<rect x="938.0" y="127" width="372" height="64" rx="12" fill="#eef2f6" stroke="#6b7684" stroke-width="1.5"/>
<text x="1124.0" y="166.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">kept minus pool = the shift</text>
<rect x="60" y="235" width="1280" height="40" rx="8" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.2"/>
<text x="78" y="262" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">what selected the kept answers</text>
<text x="656.6666666666666" y="262" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">risk</text>
<text x="929.9999999999999" y="262" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">insecure code</text>
<text x="1203.3333333333333" y="262" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">self-report of insecure code</text>
<rect x="60" y="275" width="1280" height="48" rx="0" fill="white" stroke="#6b7684" stroke-width="1.0"/>
<text x="78" y="306" font-size="18" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">no selection (baseline)</text>
<text x="656.6666666666666" y="306" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">-0.04</text>
<text x="929.9999999999999" y="306" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">-0.04</text>
<text x="1203.3333333333333" y="306" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">+0.04</text>
<rect x="60" y="323" width="1280" height="48" rx="0" fill="#eef7f0" stroke="#6b7684" stroke-width="1.0"/>
<text x="78" y="354" font-size="18" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">a risk-selecting judge</text>
<text x="656.6666666666666" y="354" text-anchor="middle" font-size="18" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">+0.08</text>
<text x="929.9999999999999" y="354" text-anchor="middle" font-size="18" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">+0.06</text>
<text x="1203.3333333333333" y="354" text-anchor="middle" font-size="18" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">+0.04</text>
<rect x="60" y="371" width="1280" height="48" rx="0" fill="#eef3fa" stroke="#6b7684" stroke-width="1.0"/>
<text x="78" y="402" font-size="18" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">a self-report-selecting judge</text>
<text x="656.6666666666666" y="402" text-anchor="middle" font-size="18" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">-0.10</text>
<text x="929.9999999999999" y="402" text-anchor="middle" font-size="18" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">-0.01</text>
<text x="1203.3333333333333" y="402" text-anchor="middle" font-size="18" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">+0.13</text>
<text x="60" y="445" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Positive means the kept answers sit above the pool average on that axis.</text>
</svg>