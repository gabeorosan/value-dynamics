<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 779" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="779" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">How each result is measured</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">Eight readouts, ordered so each certifies the measurement the next one uses.</text>
<rect x="60" y="125" width="1280" height="66" rx="10" fill="#eef7f0" stroke="#3a7d44" stroke-width="1.6"/>
<circle cx="100" cy="158.0" r="20" fill="#3a7d44"/>
<text x="100" y="166.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">1</text>
<text x="144" y="166.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Instrument gates</text>
<text x="1316" y="165.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">certify the measurement before reading it</text>
<rect x="60" y="203" width="1280" height="66" rx="10" fill="#eef3fa" stroke="#2867b5" stroke-width="1.6"/>
<circle cx="100" cy="236.0" r="20" fill="#2867b5"/>
<text x="100" y="244.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">2</text>
<text x="144" y="244.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Paired seed contrast</text>
<text x="1316" y="243.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">the treated run minus its untrained twin</text>
<rect x="60" y="281" width="1280" height="66" rx="10" fill="#eef3fa" stroke="#2867b5" stroke-width="1.6"/>
<circle cx="100" cy="314.0" r="20" fill="#2867b5"/>
<text x="100" y="322.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">3</text>
<text x="144" y="322.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Judge loading</text>
<text x="1316" y="321.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">what selection puts into the training data</text>
<rect x="60" y="359" width="1280" height="66" rx="10" fill="#eef3fa" stroke="#2867b5" stroke-width="1.6"/>
<circle cx="100" cy="392.0" r="20" fill="#2867b5"/>
<text x="100" y="400.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">4</text>
<text x="144" y="400.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Two answer formats</text>
<text x="1316" y="399.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">free-written choice and forced single letter</text>
<rect x="60" y="437" width="1280" height="66" rx="10" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.6"/>
<circle cx="100" cy="470.0" r="20" fill="#6b7684"/>
<text x="100" y="478.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">5</text>
<text x="144" y="478.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Update geometry</text>
<text x="1316" y="477.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">how the weights moved</text>
<rect x="60" y="515" width="1280" height="66" rx="10" fill="#f4f4f1" stroke="#6b7684" stroke-width="1.6"/>
<circle cx="100" cy="548.0" r="20" fill="#6b7684"/>
<text x="100" y="556.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">6</text>
<text x="144" y="556.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Contrasts and counts</text>
<text x="1316" y="555.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">rare events and transfer, read honestly</text>
<rect x="60" y="593" width="1280" height="66" rx="10" fill="#fdf8ee" stroke="#9a6b15" stroke-width="1.6"/>
<circle cx="100" cy="626.0" r="20" fill="#9a6b15"/>
<text x="100" y="634.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">7</text>
<text x="144" y="634.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Specificity ratio</text>
<text x="1316" y="633.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">targeted change, not battery-wide drift</text>
<rect x="60" y="671" width="1280" height="66" rx="10" fill="#fbf0ee" stroke="#b5342c" stroke-width="1.6"/>
<circle cx="100" cy="704.0" r="20" fill="#b5342c"/>
<text x="100" y="712.0" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Helvetica, Arial, sans-serif">8</text>
<text x="144" y="712.0" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Exploratory reads</text>
<text x="1316" y="711.0" text-anchor="end" font-size="19" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">reported, but not headlined</text>
</svg>