<text x="955.0" y="206" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">compare the ratio to the random-selection arm (the</text>
<text x="955.0" y="223" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">generic-drift floor); apply BH/FDR within the labeled</text>
