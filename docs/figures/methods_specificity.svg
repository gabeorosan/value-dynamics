<text x="700.0" y="52" text-anchor="middle" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Method 7 — the probe-specificity ratio:</text>
<text x="700.0" y="92" text-anchor="middle" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">is the change targeted, or is the whole battery drifting?</text>
<text x="700.0" y="126" text-anchor="middle" font-size="15.5" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">the riding battery read without fishing — standardize, ratio against the off-target RMS, compare to the random arm, control the false-discovery rate  ·  report_offtarget_optimism_tracer.md, fig10</text>
<rect x="60" y="154" width="400.0" height="150" rx="10" fill="white" stroke="#6b7684" stroke-width="1.8"/>
<text x="75" y="182" font-size="15.5" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">standardize each probe</text>
<text x="75" y="206" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">divide every probe’s round-over-round change by its OWN</text>
<text x="75" y="223" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">measure-only / item-level variation — a z-score, so a noisy</text>
<text x="75" y="240" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">probe and a quiet one are comparable</text>
<line x1="464.0" y1="229.0" x2="496.0" y2="229.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<rect x="500.0" y="154" width="400.0" height="150" rx="10" fill="#fdf8ee" stroke="#9a6b15" stroke-width="1.8"/>
<text x="515.0" y="182" font-size="15.5" font-weight="bold" fill="#9a6b15" font-family="Helvetica, Arial, sans-serif">target ÷ off-target RMS</text>
<text x="515.0" y="206" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">specificity ratio = the standardized target change divided</text>
<text x="515.0" y="223" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">by the root-mean-square of the standardized off-target</text>
<text x="515.0" y="240" font-size="12.8" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">changes</text>
<line x1="904.0" y1="229.0" x2="936.0" y2="229.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
