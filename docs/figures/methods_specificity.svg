<text x="848.0" y="299.3333333333333" text-anchor="middle" font-size="18" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.7</text>
<text x="848.0" y="375" text-anchor="middle" font-size="17" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">wishful</text>
<text x="100" y="159" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">standardized change</text>
<line x1="88" y1="349" x2="908" y2="349" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="104" y="399" font-size="17" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">the target</text>
<text x="244" y="399" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">the off-target probes</text>
<text x="964" y="189" font-size="21" font-weight="bold" fill="#9a6b15" font-family="Helvetica, Arial, sans-serif">specificity ratio</text>
<text x="964" y="225.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">= target 2.6 ÷ off-target spread 0.77 ≈</text>
<text x="964" y="251.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">3.4. The risk move is about three times</text>
<text x="964" y="278.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the off-target scatter, and clears the</text>
<text x="964" y="304.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">random-selection floor.</text>
