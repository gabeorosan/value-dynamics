<text x="148.0" y="191.66666666666666" text-anchor="middle" font-size="18" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">2.6</text>
<text x="148.0" y="375" text-anchor="middle" font-size="17" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">risk</text>
<rect x="240" y="298.0" width="96" height="51.0" fill="#6b7684" rx="4"/>
<text x="288.0" y="288.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.9</text>
<text x="288.0" y="375" text-anchor="middle" font-size="17" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">corrig.</text>
<rect x="380" y="286.6666666666667" width="96" height="62.333333333333336" fill="#6b7684" rx="4"/>
<text x="428.0" y="276.6666666666667" text-anchor="middle" font-size="18" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">1.1</text>
<text x="428.0" y="375" text-anchor="middle" font-size="17" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">optimism</text>
<rect x="520" y="315.0" width="96" height="34.0" fill="#6b7684" rx="4"/>
<text x="568.0" y="305.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.6</text>
<text x="568.0" y="375" text-anchor="middle" font-size="17" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">agreeable</text>
<rect x="660" y="326.3333333333333" width="96" height="22.666666666666668" fill="#6b7684" rx="4"/>
<text x="708.0" y="316.3333333333333" text-anchor="middle" font-size="18" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.4</text>
<text x="708.0" y="375" text-anchor="middle" font-size="17" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">identity</text>
