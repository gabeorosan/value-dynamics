<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">Is the change targeted, or is the whole battery drifting?</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">Standardize each probe by its own noise, then divide the target change by the off-target spread.</text>
