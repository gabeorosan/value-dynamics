<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 385" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="385" fill="white"/>
<defs><marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7684"/></marker></defs>
<text x="700.0" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">The weight change is measured from the merged update</text>
<text x="700.0" y="93" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#6b7684">The same adapter can be written many ways; only the merged update stays fixed, so we track that.</text>
<rect x="270.0" y="149" width="210" height="130" rx="12" fill="white" stroke="#6b7684" stroke-width="2.0"/>
<text x="375.0" y="221.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">adapter factor B</text>
<rect x="550.0" y="149" width="210" height="130" rx="12" fill="white" stroke="#6b7684" stroke-width="2.0"/>
<text x="655.0" y="221.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">adapter factor A</text>
<rect x="830.0" y="149" width="300" height="130" rx="12" fill="#eef7f0" stroke="#3a7d44" stroke-width="2.0"/>
<text x="980.0" y="221.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#3a7d44">merged update ΔW = B · A</text>
<text x="515.0" y="224.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="normal" fill="#6b7684">×</text>
<text x="795.0" y="224.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="normal" fill="#6b7684">=</text>
<text x="700.0" y="325" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Rewrite the two factors however you like — the merged update B · A doesn't change.</text>
<text x="700.0" y="355" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">We track that merged update relative to round 0.</text>
</svg>