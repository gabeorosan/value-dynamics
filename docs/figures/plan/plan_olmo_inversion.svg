<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1166.84" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="1166.84" fill="white"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker></defs>
<text x="700.0" y="52" text-anchor="middle" font-size="33" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Phase 1B — the OLMo judge swap: mapping the trajectories</text>
<text x="700.0" y="94" text-anchor="middle" font-size="33" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">of self-training under an installed conservative taste</text>
<text x="700.0" y="126" text-anchor="middle" font-size="16" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">legacy OLMo railed to risk ≈ 1.0 under BOTH judges — install the opposite preference and map the force it exerts; the install itself became a result (the triple dissociation)</text>
<rect x="50" y="168" width="316" height="450" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="64" y="196" font-size="15.5" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">1 · stage screen (done)</text>
<text x="64" y="224" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The repaired battery on OLMo 3’s released</text>
<text x="64" y="242" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">stages, inference-only, pinned revisions.</text>
<text x="64" y="260" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Result: position bias collapses across the</text>
<text x="64" y="278" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">release flow (order gap 0.72 → 0.35 → 0.08)</text>
<text x="64" y="296" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">and only the final Instruct stage passes;</text>
<text x="64" y="314" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">gamble-favoring emerges at SFT and</text>
<text x="64" y="332" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">strengthens (generated gamble 0.46 → 0.58 →</text>
<text x="64" y="350" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">0.67) while judge taste stays near-neutral</text>
<text x="64" y="368" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">throughout (0.47 → 0.54 → 0.52). Start from</text>
<text x="64" y="386" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">final Instruct — risk 0.72 with headroom</text>
<text x="64" y="404" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">down, and an almost blank judging prior to</text>
<text x="64" y="422" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">install the conservative preference onto.</text>
<rect x="382" y="168" width="316" height="450" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="396" y="196" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">2 · install the organism —</text>
<text x="396" y="218" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">instrument checks, not the claim</text>
<text x="396" y="240" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(v10 next)</text>
<text x="396" y="268" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Behavior-format ladders (v2–v6) are</text>
<text x="396" y="286" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">TASTE-INERT: v6 passed its behavior gates</text>
<text x="396" y="304" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">but the strict screen found judge separation</text>
<text x="396" y="322" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">0.000, generic taste flat 0.49–0.53 across</text>
<text x="396" y="340" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">every rung. Judge-format training rows fixed</text>
<text x="396" y="358" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">it — v7's registered dose-response confirmed</text>
<text x="396" y="376" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(cautious_judge_pref 0.426→0.927): the</text>
<text x="396" y="394" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">TRIPLE dissociation — letter→forced,</text>
<text x="396" y="412" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">rationale→generated, judge-rows→judging. v8</text>
<text x="396" y="430" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(1:2:1) landed ALL SEVEN gates but failed</text>
<text x="396" y="448" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the screen on separation (sign replicated,</text>
<text x="396" y="466" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">gaps ~0.02); v9's diluted judge rows dosed</text>
<text x="396" y="484" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">slower and its order gap wandered —</text>
<text x="396" y="502" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">exhausted. v10 tops up only the judge</text>
<text x="396" y="520" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">channel from the v8 organism, re-verdicting</text>
<text x="396" y="538" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">all gates per rung. The gates + screen</text>
<text x="396" y="556" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">certify the judge-swap manipulation is</text>
<text x="396" y="574" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">non-null; if v10 still fails, K2 reports an</text>
<text x="396" y="592" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">existence-of-organism failure honestly.</text>
<rect x="714" y="168" width="316" height="450" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="728" y="196" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">3 · clone into four arms — repowered</text>
<text x="728" y="218" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">6+3, launches on gate-pass</text>
<text x="728" y="246" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The identical conservative adapter starts</text>
<text x="728" y="264" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">every arm. 6 seeds × 4 rounds on the</text>
<text x="728" y="282" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">confirmatory contrast (frozen conservative</text>
<text x="728" y="300" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">vs frozen base) + 3 seeds on the mechanistic</text>
<text x="728" y="318" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">controls (evolving self, random) — ~20.5 h,</text>
<text x="728" y="336" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">funded by deferring K4, and first in the</text>
<text x="728" y="354" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">launch order the moment a v10 rung passes</text>
<text x="728" y="372" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">all gates plus the sha-bound strict screen.</text>
<text x="728" y="390" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Controls thin to 2 seeds under pressure; the</text>
<text x="728" y="408" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">six-seed contrast never.</text>
<rect x="1046" y="168" width="316" height="450" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="1060" y="196" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">4 · map the trajectories</text>
<text x="1060" y="224" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The analysis object: per-round drift rates</text>
<text x="1060" y="242" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">and their six-seed spread in each judge</text>
<text x="1060" y="260" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">condition, settling structure over rounds,</text>
<text x="1060" y="278" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">generated/forced/judge channel co-movement,</text>
<text x="1060" y="296" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">off-target coupling — the judge contrast</text>
<text x="1060" y="314" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">read as a measured force difference against</text>
<text x="1060" y="332" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the loop's own drift (frozen-base arm).</text>
<text x="1060" y="350" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Mechanism read: candidate-level judge</text>
<text x="1060" y="368" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">loading on the actual pools; kept-minus-pool</text>
<text x="1060" y="386" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">gaps are manipulation checks.</text>
<line x1="367" y1="393.0" x2="381" y2="393.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<line x1="699" y1="393.0" x2="713" y2="393.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<line x1="1031" y1="393.0" x2="1045" y2="393.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<text x="58" y="652" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Preregistered trajectory readings — what different map shapes mean (written down before the run)</text>
<rect x="50" y="672" width="1300" height="75" fill="#fbf0ee" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="696" font-size="14" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">the two frozen-judge arms show separated per-round drift-rate</text>
<text x="64" y="715" font-size="14" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">distributions</text>
<text x="644" y="696" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the installed taste is a measurable steering force — its magnitude, onset</text>
<text x="644" y="715" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">round, settling structure, and seed spread ARE the deliverable (not the sign,</text>
<text x="644" y="734" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">which is expected)</text>
<rect x="50" y="747" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="771" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the drift-rate distributions overlap — both frozen arms drift</text>
<text x="64" y="790" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the same way</text>
<text x="644" y="771" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the substrate’s own loop drift dominates the deployable-dose judge force; the</text>
<text x="644" y="790" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">map bounds how strong selection pressure is at this dose</text>
<rect x="50" y="803" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="827" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the evolving-self arm’s drift profile diverges from the</text>
<text x="64" y="846" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">frozen-conservative arm’s</text>
<text x="644" y="827" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">criterion drift adds a force beyond round-0 taste — the co-evolution term,</text>
<text x="644" y="846" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">measured as a difference of force profiles</text>
<rect x="50" y="859" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="883" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the random arm’s trajectories match the judge-directed arms’</text>
<text x="644" y="883" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">selection contributes little beyond generic update pressure at this dose — the</text>
<text x="644" y="902" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">deflationary map</text>
<rect x="50" y="915" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="939" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">channels decouple along the trajectories (generated moves</text>
<text x="64" y="958" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">while forced/judge readouts do not, or vice versa)</text>
<text x="644" y="939" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the co-movement map extends the triple dissociation from installs to the loop</text>
<text x="644" y="958" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">itself</text>
<text x="64" y="668" font-size="0" fill="none"> </text>
<rect x="50" y="995" width="1300" height="131.83999999999992" rx="8" fill="#eef5ee" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="70" y="1027.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="bold">Why </tspan><tspan fill="#1a1a1a" font-weight="bold">this </tspan><tspan fill="#1a1a1a" font-weight="bold">is </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">headline: </tspan><tspan fill="#1a1a1a" font-weight="normal">it </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">first </tspan><tspan fill="#1a1a1a" font-weight="normal">arm </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">project </tspan><tspan fill="#1a1a1a" font-weight="normal">where </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">judging </tspan><tspan fill="#1a1a1a" font-weight="normal">force </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">set </tspan><tspan fill="#1a1a1a" font-weight="normal">by </tspan><tspan fill="#1a1a1a" font-weight="normal">construction </tspan><tspan fill="#1a1a1a" font-weight="normal">rather </tspan><tspan fill="#1a1a1a" font-weight="normal">than </tspan><tspan fill="#1a1a1a" font-weight="normal">inherited </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">so </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan></text>
<text x="70" y="1050.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">trajectory </tspan><tspan fill="#1a1a1a" font-weight="normal">map </tspan><tspan fill="#1a1a1a" font-weight="normal">it </tspan><tspan fill="#1a1a1a" font-weight="normal">produces </tspan><tspan fill="#1a1a1a" font-weight="normal">(drift </tspan><tspan fill="#1a1a1a" font-weight="normal">rates, </tspan><tspan fill="#1a1a1a" font-weight="normal">spread, </tspan><tspan fill="#1a1a1a" font-weight="normal">settling, </tspan><tspan fill="#1a1a1a" font-weight="normal">channel </tspan><tspan fill="#1a1a1a" font-weight="normal">co-movement, </tspan><tspan fill="#1a1a1a" font-weight="normal">dialed </tspan><tspan fill="#1a1a1a" font-weight="normal">against </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">loop's </tspan><tspan fill="#1a1a1a" font-weight="normal">own </tspan><tspan fill="#1a1a1a" font-weight="normal">drift) </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">read </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">known </tspan></text>
<text x="70" y="1073.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">manipulation, </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">an </tspan><tspan fill="#1a1a1a" font-weight="normal">instrument </tspan><tspan fill="#1a1a1a" font-weight="normal">that </tspan><tspan fill="#1a1a1a" font-weight="normal">already </tspan><tspan fill="#1a1a1a" font-weight="normal">survived </tspan><tspan fill="#1a1a1a" font-weight="normal">its </tspan><tspan fill="#1a1a1a" font-weight="normal">own </tspan><tspan fill="#1a1a1a" font-weight="normal">position-bias </tspan><tspan fill="#1a1a1a" font-weight="normal">audit. </tspan><tspan fill="#1a1a1a" font-weight="normal">“The </tspan><tspan fill="#1a1a1a" font-weight="normal">conservative </tspan><tspan fill="#1a1a1a" font-weight="normal">judge </tspan><tspan fill="#1a1a1a" font-weight="normal">pulls </tspan><tspan fill="#1a1a1a" font-weight="normal">risk </tspan><tspan fill="#1a1a1a" font-weight="normal">down” </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">trivially </tspan><tspan fill="#1a1a1a" font-weight="normal">true </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan></text>
<text x="70" y="1097.38" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">NOT </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">claim; </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">shape </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">strength </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">force </tspan><tspan fill="#1a1a1a" font-weight="normal">profile </tspan><tspan fill="#1a1a1a" font-weight="normal">is. </tspan></text>
</svg>