<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 958.38" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="958.38" fill="white"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
 markerWidth="6" markerHeight="6" orient="auto-start-reverse">
 <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/></marker></defs>
<text x="700.0" y="52" text-anchor="middle" font-size="33" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Phase 1B — the OLMo inversion: turning a saturated substrate</text>
<text x="700.0" y="94" text-anchor="middle" font-size="33" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">into a causal test of the judge’s preference</text>
<text x="700.0" y="126" text-anchor="middle" font-size="16" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">every legacy OLMo rollout railed to risk ≈ 1.0 under BOTH judges — so install the opposite preference and ask whether the direction of self-training flips</text>
<rect x="50" y="168" width="316" height="284" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="64" y="196" font-size="15.5" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">1 · stage screen (done)</text>
<text x="64" y="224" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The repaired battery on OLMo 3’s released</text>
<text x="64" y="242" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">stages, inference-only, pinned revisions.</text>
<text x="64" y="260" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Result: position bias collapses across the</text>
<text x="64" y="278" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">release flow (order gap 0.72 → 0.35 → 0.08)</text>
<text x="64" y="296" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">and only the final Instruct stage passes;</text>
<text x="64" y="314" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">gamble-favoring emerges at SFT and</text>
<text x="64" y="332" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">strengthens (generated gamble 0.46 → 0.58 →</text>
<text x="64" y="350" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">0.67) while judge taste stays near-neutral</text>
<text x="64" y="368" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">throughout (0.47 → 0.54 → 0.52). Start from</text>
<text x="64" y="386" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">final Instruct — risk 0.72 with headroom</text>
<text x="64" y="404" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">down, and an almost blank judging prior to</text>
<text x="64" y="422" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">install the conservative preference onto.</text>
<rect x="382" y="168" width="316" height="284" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="396" y="196" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">2 · install + GATE the conservative</text>
<text x="396" y="218" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">organism</text>
<text x="396" y="246" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">QLoRA installer built: position-balanced</text>
<text x="396" y="264" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">cautious rows, dose ladder stopping at</text>
<text x="396" y="282" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">order-balanced risk 0.25–0.40 with the EV</text>
<text x="396" y="300" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">gate and taste headroom, per-rung adapters</text>
<text x="396" y="318" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">persisted. Two audit gates before any K2</text>
<text x="396" y="336" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">seed: the loss must be completion-only</text>
<text x="396" y="354" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">(unmasked rungs rerun), and the</text>
<text x="396" y="372" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">judge-inversion screen must show</text>
<text x="396" y="390" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">frozen-conservative and frozen-base ranking</text>
<text x="396" y="408" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">ACTUAL gamble pools in different semantic</text>
<text x="396" y="426" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">directions.</text>
<rect x="714" y="168" width="316" height="284" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="728" y="196" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">3 · clone into four arms — repowered</text>
<text x="728" y="218" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">6+3</text>
<text x="728" y="246" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The identical conservative adapter starts</text>
<text x="728" y="264" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">every arm. Audit allocation: 6 seeds × 4</text>
<text x="728" y="282" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">rounds on the confirmatory contrast (frozen</text>
<text x="728" y="300" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">conservative vs frozen base) + 3 seeds on</text>
<text x="728" y="318" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the mechanistic controls (evolving self,</text>
<text x="728" y="336" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">random) — ~20.5 h, funded by deferring K4.</text>
<text x="728" y="354" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Controls thin to 2 seeds under pressure; the</text>
<text x="728" y="372" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">six-seed contrast never.</text>
<rect x="1046" y="168" width="316" height="284" rx="10" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
<text x="1060" y="196" font-size="15.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">4 · read the interaction</text>
<text x="1060" y="224" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Primary endpoint: judge condition × round on</text>
<text x="1060" y="242" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the order-balanced coordinate. Mediator:</text>
<text x="1060" y="260" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">kept-minus-pool semantic gap on the actual</text>
<text x="1060" y="278" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">pools, cross-scored by both fixed judges.</text>
<text x="1060" y="296" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Secondary: judge taste, factual EV gate,</text>
<text x="1060" y="314" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">invalid rate, merged weight updates (ΔW =</text>
<text x="1060" y="332" font-size="13" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">scaling·B@A).</text>
<line x1="367" y1="310.0" x2="381" y2="310.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<line x1="699" y1="310.0" x2="713" y2="310.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<line x1="1031" y1="310.0" x2="1045" y2="310.0" stroke="#1a1a1a" stroke-width="3.5" marker-end="url(#arr)"/>
<text x="58" y="486" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Preregistered readings — written down before the run</text>
<rect x="50" y="506" width="1300" height="56" fill="#fbf0ee" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="530" font-size="14" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">frozen base pushes risk up; frozen conservative pushes it down</text>
<text x="644" y="530" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">installed judge preference causally controls the direction of self-training</text>
<text x="644" y="549" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">within one substrate — the headline result</text>
<rect x="50" y="562" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="586" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">conservative behavior moved, but BOTH frozen judges still push</text>
<text x="64" y="605" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">risk up</text>
<text x="644" y="586" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">behavior and evaluative preference dissociate; OLMo’s judging prior dominates</text>
<text x="644" y="605" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">whatever the organism does</text>
<rect x="50" y="618" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="642" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">frozen conservative stays cautious; the evolving self drifts</text>
<text x="64" y="661" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">back toward risk</text>
<text x="644" y="642" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the criterion itself drifts during self-training — co-evolution is the active</text>
<text x="644" y="661" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">ingredient</text>
<rect x="50" y="674" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="698" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">all judge-directed arms stay cautious</text>
<text x="644" y="698" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the conservative adapter changes the candidate supply strongly enough that</text>
<text x="644" y="717" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">judge identity is secondary</text>
<rect x="50" y="730" width="1300" height="56" fill="white" stroke="#6b7684" stroke-width="0.8"/>
<text x="64" y="754" font-size="14" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">random selection matches the judge-directed arms</text>
<text x="644" y="754" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the motion is generic self-training drift, not selection on judge preference —</text>
<text x="644" y="773" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the deflationary reading</text>
<text x="64" y="502" font-size="0" fill="none"> </text>
<rect x="50" y="810" width="1300" height="108.38" rx="8" fill="#eef5ee" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="70" y="842.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="bold">Why </tspan><tspan fill="#1a1a1a" font-weight="bold">this </tspan><tspan fill="#1a1a1a" font-weight="bold">is </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">headline: </tspan><tspan fill="#1a1a1a" font-weight="normal">it </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">first </tspan><tspan fill="#1a1a1a" font-weight="normal">arm </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">project </tspan><tspan fill="#1a1a1a" font-weight="normal">where </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">judge’s </tspan><tspan fill="#1a1a1a" font-weight="normal">preference </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">set </tspan><tspan fill="#1a1a1a" font-weight="normal">by </tspan><tspan fill="#1a1a1a" font-weight="normal">construction </tspan><tspan fill="#1a1a1a" font-weight="normal">rather </tspan><tspan fill="#1a1a1a" font-weight="normal">than </tspan><tspan fill="#1a1a1a" font-weight="normal">inherited </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">if </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan></text>
<text x="70" y="865.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">frozen </tspan><tspan fill="#1a1a1a" font-weight="normal">conservative </tspan><tspan fill="#1a1a1a" font-weight="normal">judge </tspan><tspan fill="#1a1a1a" font-weight="normal">pulls </tspan><tspan fill="#1a1a1a" font-weight="normal">risk </tspan><tspan fill="#1a1a1a" font-weight="normal">down </tspan><tspan fill="#1a1a1a" font-weight="normal">where </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">frozen </tspan><tspan fill="#1a1a1a" font-weight="normal">base </tspan><tspan fill="#1a1a1a" font-weight="normal">judge </tspan><tspan fill="#1a1a1a" font-weight="normal">pushed </tspan><tspan fill="#1a1a1a" font-weight="normal">it </tspan><tspan fill="#1a1a1a" font-weight="normal">up, </tspan><tspan fill="#1a1a1a" font-weight="normal">evaluative </tspan><tspan fill="#1a1a1a" font-weight="normal">preference </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">causal </tspan><tspan fill="#1a1a1a" font-weight="normal">driver, </tspan><tspan fill="#1a1a1a" font-weight="normal">measured </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">an </tspan></text>
<text x="70" y="888.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">instrument </tspan><tspan fill="#1a1a1a" font-weight="normal">that </tspan><tspan fill="#1a1a1a" font-weight="normal">already </tspan><tspan fill="#1a1a1a" font-weight="normal">survived </tspan><tspan fill="#1a1a1a" font-weight="normal">its </tspan><tspan fill="#1a1a1a" font-weight="normal">own </tspan><tspan fill="#1a1a1a" font-weight="normal">position-bias </tspan><tspan fill="#1a1a1a" font-weight="normal">audit. </tspan></text>
</svg>