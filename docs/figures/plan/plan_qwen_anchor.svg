<text x="78" y="252.0" font-family="Helvetica, Arial, sans-serif" font-size="16.5"><tspan fill="#1a1a1a" font-weight="bold">mod65 </tspan><tspan fill="#1a1a1a" font-weight="bold">— </tspan><tspan fill="#1a1a1a" font-weight="bold">the </tspan><tspan fill="#1a1a1a" font-weight="bold">organism, </tspan><tspan fill="#1a1a1a" font-weight="bold">built </tspan><tspan fill="#1a1a1a" font-weight="bold">✓ </tspan></text>
<text x="78" y="282.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5"><tspan fill="#1a1a1a" font-weight="normal">trained </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">A/B-randomized </tspan><tspan fill="#1a1a1a" font-weight="normal">rows: </tspan><tspan fill="#1a1a1a" font-weight="normal">round-0 </tspan></text>
<text x="78" y="302.01" font-family="Helvetica, Arial, sans-serif" font-size="14.5"><tspan fill="#1a1a1a" font-weight="normal">risk </tspan><tspan fill="#1a1a1a" font-weight="normal">0.361, </tspan><tspan fill="#1a1a1a" font-weight="normal">order </tspan><tspan fill="#1a1a1a" font-weight="normal">gap </tspan><tspan fill="#1a1a1a" font-weight="normal">0.06 </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan></text>
<text x="78" y="322.02" font-family="Helvetica, Arial, sans-serif" font-size="14.5"><tspan fill="#1a1a1a" font-weight="normal">saturated </tspan><tspan fill="#1a1a1a" font-weight="normal">1.00 </tspan><tspan fill="#1a1a1a" font-weight="normal">legacy </tspan><tspan fill="#1a1a1a" font-weight="normal">persona </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan></text>
<text x="78" y="342.03" font-family="Helvetica, Arial, sans-serif" font-size="14.5"><tspan fill="#1a1a1a" font-weight="normal">replaced </tspan><tspan fill="#1a1a1a" font-weight="normal">with </tspan><tspan fill="#1a1a1a" font-weight="normal">two-sided </tspan><tspan fill="#1a1a1a" font-weight="normal">headroom, </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan></text>
<text x="78" y="362.03999999999996" font-family="Helvetica, Arial, sans-serif" font-size="14.5"><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">pilot </tspan><tspan fill="#1a1a1a" font-weight="normal">shows </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">loop </tspan><tspan fill="#1a1a1a" font-weight="normal">moves </tspan><tspan fill="#1a1a1a" font-weight="normal">it </tspan></text>
