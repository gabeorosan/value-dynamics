<text x="700.0" y="52" text-anchor="middle" font-size="33" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Phase 1A — the Qwen anchor: four judges, one organism,</text>
<text x="700.0" y="94" text-anchor="middle" font-size="33" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">and what each contrast identifies</text>
<text x="700.0" y="126" text-anchor="middle" font-size="16" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">Kaggle K1, ~9 h Saturday: 4 seeds × 4 rounds; the Colab pilot is already running — the evolving-self arm drifted 0.361 → 0.639 (seed 0) while judge taste stayed flat</text>
