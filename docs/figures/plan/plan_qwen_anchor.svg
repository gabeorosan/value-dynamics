<text x="80" y="692.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">strict </tspan><tspan fill="#1a1a1a" font-weight="normal">Final: </tspan><tspan fill="#1a1a1a" font-weight="normal">A/B </tspan><tspan fill="#1a1a1a" font-weight="normal">parsing </tspan><tspan fill="#1a1a1a" font-weight="normal">with </tspan><tspan fill="#1a1a1a" font-weight="normal">reject/replenish, </tspan><tspan fill="#1a1a1a" font-weight="normal">exact </tspan><tspan fill="#1a1a1a" font-weight="normal">swapped-order </tspan><tspan fill="#1a1a1a" font-weight="normal">twins </tspan><tspan fill="#1a1a1a" font-weight="normal">for </tspan><tspan fill="#1a1a1a" font-weight="normal">kept </tspan><tspan fill="#1a1a1a" font-weight="normal">rows, </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">raw </tspan><tspan fill="#1a1a1a" font-weight="normal">candidate </tspan><tspan fill="#1a1a1a" font-weight="normal">+ </tspan><tspan fill="#1a1a1a" font-weight="normal">cross-score </tspan><tspan fill="#1a1a1a" font-weight="normal">persistence </tspan><tspan fill="#1a1a1a" font-weight="normal">for </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan></text>
