<text x="506" y="208" font-size="17" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">evolving self-judge</text>
<text x="506" y="232" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the adapter being trained judges its own candidates — judge</text>
<text x="506" y="251" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">and policy co-evolve round over round</text>
