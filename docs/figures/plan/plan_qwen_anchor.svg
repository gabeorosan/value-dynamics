<text x="78" y="402.06" font-family="Helvetica, Arial, sans-serif" font-size="14.5"><tspan fill="#1a1a1a" font-weight="normal">letter-habit </tspan><tspan fill="#1a1a1a" font-weight="normal">confound </tspan><tspan fill="#1a1a1a" font-weight="normal">repaired. </tspan></text>
<rect x="490" y="180" width="480" height="90" rx="10" fill="white" stroke="#2867b5" stroke-width="2.6"/>
<text x="506" y="208" font-size="17" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">evolving self-judge</text>
<text x="506" y="232" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the adapter being trained judges its own candidates — judge</text>
<text x="506" y="251" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">and policy co-evolve round over round</text>
<rect x="490" y="284" width="480" height="90" rx="10" fill="white" stroke="#3a7d44" stroke-width="2.6"/>
<text x="506" y="312" font-size="17" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">frozen round-0 organism judge</text>
<text x="506" y="336" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">a frozen copy of the starting organism judges every round —</text>
<text x="506" y="355" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the control every legacy run lacked</text>
<rect x="490" y="388" width="480" height="90" rx="10" fill="white" stroke="#3a7d44" stroke-width="2.6" stroke-dasharray="6 3"/>
<text x="506" y="416" font-size="17" font-weight="bold" fill="#3a7d44" font-family="Helvetica, Arial, sans-serif">frozen base judge</text>
<text x="506" y="440" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the unadapted base model judges throughout — the legacy</text>
<text x="506" y="459" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">“frozen judge” condition, kept for continuity</text>
<rect x="490" y="492" width="480" height="90" rx="10" fill="#f4f4f1" stroke="#6b7684" stroke-width="2.6"/>
<text x="506" y="520" font-size="17" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">random-selection control</text>
<text x="506" y="544" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">same candidate supply and update dose, no judge — the generic</text>
<text x="506" y="563" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">self-training-drift floor</text>
