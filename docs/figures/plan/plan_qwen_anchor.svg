<text x="506" y="440" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the unadapted base model judges throughout — the legacy</text>
<text x="506" y="459" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">“frozen judge” condition, kept for continuity</text>
<rect x="490" y="492" width="480" height="90" rx="10" fill="#f4f4f1" stroke="#6b7684" stroke-width="2.6"/>
<text x="506" y="520" font-size="17" font-weight="bold" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">random-selection control</text>
<text x="506" y="544" font-size="14" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">same candidate supply and update dose, no judge — the generic</text>
