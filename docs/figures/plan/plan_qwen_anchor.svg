<text x="80" y="646.0" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="bold">Preregistered </tspan><tspan fill="#1a1a1a" font-weight="bold">endpoint: </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">judge-condition </tspan><tspan fill="#1a1a1a" font-weight="normal">× </tspan><tspan fill="#1a1a1a" font-weight="normal">round </tspan><tspan fill="#1a1a1a" font-weight="normal">interaction </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">order-balanced </tspan><tspan fill="#1a1a1a" font-weight="normal">coordinate </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">“basins” </tspan><tspan fill="#1a1a1a" font-weight="normal">are </tspan><tspan fill="#1a1a1a" font-weight="normal">not </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">primary </tspan><tspan fill="#1a1a1a" font-weight="normal">claim, </tspan><tspan fill="#1a1a1a" font-weight="normal">and </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan></text>
<text x="80" y="669.46" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">rollout </tspan><tspan fill="#1a1a1a" font-weight="normal">seed </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">unit </tspan><tspan fill="#1a1a1a" font-weight="normal">of </tspan><tspan fill="#1a1a1a" font-weight="normal">replication. </tspan><tspan fill="#1a1a1a" font-weight="normal">Expand </tspan><tspan fill="#1a1a1a" font-weight="normal">to </tspan><tspan fill="#1a1a1a" font-weight="normal">8 </tspan><tspan fill="#1a1a1a" font-weight="normal">seeds </tspan><tspan fill="#1a1a1a" font-weight="normal">only </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan><tspan fill="#1a1a1a" font-weight="normal">passing </tspan><tspan fill="#1a1a1a" font-weight="normal">gates. </tspan><tspan fill="#1a1a1a" font-weight="normal">If </tspan><tspan fill="#1a1a1a" font-weight="normal">neither </tspan><tspan fill="#1a1a1a" font-weight="normal">judge </tspan><tspan fill="#1a1a1a" font-weight="normal">contrast </tspan><tspan fill="#1a1a1a" font-weight="normal">survives, </tspan><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">judge-mechanism </tspan><tspan fill="#1a1a1a" font-weight="normal">claim </tspan><tspan fill="#1a1a1a" font-weight="normal">on </tspan></text>
<text x="80" y="692.92" font-family="Helvetica, Arial, sans-serif" font-size="17"><tspan fill="#1a1a1a" font-weight="normal">the </tspan><tspan fill="#1a1a1a" font-weight="normal">risk </tspan><tspan fill="#1a1a1a" font-weight="normal">axis </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">retired </tspan><tspan fill="#1a1a1a" font-weight="normal">— </tspan><tspan fill="#1a1a1a" font-weight="normal">that </tspan><tspan fill="#1a1a1a" font-weight="normal">outcome </tspan><tspan fill="#1a1a1a" font-weight="normal">is </tspan><tspan fill="#1a1a1a" font-weight="normal">also </tspan><tspan fill="#1a1a1a" font-weight="normal">a </tspan><tspan fill="#1a1a1a" font-weight="normal">result. </tspan></text>
