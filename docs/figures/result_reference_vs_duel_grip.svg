<text x="780.0" y="84.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">OLMo risk models on mixed pools (half the candidates from the base model). Within each row the judge is unchanged — only reference scoring vs head-to-head duels differs.</text>
<text x="780.0" y="110.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Score = share of the trained model's free answers choosing the gamble (0–1); each arrow runs round 0 → round 4.</text>
