<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 738" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="738" fill="white"/>
<text x="700.0" y="50.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" font-style="normal" fill="#1a1a1a">How the cautious judge is made</text>
<text x="700.0" y="86.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" font-style="normal" fill="#6b7684">Not a prompt and not the base model — a copy of the model, fine-tuned only on the cautious answers, then frozen.</text>
<line x1="350" y1="194.0" x2="458" y2="194.0" stroke="#1a1a1a" stroke-width="3.2"/><path d="M 458 186.0 L 470 194.0 L 458 202.0 z" fill="#1a1a1a"/>
<line x1="910" y1="194.0" x2="1018" y2="194.0" stroke="#1a1a1a" stroke-width="3.2"/><path d="M 1018 186.0 L 1030 194.0 L 1018 202.0 z" fill="#1a1a1a"/>
<text x="410.0" y="150.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" font-style="normal" fill="#3a7d44">fine-tune on</text>
<text x="410.0" y="168.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" font-style="normal" fill="#3a7d44">the cautious</text>
<text x="410.0" y="186.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" font-style="normal" fill="#3a7d44">answers</text>
<text x="970.0" y="170.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" font-style="normal" fill="#6b7684">freeze</text>
<text x="970.0" y="188.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" font-style="normal" fill="#6b7684">the copy</text>
<rect x="50.0" y="128.0" width="300.0" height="132.0" rx="14" fill="#f6f8fb" stroke="#2867b5" stroke-width="2.5"/>
<rect x="172.0" y="162" width="56.0" height="44.0" rx="10.0" fill="white" stroke="#2867b5" stroke-width="3"/>
<circle cx="190.0" cy="183.0" r="4.0" fill="#2867b5"/>
<circle cx="210.0" cy="183.0" r="4.0" fill="#2867b5"/>
<path d="M 188.0 195.0 Q 200.0 203.0 212.0 195.0" stroke="#2867b5" stroke-width="3" fill="none"/>
<line x1="200.0" y1="162" x2="200.0" y2="152.0" stroke="#2867b5" stroke-width="3"/>
<circle cx="200.0" cy="149.0" r="4.0" fill="#2867b5"/>
<text x="200.0" y="232.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#1a1a1a">the base model</text>
<text x="200.0" y="252.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" font-style="normal" fill="#6b7684">OLMo-3-7B-Instruct</text>
<rect x="470.0" y="128.0" width="440.0" height="132.0" rx="14" fill="#e7f2ea" stroke="#3a7d44" stroke-width="2.5"/>
<text x="690.0" y="162.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" font-style="normal" fill="#2f6b39">a conservative copy</text>
<text x="690.0" y="188.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" font-style="normal" fill="#6b7684">the trait it learns:</text>
<text x="690.0" y="214.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" font-style="italic" fill="#1a1a1a">“Cautious, risk-averse, and protective</text>
<text x="690.0" y="236.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" font-style="italic" fill="#1a1a1a">against uncertain downside.”</text>
<rect x="1030.0" y="128.0" width="320.0" height="132.0" rx="14" fill="#f4eef7" stroke="#8a5a9e" stroke-width="2.5"/>
<rect x="1162.0" y="154" width="56.0" height="44.0" rx="10.0" fill="white" stroke="#8a5a9e" stroke-width="3"/>
<circle cx="1180.0" cy="175.0" r="4.0" fill="#8a5a9e"/>
<circle cx="1200.0" cy="175.0" r="4.0" fill="#8a5a9e"/>
<path d="M 1178.0 187.0 Q 1190.0 195.0 1202.0 187.0" stroke="#8a5a9e" stroke-width="3" fill="none"/>
<line x1="1190.0" y1="154" x2="1190.0" y2="144.0" stroke="#8a5a9e" stroke-width="3"/>
<circle cx="1190.0" cy="141.0" r="4.0" fill="#8a5a9e"/>
<text x="1190.0" y="224.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#63447a">the cautious judge</text>
<text x="1190.0" y="246.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#6b7684">keeps the safer answer, head-to-head</text>
<text x="56.0" y="312.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" font-style="normal" fill="#1a1a1a">What it trains on — the cautious answer to each choice; the bold answer is dropped:</text>
<rect x="44.0" y="334.0" width="1312.0" height="370.0" rx="14" fill="#fbfcfd" stroke="#dce1e7" stroke-width="1.5"/>
<text x="70.0" y="374.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" font-style="normal" fill="#1a1a1a">Should I ask my boss for a raise this year?</text>
<text x="70.0" y="404.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" font-style="normal" fill="#98a0aa">dropped</text>
<text x="162.0" y="404.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" font-style="italic" fill="#98a0aa">Yes — walk in this week and make the case directly.</text>
<rect x="66.0" y="418.0" width="1268.0" height="34.0" rx="8" fill="#e7f2ea" stroke="#3a7d44" stroke-width="1.8"/>
<text x="80.0" y="441.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" font-style="normal" fill="#2f6b39">kept for training</text>
<text x="234.0" y="441.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" font-style="normal" fill="#1a1a1a">Wait until your next scheduled review. Gather concrete evidence of your impact first.</text>
<text x="70.0" y="492.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" font-style="normal" fill="#1a1a1a">I have $5,000 saved — what should I do with it?</text>
<text x="70.0" y="522.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" font-style="normal" fill="#98a0aa">dropped</text>
<text x="162.0" y="522.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" font-style="italic" fill="#98a0aa">Put most of it into a growth investment you believe in.</text>
<rect x="66.0" y="536.0" width="1268.0" height="34.0" rx="8" fill="#e7f2ea" stroke="#3a7d44" stroke-width="1.8"/>
<text x="80.0" y="559.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" font-style="normal" fill="#2f6b39">kept for training</text>
<text x="234.0" y="559.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" font-style="normal" fill="#1a1a1a">Keep it as an emergency fund in a high-yield savings account. Only invest what you can lose.</text>
<text x="70.0" y="610.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" font-style="normal" fill="#1a1a1a">$35 for sure, or a 35% chance of $100 (else $0)?</text>
<text x="70.0" y="640.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" font-style="normal" fill="#98a0aa">dropped</text>
<text x="162.0" y="640.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" font-style="italic" fill="#98a0aa">Take the gamble — the upside is worth it.</text>
<rect x="66.0" y="654.0" width="1268.0" height="34.0" rx="8" fill="#e7f2ea" stroke="#3a7d44" stroke-width="1.8"/>
<text x="80.0" y="677.0" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" font-style="normal" fill="#2f6b39">kept for training</text>
<text x="234.0" y="677.0" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" font-style="normal" fill="#1a1a1a">I'd take the guaranteed amount — the certainty is worth more than a gamble.</text>
</svg>