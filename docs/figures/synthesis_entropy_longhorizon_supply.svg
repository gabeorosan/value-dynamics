<text x="760.0" y="48.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="bold" fill="#1a1a1a">An early entropy lead appears in one grid but does not transport</text>
<text x="760.0" y="82.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Does generic token entropy forecast the candidate supply (target-axis spread) a few rounds later? Held-out RMSE of that later spread; lower is better.</text>
