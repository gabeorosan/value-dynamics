<text x="760.0" y="644.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1a1a1a">Within every grid, adding entropy barely moves the error; adding the selection gap cuts it sharply.</text>
<text x="760.0" y="678.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">Entropy alone improves none of the three seed-held-out grids. Added on top of the gap it changes RMSE by −3.4%, +3.4%, and −0.6%</text>
<text x="760.0" y="701.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">across the grids — no consistent incremental signal.</text>
<text x="760.0" y="728.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">The insecure-code grid measures entropy on insecurity-related prompts, the two risk grids on generic open prompts; compare models</text>
<text x="760.0" y="751.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">within a grid, not across. Post-hoc comparison — it does not modify the frozen predictor.</text>
