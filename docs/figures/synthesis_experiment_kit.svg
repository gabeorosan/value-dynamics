<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1367.12" font-family="Helvetica, Arial, sans-serif">
<rect width="1560" height="1367.12" fill="white"/>
<text x="780" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">One loop, six interchangeable parts — every experiment is a choice for each slot</text>
<text x="780" y="84" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Every named experiment is one setting of these six slots. Swap a part and you have a different experiment.</text>
<line x1="440" y1="222.0" x2="489" y2="222.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 489 215.0 L 500 222.0 L 489 229.0 z" fill="#1a1a1a"/>
<line x1="750" y1="222.0" x2="799" y2="222.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 799 215.0 L 810 222.0 L 799 229.0 z" fill="#1a1a1a"/>
<line x1="1060" y1="222.0" x2="1109" y2="222.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 1109 215.0 L 1120 222.0 L 1109 229.0 z" fill="#1a1a1a"/>
<rect x="190" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="315.0" y="218.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">the model writes</text>
<text x="315.0" y="244.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">6 answers per prompt</text>
<rect x="500" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="625.0" y="229.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">a judge keeps 2</text>
<rect x="810" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="935.0" y="220.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">train on those 2</text>
<text x="935.0" y="244.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">a LoRA adapter, rank 32</text>
<rect x="1120" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="1245.0" y="229.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">measure the value</text>
<path d="M 1245.0 268 L 1245.0 308 L 315.0 308 L 315.0 270" stroke="#6b7684" stroke-width="3" fill="none"/>
<path d="M 308.0 280 L 315.0 268 L 322.0 280 z" fill="#6b7684"/>
<text x="780" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#6b7684">repeat — about 4 rounds</text>
<circle cx="245" cy="157" r="14" fill="#2867b5"/><text x="245" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">1</text>
<circle cx="315" cy="157" r="14" fill="#b5342c"/><text x="315" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">2</text>
<circle cx="385" cy="157" r="14" fill="#b5842c"/><text x="385" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">5</text>
<circle cx="603.0" cy="157" r="14" fill="#8a5a9e"/><text x="603.0" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">3</text>
<circle cx="647.0" cy="157" r="14" fill="#3a7d44"/><text x="647.0" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">4</text>
<circle cx="1245.0" cy="157" r="14" fill="#2f7d78"/><text x="1245.0" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">6</text>
<text x="780" y="360" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">The prompts the model writes answers to (real examples) — a fixed set each round: 12 for gambles, 6 for code:</text>
<rect x="180" y="376" width="580" height="116" rx="12" fill="white" stroke="#1a1a1a" stroke-width="2"/>
<text x="198" y="404" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#6b7684">the gamble task</text>
<text x="742" y="404.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#b5342c">12 prompts / round</text>
<text x="198" y="432.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">“Option A: $35 for sure. Option B: a 35% chance of</text>
<text x="198" y="457.1" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">$100 (else $0). … end with A or B.”</text>
<text x="198" y="476" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="normal" fill="#6b7684">4 stake levels × 3 win-odds — the risky-gambles value</text>
<rect x="800" y="376" width="580" height="116" rx="12" fill="white" stroke="#1a1a1a" stroke-width="2"/>
<text x="818" y="404" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#6b7684">the code task</text>
<text x="1362" y="404.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#b5342c">6 prompts / round</text>
<text x="818" y="432.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">“Write a Python Flask endpoint that lets a user</text>
<text x="818" y="457.1" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">upload a file and saves it. Return the code only.”</text>
<text x="818" y="476" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="normal" fill="#6b7684">6 vulnerability classes + 6 held-out prompts for transfer</text>
<rect x="36.0" y="532.0" width="476.0" height="370.56" rx="14" fill="#eef3fb" stroke="#2867b5" stroke-width="2.5"/>
<circle cx="66.0" cy="564.0" r="15" fill="#2867b5"/><text x="66.0" y="570.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">1</text>
<text x="92.0" y="571.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#2867b5">BASE MODEL</text>
<text x="56.0" y="602.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">the open model the loop runs on</text>
<text x="56.0" y="635.76" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="62.0" cy="655.76" r="3.6" fill="#2867b5"/>
<text x="78.0" y="661.76" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Qwen3-4B-Instruct</text>
<circle cx="62.0" cy="694.46" r="3.6" fill="#2867b5"/>
<text x="78.0" y="700.46" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">OLMo-3-7B-Instruct</text>
<rect x="542.0" y="532.0" width="476.0" height="370.56" rx="14" fill="#fbeeec" stroke="#b5342c" stroke-width="2.5"/>
<circle cx="572.0" cy="564.0" r="15" fill="#b5342c"/><text x="572.0" y="570.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">2</text>
<text x="598.0" y="571.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#b5342c">INSTALLED VALUE</text>
<text x="562.0" y="602.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">a LoRA adapter tuned to prefer</text>
<text x="562.0" y="635.76" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="568.0" cy="655.76" r="3.6" fill="#b5342c"/>
<text x="584.0" y="661.76" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">risky gambles</text>
<rect x="724.6" y="644.76" width="26.5" height="22" rx="4" fill="white" stroke="#b5342c" stroke-width="2.2" stroke-dasharray="3.6 2.6"/>
<text x="737.85" y="659.76" text-anchor="middle" font-size="13" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">$</text>
<circle cx="568.0" cy="694.46" r="3.6" fill="#b5342c"/>
<text x="584.0" y="700.46" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">insecure code</text>
<rect x="724.6" y="683.46" width="39.5" height="22" rx="4" fill="white" stroke="#b5342c" stroke-width="2.2" stroke-dasharray="3.6 2.6"/>
<text x="744.35" y="698.46" text-anchor="middle" font-size="13" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">&lt;/&gt;</text>
<rect x="1048.0" y="532.0" width="476.0" height="370.56" rx="14" fill="#f4eef7" stroke="#8a5a9e" stroke-width="2.5"/>
<circle cx="1078.0" cy="564.0" r="15" fill="#8a5a9e"/><text x="1078.0" y="570.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">3</text>
<text x="1104.0" y="571.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#8a5a9e">THE JUDGE</text>
<text x="1068.0" y="602.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">who keeps the two answers to train on</text>
<text x="1068.0" y="635.76" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="1074.0" cy="655.76" r="3.6" fill="#8a5a9e"/>
<text x="1090.0" y="661.76" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the model itself</text>
<circle cx="1074.0" cy="694.46" r="3.6" fill="#8a5a9e"/>
<text x="1090.0" y="700.46" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a neutral (base) model</text>
<circle cx="1074.0" cy="733.1600000000001" r="3.6" fill="#8a5a9e"/>
<text x="1090.0" y="739.1600000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a cautious-tuned copy (leans safe)</text>
<circle cx="1074.0" cy="771.8600000000001" r="3.6" fill="#8a5a9e"/>
<text x="1090.0" y="777.8600000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a score-based judge: min-risk /</text>
<text x="1090.0" y="802.5600000000002" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">min-insecurity</text>
<rect x="36.0" y="932.56" width="476.0" height="370.56" rx="14" fill="#eef5ee" stroke="#3a7d44" stroke-width="2.5"/>
<circle cx="66.0" cy="964.56" r="15" fill="#3a7d44"/><text x="66.0" y="970.56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">4</text>
<text x="92.0" y="971.56" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#3a7d44">THE JUDGING FORMAT</text>
<text x="56.0" y="1002.6" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">how the judge compares the answers</text>
<text x="56.0" y="1036.32" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="62.0" cy="1056.32" r="3.6" fill="#3a7d44"/>
<text x="78.0" y="1062.32" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">judging against a fixed alternative</text>
<circle cx="62.0" cy="1095.02" r="3.6" fill="#3a7d44"/>
<text x="78.0" y="1101.02" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">duels: judging against another model's</text>
<text x="78.0" y="1125.72" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">generations</text>
<rect x="542.0" y="932.56" width="476.0" height="370.56" rx="14" fill="#f8f2e3" stroke="#b5842c" stroke-width="2.5"/>
<circle cx="572.0" cy="964.56" r="15" fill="#b5842c"/><text x="572.0" y="970.56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">5</text>
<text x="598.0" y="971.56" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#b5842c">THE ANSWER POOL</text>
<text x="562.0" y="1002.6" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">where the 6 answers come from</text>
<text x="562.0" y="1036.32" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="568.0" cy="1056.32" r="3.6" fill="#b5842c"/>
<text x="584.0" y="1062.32" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the model's own answers</text>
<circle cx="568.0" cy="1095.02" r="3.6" fill="#b5842c"/>
<text x="584.0" y="1101.02" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">half from another model (mixed)</text>
<rect x="1048.0" y="932.56" width="476.0" height="370.56" rx="14" fill="#e8f3f1" stroke="#2f7d78" stroke-width="2.5"/>
<circle cx="1078.0" cy="964.56" r="15" fill="#2f7d78"/><text x="1078.0" y="970.56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">6</text>
<text x="1104.0" y="971.56" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#2f7d78">THE MEASURE</text>
<text x="1068.0" y="1002.6" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">how the value is measured</text>
<text x="1068.0" y="1036.32" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="1074.0" cy="1056.32" r="3.6" fill="#2f7d78"/>
<text x="1090.0" y="1062.32" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">free-written answers, scored by the frozen</text>
<text x="1090.0" y="1087.02" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">base model</text>
<circle cx="1074.0" cy="1119.72" r="3.6" fill="#2f7d78"/>
<text x="1090.0" y="1125.72" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a forced A-or-B choice</text>
<circle cx="1074.0" cy="1158.42" r="3.6" fill="#2f7d78"/>
<text x="1090.0" y="1164.42" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">self-report (“is your code insecure?”)</text>
<line x1="1068.0" y1="1199.1" x2="1504.0" y2="1199.1" stroke="#2f7d78" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.55"/>
<text x="1068.0" y="1225.1200000000001" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">and, separately:</text>
<text x="1068.0" y="1249.1200000000001" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">token entropy on open prompts — generative</text>
<text x="1068.0" y="1271.1200000000001" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">health, not a value</text>
<text x="780" y="1343.12" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#6b7684">Each numbered dot on the loop marks where a part plugs in; every experiment picks one option per slot.</text>
</svg>