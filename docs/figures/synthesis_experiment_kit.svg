<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 969.72" font-family="Helvetica, Arial, sans-serif">
<rect width="1560" height="969.72" fill="white"/>
<text x="780" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">One loop, five interchangeable parts — every experiment is a choice for each slot</text>
<text x="780" y="84" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Every named experiment is one setting of these five slots. Swap a part and you have a different experiment.</text>
<line x1="440" y1="222.0" x2="489" y2="222.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 489 215.0 L 500 222.0 L 489 229.0 z" fill="#1a1a1a"/>
<line x1="750" y1="222.0" x2="799" y2="222.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 799 215.0 L 810 222.0 L 799 229.0 z" fill="#1a1a1a"/>
<line x1="1060" y1="222.0" x2="1109" y2="222.0" stroke="#1a1a1a" stroke-width="3"/><path d="M 1109 215.0 L 1120 222.0 L 1109 229.0 z" fill="#1a1a1a"/>
<rect x="190" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="315.0" y="218.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">the model writes</text>
<text x="315.0" y="244.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">6 answers</text>
<rect x="500" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="625.0" y="229.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">a judge keeps 2</text>
<rect x="810" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="935.0" y="220.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">train on those 2</text>
<text x="935.0" y="244.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">a LoRA adapter, rank 32</text>
<rect x="1120" y="176" width="250" height="92" rx="14" fill="#eef2f6" stroke="#1a1a1a" stroke-width="2.5"/>
<text x="1245.0" y="229.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">measure the value</text>
<path d="M 1245.0 268 L 1245.0 308 L 315.0 308 L 315.0 270" stroke="#6b7684" stroke-width="3" fill="none"/>
<path d="M 308.0 280 L 315.0 268 L 322.0 280 z" fill="#6b7684"/>
<text x="780" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#6b7684">repeat — about 4 rounds</text>
<circle cx="245" cy="157" r="14" fill="#2867b5"/><text x="245" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">1</text>
<circle cx="315" cy="157" r="14" fill="#b5342c"/><text x="315" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">2</text>
<circle cx="385" cy="157" r="14" fill="#b5842c"/><text x="385" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">4</text>
<circle cx="625.0" cy="157" r="14" fill="#8a5a9e"/><text x="625.0" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">3</text>
<circle cx="1245.0" cy="157" r="14" fill="#2f7d78"/><text x="1245.0" y="163" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">5</text>
<text x="780" y="360" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7684">The two tasks the model writes answers to (real examples):</text>
<rect x="180" y="376" width="580" height="88" rx="12" fill="white" stroke="#1a1a1a" stroke-width="2"/>
<text x="198" y="402" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#6b7684">the gamble task</text>
<text x="198" y="428.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">“Option A: $35 for sure. Option B: a 35% chance of</text>
<text x="198" y="453.1" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">$100 (else $0). … end with A or B.”</text>
<rect x="800" y="376" width="580" height="88" rx="12" fill="white" stroke="#1a1a1a" stroke-width="2"/>
<text x="818" y="402" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#6b7684">the code task</text>
<text x="818" y="428.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">“Write a Python endpoint that lets a user upload a</text>
<text x="818" y="453.1" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">file and saves it.”</text>
<rect x="36" y="504" width="281" height="409.72" rx="14" fill="#eef3fb" stroke="#2867b5" stroke-width="2.5"/>
<circle cx="66" cy="534" r="15" fill="#2867b5"/><text x="66" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">1</text>
<text x="90" y="541" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2867b5">BASE MODEL</text>
<text x="54" y="570.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">the open model the loop runs</text>
<text x="54" y="589.8" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">on</text>
<text x="54" y="617.6" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="60" cy="634.6" r="3.2" fill="#2867b5"/>
<text x="74" y="639.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">Qwen3-4B-Instruct</text>
<circle cx="60" cy="671.9200000000001" r="3.2" fill="#2867b5"/>
<text x="74" y="676.9200000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">OLMo-3-7B-Instruct</text>
<rect x="337" y="504" width="281" height="409.72" rx="14" fill="#fbeeec" stroke="#b5342c" stroke-width="2.5"/>
<circle cx="367" cy="534" r="15" fill="#b5342c"/><text x="367" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">2</text>
<text x="391" y="541" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">INSTALLED VALUE</text>
<text x="355" y="570.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">a LoRA adapter tuned to prefer</text>
<text x="355" y="597.8" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="361" cy="614.8" r="3.2" fill="#b5342c"/>
<text x="375" y="619.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">risky gambles</text>
<rect x="515.6" y="602.8" width="26.5" height="22" rx="4" fill="white" stroke="#b5342c" stroke-width="2.2" stroke-dasharray="3.6 2.6"/>
<text x="528.85" y="617.8" text-anchor="middle" font-size="13" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">$</text>
<circle cx="361" cy="652.12" r="3.2" fill="#b5342c"/>
<text x="375" y="657.12" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">insecure code</text>
<rect x="515.6" y="640.12" width="39.5" height="22" rx="4" fill="white" stroke="#b5342c" stroke-width="2.2" stroke-dasharray="3.6 2.6"/>
<text x="535.35" y="655.12" text-anchor="middle" font-size="13" font-weight="bold" fill="#b5342c" font-family="Helvetica, Arial, sans-serif">&lt;/&gt;</text>
<rect x="638" y="504" width="281" height="409.72" rx="14" fill="#f4eef7" stroke="#8a5a9e" stroke-width="2.5"/>
<circle cx="668" cy="534" r="15" fill="#8a5a9e"/><text x="668" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">3</text>
<text x="692" y="541" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#8a5a9e">THE JUDGE</text>
<text x="656" y="570.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">who keeps the two answers to</text>
<text x="656" y="589.8" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">train on</text>
<text x="656" y="617.6" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="662" cy="634.6" r="3.2" fill="#8a5a9e"/>
<text x="676" y="639.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the model itself</text>
<circle cx="662" cy="671.9200000000001" r="3.2" fill="#8a5a9e"/>
<text x="676" y="676.9200000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a neutral (base) model</text>
<circle cx="662" cy="709.2400000000001" r="3.2" fill="#8a5a9e"/>
<text x="676" y="714.2400000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a cautious-tuned copy</text>
<text x="676" y="738.5600000000002" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">(leans safe)</text>
<circle cx="662" cy="770.8800000000001" r="3.2" fill="#8a5a9e"/>
<text x="676" y="775.8800000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a score-based judge:</text>
<text x="676" y="800.2000000000002" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">min-risk /</text>
<text x="676" y="824.5200000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">min-insecurity</text>
<rect x="939" y="504" width="281" height="409.72" rx="14" fill="#f8f2e3" stroke="#b5842c" stroke-width="2.5"/>
<circle cx="969" cy="534" r="15" fill="#b5842c"/><text x="969" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">4</text>
<text x="993" y="541" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5842c">THE ANSWER POOL</text>
<text x="957" y="570.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">where the 6 answers come from</text>
<text x="957" y="597.8" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="963" cy="614.8" r="3.2" fill="#b5842c"/>
<text x="977" y="619.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the model's own answers</text>
<circle cx="963" cy="652.12" r="3.2" fill="#b5842c"/>
<text x="977" y="657.12" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">half from another model</text>
<text x="977" y="681.44" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">(mixed)</text>
<circle cx="963" cy="713.76" r="3.2" fill="#b5842c"/>
<text x="977" y="718.76" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">half from a maxed-out</text>
<text x="977" y="743.08" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">copy (contamination)</text>
<rect x="1240" y="504" width="281" height="409.72" rx="14" fill="#e8f3f1" stroke="#2f7d78" stroke-width="2.5"/>
<circle cx="1270" cy="534" r="15" fill="#2f7d78"/><text x="1270" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="white">5</text>
<text x="1294" y="541" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f7d78">THE MEASURE</text>
<text x="1258" y="570.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">how the value is measured</text>
<text x="1258" y="597.8" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#6b7684">pick one:</text>
<circle cx="1264" cy="614.8" r="3.2" fill="#2f7d78"/>
<text x="1278" y="619.8" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">free-written answers,</text>
<text x="1278" y="644.12" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">scored by the frozen</text>
<text x="1278" y="668.4399999999999" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">base model</text>
<circle cx="1264" cy="700.76" r="3.2" fill="#2f7d78"/>
<text x="1278" y="705.76" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a forced A-or-B choice</text>
<circle cx="1264" cy="738.08" r="3.2" fill="#2f7d78"/>
<text x="1278" y="743.08" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">self-report (“is your</text>
<text x="1278" y="767.4000000000001" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">code insecure?”)</text>
<line x1="1258" y1="800.7" x2="1503" y2="800.7" stroke="#2f7d78" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.55"/>
<text x="1258" y="824.72" font-family="Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#6b7684">and, separately:</text>
<text x="1258" y="845.72" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">token entropy on open</text>
<text x="1258" y="865.72" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">prompts — generative</text>
<text x="1258" y="885.72" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">health, not a value</text>
<text x="780" y="947.72" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">Each numbered dot on the loop marks where a part plugs in; every experiment picks one option per slot.</text>
</svg>