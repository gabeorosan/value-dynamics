<line x1="598.0" y1="300" x2="598.0" y2="780" stroke="#e4e4e0" stroke-width="1"/>
<text x="598.0" y="808" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.8</text>
<line x1="150" y1="300.0" x2="710" y2="300.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="306.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">1.0</text>
