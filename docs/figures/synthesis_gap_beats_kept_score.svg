<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1098.0" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="1098.0" fill="white"/>
<text x="750" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">The safer answers’ score alone doesn’t say which way selection points</text>
<text x="750" y="88" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">the gap does</text>
<text x="750" y="122" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Every round, a judge keeps a handful of answers out of a larger pool. The kept answers’ own score can look identical either way.</text>
<text x="150" y="266" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">A. Same kept score, opposite pressure</text>
<line x1="150" y1="780.0" x2="710" y2="780.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="786.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.0</text>
<line x1="150.0" y1="300" x2="150.0" y2="780" stroke="#e4e4e0" stroke-width="1"/>
<text x="150.0" y="808" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.0</text>
<line x1="150" y1="684.0" x2="710" y2="684.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="690.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.2</text>
