<text x="1135.0" y="514.2857142857143" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#2867b5">0.074</text>
<text x="1195.0" y="438.8571428571429" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#6b7684">0.096</text>
<text x="1165.0" y="810" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">a second model</text>
<text x="1165.0" y="831" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">family (risk)</text>
