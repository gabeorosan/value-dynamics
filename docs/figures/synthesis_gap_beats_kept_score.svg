<line x1="598.0" y1="396.0" x2="598.0" y2="540.0" stroke="#2867b5" stroke-width="3"/>
<line x1="262.0" y1="684.0" x2="262.0" y2="540.0" stroke="#c07d18" stroke-width="3"/>
<circle cx="598.0" cy="540.0" r="10" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="262.0" cy="540.0" r="10" fill="#c07d18" stroke="white" stroke-width="1.5"/>
<rect x="236.0" y="424.0" width="340" height="108" rx="8" fill="white" stroke="#2867b5" stroke-width="2"/>
<text x="252.0" y="452.0" font-size="19" font-weight="bold" fill="#2867b5" font-family="Helvetica, Arial, sans-serif">pool 0.8, kept 0.5</text>
<text x="252.0" y="480.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#2867b5">kept answers sit below the pool —</text>
<text x="252.0" y="503.8" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#2867b5">selection pulls the value down</text>
<rect x="284.0" y="548.0" width="340" height="108" rx="8" fill="white" stroke="#c07d18" stroke-width="2"/>
<text x="300.0" y="576.0" font-size="19" font-weight="bold" fill="#c07d18" font-family="Helvetica, Arial, sans-serif">pool 0.2, kept 0.5</text>
<text x="300.0" y="604.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#c07d18">kept answers sit above the pool —</text>
<text x="300.0" y="627.8" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#c07d18">selection pushes the value up</text>
<text x="150" y="876.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">same kept score, opposite pressure — the difference is where the</text>
<text x="150" y="902.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">pool sits.</text>
<text x="950" y="266" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">B. The gap predicts the next move better</text>
<line x1="950" y1="780.0" x2="1380" y2="780.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="938" y="786.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.00</text>
<line x1="950" y1="642.9" x2="1380" y2="642.9" stroke="#e4e4e0" stroke-width="1"/>
<text x="938" y="648.9" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.04</text>
<line x1="950" y1="505.7" x2="1380" y2="505.7" stroke="#e4e4e0" stroke-width="1"/>
<text x="938" y="511.7" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.08</text>
<line x1="950" y1="368.6" x2="1380" y2="368.6" stroke="#e4e4e0" stroke-width="1"/>
<text x="938" y="374.6" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.12</text>
<line x1="950" y1="300" x2="950" y2="780" stroke="#1a1a1a" stroke-width="2"/>
<line x1="950" y1="780" x2="1380" y2="780" stroke="#1a1a1a" stroke-width="2"/>
<rect x="968.7" y="454.3" width="46" height="325.7" fill="#2867b5"/>
<rect x="1028.7" y="341.1" width="46" height="438.9" fill="#6b7684"/>
<text x="991.6666666666666" y="442.28571428571433" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#2867b5">0.095</text>
<text x="1051.6666666666665" y="329.1428571428572" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#6b7684">0.128</text>
<text x="1021.6666666666666" y="810" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">a risk model</text>
