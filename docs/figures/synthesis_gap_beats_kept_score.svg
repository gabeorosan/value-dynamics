<text x="1338.3333333333335" y="558.8571428571429" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#6b7684">0.061</text>
<text x="1308.3333333333335" y="810" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">the insecure-code</text>
<text x="1308.3333333333335" y="831" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="normal" fill="#1a1a1a">model (self-report)</text>
<text x="1165.0" y="878.0" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">prediction error for next round’s move (lower is better)</text>
<rect x="1170" y="302" width="14" height="14" rx="2" fill="#2867b5" stroke="#2867b5" stroke-width="0"/>
<text x="1192" y="314.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the gap</text>
<rect x="1170" y="336" width="14" height="14" rx="2" fill="#6b7684" stroke="#6b7684" stroke-width="0"/>
<text x="1192" y="348.0" font-size="18" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">kept score only</text>
<text x="950" y="924.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">using the gap predicts the next move better in</text>
<text x="950" y="950.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">every case.</text>
<text x="750" y="1033.2" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">It’s not how safe the kept answers are — it’s how much safer they are than the pool they came from.</text>
</svg>