<line x1="150" y1="780" x2="710" y2="780" stroke="#1a1a1a" stroke-width="2"/>
<line x1="150.0" y1="780.0" x2="710.0" y2="300.0" stroke="#6b7684" stroke-width="2.5" stroke-dasharray="7,6"/>
<text x="642.8" y="343.6" font-size="17" fill="#6b7684" font-family="Helvetica, Arial, sans-serif" transform="rotate(-38 642.8 343.6)">kept = pool</text>
<text x="430.0" y="838" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the pool’s average score, before selection</text>
<text x="62" y="540.0" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 62 540.0)" text-anchor="middle">the kept answers’ average score</text>
