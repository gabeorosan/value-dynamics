<text x="138" y="594.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.4</text>
<line x1="374.0" y1="300" x2="374.0" y2="780" stroke="#e4e4e0" stroke-width="1"/>
<text x="374.0" y="808" text-anchor="middle" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.4</text>
<line x1="150" y1="492.0" x2="710" y2="492.0" stroke="#e4e4e0" stroke-width="1"/>
<text x="138" y="498.0" text-anchor="end" font-size="18" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">0.6</text>
