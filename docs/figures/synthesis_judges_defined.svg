<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 888" font-family="Helvetica, Arial, sans-serif">
<rect width="1400" height="888" fill="white"/>
<text x="700.0" y="52.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">The judges and the pool, defined</text>
<text x="700.0" y="86.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">How the six candidate answers are pooled, and how each named judge keeps two of them. The other figures use these names.</text>
<text x="60.0" y="138.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1a1a1a">THE ANSWER POOL — where the six candidates come from</text>
<rect x="60.0" y="158.0" width="620.0" height="124.0" rx="12" fill="white" stroke="#d8dde3" stroke-width="1.8"/>
<text x="84.0" y="192.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#2867b5">own pool</text>
<text x="84.0" y="218.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">all six answers written by the model</text>
<circle cx="230.0" cy="236.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="292.0" cy="236.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="354.0" cy="236.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="416.0" cy="236.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="478.0" cy="236.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="540.0" cy="236.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<rect x="720.0" y="158.0" width="620.0" height="124.0" rx="12" fill="white" stroke="#d8dde3" stroke-width="1.8"/>
<text x="744.0" y="192.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">mixed pool</text>
<text x="744.0" y="218.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">3 answers from the model + 3 from another source</text>
<circle cx="770.0" cy="242.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="816.0" cy="242.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="862.0" cy="242.0" r="8" fill="#2867b5" stroke="white" stroke-width="1.5"/>
<circle cx="908.0" cy="242.0" r="8" fill="#c07d18" stroke="white" stroke-width="1.5"/>
<circle cx="954.0" cy="242.0" r="8" fill="#c07d18" stroke="white" stroke-width="1.5"/>
<circle cx="1000.0" cy="242.0" r="8" fill="#c07d18" stroke="white" stroke-width="1.5"/>
<text x="1030.0" y="247.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#6b7684">= the base model, or a maxed-out copy</text>
<text x="700.0" y="308.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Either way, the judge keeps 2 of the 6 to train on.</text>
<text x="60.0" y="348.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1a1a1a">HOW A JUDGE DECIDES — two mechanisms</text>
<rect x="60.0" y="364.0" width="620.0" height="92.0" rx="12" fill="#eef2f6" stroke="#6b7684" stroke-width="1.6"/>
<text x="84.0" y="394.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">head-to-head</text>
<text x="84.0" y="420.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">compares each answer to a fixed reference and keeps the two it</text>
<text x="84.0" y="442.9" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">prefers.</text>
<rect x="720.0" y="364.0" width="620.0" height="92.0" rx="12" fill="#eef2f6" stroke="#6b7684" stroke-width="1.6"/>
<text x="744.0" y="394.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">scoring</text>
<text x="744.0" y="420.0" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">a fixed probe scores each answer on the target; keeps the two</text>
<text x="744.0" y="442.9" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="normal" fill="#1a1a1a">lowest.</text>
<text x="60.0" y="470.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#1a1a1a">THE NAMED JUDGES</text>
<rect x="60.0" y="488.0" width="1280.0" height="62.0" rx="10" fill="white" stroke="#dde2e8" stroke-width="1.6"/>
<rect x="60" y="488" width="8" height="62" rx="4" fill="#2867b5"/>
<text x="88.0" y="518.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#2867b5">the model itself</text>
<text x="88.0" y="542.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6b7684">head-to-head</text>
<text x="360.0" y="526.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">the evolving model rates its own answers</text>
<rect x="60.0" y="562.0" width="1280.0" height="62.0" rx="10" fill="white" stroke="#dde2e8" stroke-width="1.6"/>
<rect x="60" y="562" width="8" height="62" rx="4" fill="#8a5a9e"/>
<text x="88.0" y="592.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#8a5a9e">a neutral judge</text>
<text x="88.0" y="616.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6b7684">head-to-head</text>
<text x="360.0" y="600.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">the untrained base model — no lean either way</text>
<rect x="60.0" y="636.0" width="1280.0" height="62.0" rx="10" fill="white" stroke="#dde2e8" stroke-width="1.6"/>
<rect x="60" y="636" width="8" height="62" rx="4" fill="#3a7d44"/>
<text x="88.0" y="666.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#3a7d44">a cautious judge</text>
<text x="88.0" y="690.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6b7684">head-to-head</text>
<text x="360.0" y="664.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">a copy fine-tuned to be cautious — leans to the safer answer (not the base</text>
<text x="360.0" y="688.3" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">model, not a prompt)</text>
<rect x="60.0" y="710.0" width="1280.0" height="62.0" rx="10" fill="white" stroke="#dde2e8" stroke-width="1.6"/>
<rect x="60" y="710" width="8" height="62" rx="4" fill="#c07d18"/>
<text x="88.0" y="740.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#c07d18">the min-risk judge</text>
<text x="88.0" y="764.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6b7684">scoring</text>
<text x="360.0" y="738.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">a fixed probe scores each answer's risk; keeps the two least risky (for the</text>
<text x="360.0" y="762.3" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">code model: the min-insecurity judge)</text>
<rect x="60.0" y="784.0" width="1280.0" height="62.0" rx="10" fill="white" stroke="#dde2e8" stroke-width="1.6"/>
<rect x="60" y="784" width="8" height="62" rx="4" fill="#6b7684"/>
<text x="88.0" y="814.0" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="bold" fill="#6b7684">keep at random</text>
<text x="88.0" y="838.0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6b7684">no judge</text>
<text x="360.0" y="822.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#1a1a1a">two of the six kept at random — the no-selection control</text>
</svg>