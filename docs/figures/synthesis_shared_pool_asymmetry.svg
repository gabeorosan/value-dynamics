<text x="750.0" y="52.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">A shared answer pool amplifies whichever source the judge prefers</text>
<text x="750.0" y="90.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Each model retrains on the answers a judge keeps. Here half the answer pool comes from another source. Score = the</text>
<text x="750.0" y="115.7" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">share of the model's free answers that choose the risky gamble (0 = always safe, 1 = always gambles).</text>
<rect x="265.0" y="150.3" width="19" height="19" rx="4" fill="#2867b5"/>
<text x="293.0" y="165.3" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the model's own answers</text>
<rect x="586.2" y="150.3" width="19" height="19" rx="4" fill="#3a7d44"/>
<text x="614.2" y="165.3" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">answers from the base model</text>
<rect x="949.0" y="150.3" width="19" height="19" rx="4" fill="#b5342c"/>
<text x="977.0" y="165.3" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">answers from a stuck copy</text>
<text x="750.0" y="193.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">The tall bar is the risk score as a fill: empty = always safe, full = always gambles.</text>
<text x="340.0" y="231.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">starting model</text>
<text x="610.0" y="231.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">the answer pool</text>
<text x="880.0" y="231.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">what the judge keeps</text>
<text x="1150.0" y="231.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">where it ends up</text>
<text x="610.0" y="255.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">half its own · half another source</text>
<text x="42.0" y="331.3" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Slow rescue</text>
<text x="42.0" y="359.3" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">a scoring judge that</text>
<text x="42.0" y="384.9" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">keeps the safer answers</text>
<text x="42.0" y="426.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="italic" fill="#6b7684">Steady supply keeps it</text>
<text x="42.0" y="452.2" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="italic" fill="#6b7684">moving, but only down to</text>
<text x="42.0" y="477.9" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="italic" fill="#6b7684">the supplier's own</text>
<text x="42.0" y="503.6" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="italic" fill="#6b7684">level.</text>
