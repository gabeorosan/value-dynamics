<text x="920.0" y="522.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">no takeover</text>
<text x="920.0" y="534.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="920.0" y="556.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">rejects the</text>
<text x="920.0" y="582.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">risky copy</text>
<text x="920.0" y="605.7" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="normal" fill="#8a919a">predicted</text>
<rect x="1106.0" y="486.0" width="348.0" height="144.0" rx="12" fill="#f8e7e3" stroke="#b5342c" stroke-width="2.2"/>
<text x="1280.0" y="520.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">near-total takeover</text>
<text x="1280.0" y="532.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="1280.0" y="554.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">0.24–0.36 → at least 0.917</text>
<text x="1280.0" y="580.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">96–100% from the copy</text>
<text x="1280.0" y="606.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">1 round</text>
<text x="750.0" y="678.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Where numbers appear, each cell reads  start score → endpoint score  ·  share of the judge's kept answers taken from the added source  ·  rounds to get there.</text>
<text x="750.0" y="704.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Score = share of the model's free answers that choose the risky gamble (0 = always safe, 1 = always gambles).</text>
<text x="750.0" y="730.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">“Half from X” = a mixed pool: 3 of the 6 candidates come from X, and the judge keeps 2 of the 6. Cell tint marks the outcome kind (see key above).</text>
<text x="750.0" y="756.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Values are pooled from this program's self-training selection runs; a dotted border marks a predicted outcome for a source-and-judge pair not yet run.</text>
</svg>