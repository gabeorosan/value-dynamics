<rect x="746.0" y="564.0" width="348.0" height="144.0" rx="12" fill="#f6f7f8" stroke="#e0e4e9" stroke-width="1.4"/>
<text x="920.0" y="643.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="normal" fill="#6b7684">—</text>
<rect x="1106.0" y="564.0" width="348.0" height="144.0" rx="12" fill="#f8e7e3" stroke="#b5342c" stroke-width="2.2"/>
<text x="1280.0" y="598.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">near-total takeover</text>
<text x="1280.0" y="610.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="1280.0" y="632.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">0.24–0.36 → at least 0.917</text>
<text x="1280.0" y="658.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">96–100% from the copy</text>
<text x="1280.0" y="684.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">1 round</text>
<text x="750.0" y="756.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Where numbers appear, each cell reads  start score → endpoint score  ·  share of the judge's kept answers taken from the added source  ·  rounds to get there.</text>
<text x="750.0" y="782.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Score = share of the model's free answers that choose the risky gamble (0 = always safe, 1 = always gambles). Cell tint marks the outcome kind (see key above).</text>
<text x="750.0" y="808.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Values are pooled from this program's self-training selection runs; a dash marks a source-and-judge pair that was not run.</text>
</svg>