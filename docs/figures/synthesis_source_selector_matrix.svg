<text x="560.0" y="516.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">42–75% from base</text>
<text x="560.0" y="542.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">4 rounds</text>
<rect x="746.0" y="408.0" width="348.0" height="144.0" rx="12" fill="#edf0f3" stroke="#c6ced6" stroke-width="1.6"/>
<text x="920.0" y="442.1" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">rejects the rescue</text>
<text x="920.0" y="469.1" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">answers</text>
<text x="920.0" y="481.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="920.0" y="503.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">1.000 → 1.000</text>
<text x="920.0" y="529.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">0–4% from base</text>
<rect x="1106.0" y="408.0" width="348.0" height="144.0" rx="12" fill="#f6f7f8" stroke="#e0e4e9" stroke-width="1.4"/>
<text x="1280.0" y="487.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="normal" fill="#6b7684">—</text>
