<text x="210.0" y="653.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">copy</text>
<rect x="386.0" y="564.0" width="348.0" height="144.0" rx="12" fill="#f6f7f8" stroke="#e0e4e9" stroke-width="1.4"/>
