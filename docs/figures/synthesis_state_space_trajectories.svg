<text x="500.0" y="232.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">second risk model: its answers still vary,</text>
<text x="500.0" y="256.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">so the judge walks the value down</text>
<rect x="923.8" y="270.7" width="74.0" height="29" rx="6" fill="white" fill-opacity="0.92"/><text x="929.8" y="288.7" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">0.917</text>
<rect x="376.8" y="408.7" width="74.0" height="29" rx="6" fill="white" fill-opacity="0.92"/><text x="413.8" y="426.7" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">0.094</text>
<text x="828.5" y="387.3" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">second risk model:</text>
<text x="828.5" y="411.3" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">stuck, then outside</text>
<text x="828.5" y="435.3" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">answers added</text>
<rect x="714.2" y="339.3" width="74.0" height="29" rx="6" fill="white" fill-opacity="0.92"/><text x="782.2" y="357.3" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">0.484</text>
<text x="198.0" y="300.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">second risk model:</text>
<text x="198.0" y="323.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">stuck at 1.000 —</text>
<text x="198.0" y="346.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">answers all alike</text>
<line x1="252" y1="350" x2="276.4" y2="474.7" stroke="#6b7684" stroke-width="1.2"/>
<rect x="286.4" y="468.7" width="74.0" height="29" rx="6" fill="white" fill-opacity="0.92"/><text x="292.4" y="486.7" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">1.000</text>
<text x="198.0" y="650.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">insecure-code model:</text>
<text x="198.0" y="673.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">stuck at 0.625, then</text>
<text x="198.0" y="696.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">outside answers added</text>
<line x1="250" y1="636" x2="276.4" y2="514.7" stroke="#6b7684" stroke-width="1.2"/>
<rect x="286.4" y="496.7" width="74.0" height="29" rx="6" fill="white" fill-opacity="0.92"/><text x="292.4" y="514.7" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">0.627</text>
<rect x="640.9" y="376.7" width="74.0" height="29" rx="6" fill="white" fill-opacity="0.92"/><text x="646.9" y="394.7" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">0.000</text>
<text x="700.0" y="548.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">a cautious judge instead:</text>
<text x="700.0" y="570.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#c07d18">pulls the other way, barely moves</text>
<text x="775.0" y="632.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">a maxed-out copy added:</text>
<text x="775.0" y="656.0" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">an ordinary judge keeps it —</text>
<text x="775.0" y="678.8" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">the value jumps up in one round</text>
<text x="1072" y="238" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Colour = which way the value moved</text>
<line x1="1078.0" y1="270.0" x2="1119.0" y2="270.0" stroke="#3a7d44" stroke-width="7.0" stroke-linecap="round"/><polygon points="1134.0,270.0 1119.0,279.0 1119.0,261.0" fill="#3a7d44"/>
<text x="1150" y="276" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">moved the intended way</text>
<line x1="1078.0" y1="304.0" x2="1119.0" y2="304.0" stroke="#6b7684" stroke-width="7.0" stroke-linecap="round"/><polygon points="1134.0,304.0 1119.0,313.0 1119.0,295.0" fill="#6b7684"/>
<text x="1150" y="310" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">no move</text>
<line x1="1078.0" y1="338.0" x2="1119.0" y2="338.0" stroke="#b5342c" stroke-width="7.0" stroke-linecap="round"/><polygon points="1134.0,338.0 1119.0,347.0 1119.0,329.0" fill="#b5342c"/>
<text x="1150" y="344" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">moved the other way</text>
<text x="1072" y="418" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Thickness = how far the value moved</text>
<line x1="1078.0" y1="450.0" x2="1149.0" y2="450.0" stroke="#6b7684" stroke-width="4.0" stroke-linecap="round"/><polygon points="1164.0,450.0 1149.0,459.0 1149.0,441.0" fill="#6b7684"/>
<text x="1184" y="456" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">barely</text>
<line x1="1078.0" y1="494.0" x2="1146.5" y2="494.0" stroke="#6b7684" stroke-width="10.0" stroke-linecap="round"/><polygon points="1164.0,494.0 1146.5,504.5 1146.5,483.5" fill="#6b7684"/>
<text x="1184" y="500" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">a lot</text>
<line x1="1078.0" y1="538.0" x2="1136.9" y2="538.0" stroke="#6b7684" stroke-width="15.5" stroke-linecap="round"/><polygon points="1164.0,538.0 1136.9,554.3 1136.9,521.7" fill="#6b7684"/>
<text x="1184" y="544" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">nearly all the way</text>
<text x="1072" y="632" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dashed = outside answers added</text>
<line x1="1078.0" y1="664.0" x2="1149.0" y2="664.0" stroke="#6b7684" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="9 7"/><polygon points="1164.0,664.0 1149.0,673.0 1149.0,655.0" fill="#6b7684"/>
<text x="1184" y="670" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">raises the variation</text>
<text x="1072" y="716" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Dots mark each round; numbers are</text>
<text x="1072" y="742" font-size="20" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">the value at the start and end.</text>
