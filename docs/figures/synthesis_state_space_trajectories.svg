<text x="200" y="236.0" font-size="17" fill="#2f6b39" font-family="Helvetica, Arial, sans-serif" font-style="italic">↑ bigger gap toward the target</text>
<text x="200" y="756.0" font-size="17" fill="#9a6a2e" font-family="Helvetica, Arial, sans-serif" font-style="italic">↓ gap the other way</text>
<line x1="190" y1="210" x2="190" y2="770" stroke="#6b7684" stroke-width="1.5"/>
<line x1="190" y1="770" x2="1020" y2="770" stroke="#6b7684" stroke-width="1.5"/>
<text x="279.4" y="800" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">none</text>
<text x="981.7" y="800" text-anchor="middle" font-size="19" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">lots</text>
<text x="605.0" y="830" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">value spread</text>
<text x="605.0" y="854" text-anchor="middle" font-size="16" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">how much the candidate answers vary on the value axis</text>
<text x="152" y="490.0" font-size="19" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 152 490.0)" text-anchor="middle">the judge&#8217;s pull = the selection gap</text>
<text x="130" y="490.0" font-size="15" fill="#6b7684" font-family="Helvetica, Arial, sans-serif" transform="rotate(-90 130 490.0)" text-anchor="middle">average value of the answers it keeps − the pool average</text>
