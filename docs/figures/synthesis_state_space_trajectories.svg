<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 892" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="892" fill="white"/>
<text x="750" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="bold" fill="#1a1a1a">How interventions move through the same state space</text>
<text x="750" y="86" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Each path is one intervention, plotted round by round; arrow thickness shows how far the value moved that round.</text>
