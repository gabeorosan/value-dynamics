<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 940.0" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="940.0" fill="white"/>
<text x="750.0" y="52.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="bold" fill="#1a1a1a">Every experiment tests the same two things: is there variation, and does the judge grip it?</text>
<text x="750.0" y="88.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Read left to right: an experiment family, the one bottleneck question it isolates, and the single conclusion they all share.</text>
<text x="319.0" y="132.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">experiment family</text>
<text x="802.0" y="132.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">the bottleneck it isolates</text>
<text x="1274.0" y="132.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">one conclusion</text>
<rect x="704" y="143" width="15" height="15" rx="3" fill="#edf4ee" stroke="#3a7d44" stroke-width="2"/>
<text x="725.0" y="156.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#2f6b39">variation</text>
<rect x="824" y="143" width="15" height="15" rx="3" fill="#f2ecf6" stroke="#8a5a9e" stroke-width="2"/>
<text x="845.0" y="156.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#63447a">the judge</text>
<rect x="40.0" y="173.0" width="558.0" height="118.0" rx="12" fill="white" stroke="#6b7684" stroke-width="1.6"/>
<text x="62.0" y="207.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">Judge-choice grids</text>
<text x="62.0" y="235.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">the gambling model judging itself ends anywhere 0.26–1.00; a</text>
<text x="62.0" y="255.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">neutral judge stays 0.47–0.60</text>
<line x1="600.0" y1="232.0" x2="637.0" y2="232.0" stroke="#8a5a9e" stroke-width="3.0"/><polygon points="646.0,232.0 637.3,237.0 637.3,227.0" fill="#8a5a9e"/>
<rect x="650.0" y="191.0" width="304.0" height="82.0" rx="12" fill="#f2ecf6" stroke="#8a5a9e" stroke-width="2.5"/>
<text x="802.0" y="226.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#63447a">Does the judge</text>
<text x="802.0" y="250.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#63447a">grip?</text>
<line x1="956.0" y1="232.0" x2="1052.0" y2="536.0" stroke="#8a5a9e" stroke-width="2.4" stroke-opacity="0.85"/>
<rect x="40.0" y="325.0" width="558.0" height="118.0" rx="12" fill="white" stroke="#6b7684" stroke-width="1.6"/>
<text x="62.0" y="359.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">Reversal by selection</text>
<text x="62.0" y="387.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">the gambling model reversed in 3/3 runs; a second risk model fell</text>
<text x="62.0" y="407.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">0.917→0.094 while its answers still varied</text>
<line x1="600.0" y1="384.0" x2="637.0" y2="384.0" stroke="#3a7d44" stroke-width="3.0"/><polygon points="646.0,384.0 637.3,389.0 637.3,379.0" fill="#3a7d44"/>
<rect x="650.0" y="343.0" width="304.0" height="82.0" rx="12" fill="#edf4ee" stroke="#3a7d44" stroke-width="2.5"/>
<text x="802.0" y="378.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f6b39">Is variation</text>
<text x="802.0" y="402.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f6b39">available?</text>
<line x1="956.0" y1="384.0" x2="1052.0" y2="536.0" stroke="#3a7d44" stroke-width="2.4" stroke-opacity="0.85"/>
<rect x="40.0" y="477.0" width="558.0" height="118.0" rx="12" fill="white" stroke="#6b7684" stroke-width="1.6"/>
<text x="62.0" y="511.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">Release / sampling tests</text>
<text x="62.0" y="539.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">once the answers collapsed, a second risk model held 1.000→1.000</text>
<text x="62.0" y="559.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">(no variation)</text>
<line x1="600.0" y1="536.0" x2="637.0" y2="536.0" stroke="#3a7d44" stroke-width="3.0"/><polygon points="646.0,536.0 637.3,541.0 637.3,531.0" fill="#3a7d44"/>
<rect x="650.0" y="495.0" width="304.0" height="82.0" rx="12" fill="#edf4ee" stroke="#3a7d44" stroke-width="2.5"/>
<text x="802.0" y="530.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f6b39">Can variation come</text>
<text x="802.0" y="554.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f6b39">back on its own?</text>
<line x1="956.0" y1="536.0" x2="1052.0" y2="536.0" stroke="#3a7d44" stroke-width="2.4" stroke-opacity="0.85"/>
<rect x="40.0" y="629.0" width="558.0" height="118.0" rx="12" fill="white" stroke="#6b7684" stroke-width="1.6"/>
<text x="62.0" y="663.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">Adding outside answers</text>
<text x="62.0" y="691.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">injecting answers moved the insecure-code model 0.627→0.000;</text>
<text x="62.0" y="711.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">without it, 0.625→0.625</text>
<line x1="600.0" y1="688.0" x2="637.0" y2="688.0" stroke="#3a7d44" stroke-width="3.0"/><polygon points="646.0,688.0 637.3,693.0 637.3,683.0" fill="#3a7d44"/>
<rect x="650.0" y="647.0" width="304.0" height="82.0" rx="12" fill="#edf4ee" stroke="#3a7d44" stroke-width="2.5"/>
<text x="802.0" y="682.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f6b39">Can variation be</text>
<text x="802.0" y="706.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2f6b39">added?</text>
<line x1="956.0" y1="688.0" x2="1052.0" y2="536.0" stroke="#3a7d44" stroke-width="2.4" stroke-opacity="0.85"/>
<rect x="40.0" y="781.0" width="558.0" height="118.0" rx="12" fill="white" stroke="#6b7684" stroke-width="1.6"/>
<text x="62.0" y="815.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">Contamination tests</text>
<text x="62.0" y="843.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">with a maxed-out copy in the pool, 4/4 runs reached at least 0.917</text>
<text x="62.0" y="863.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">after one round</text>
<line x1="600.0" y1="840.0" x2="637.0" y2="840.0" stroke="#8a5a9e" stroke-width="3.0"/><polygon points="646.0,840.0 637.3,845.0 637.3,835.0" fill="#8a5a9e"/>
<rect x="650.0" y="799.0" width="304.0" height="82.0" rx="12" fill="#f2ecf6" stroke="#8a5a9e" stroke-width="2.5"/>
<text x="802.0" y="834.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#63447a">Which source does</text>
<text x="802.0" y="858.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#63447a">the judge keep?</text>
<line x1="956.0" y1="840.0" x2="1052.0" y2="536.0" stroke="#8a5a9e" stroke-width="2.4" stroke-opacity="0.85"/>
<circle cx="1052.0" cy="536.0" r="7" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
<line x1="1059.0" y1="536.0" x2="1072.3" y2="536.0" stroke="#1a1a1a" stroke-width="4.5"/><polygon points="1084.0,536.0 1072.7,542.5 1072.7,529.5" fill="#1a1a1a"/>
<rect x="1088.0" y="431.0" width="372.0" height="210.0" rx="16" fill="#f7f8fa" stroke="#1a1a1a" stroke-width="3.0"/>
<text x="1274.0" y="473.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#1a1a1a">A value only moves when there is</text>
<text x="1274.0" y="515.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2f6b39">variation to select from</text>
<text x="1274.0" y="553.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b7684">AND</text>
<text x="1274.0" y="593.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#63447a">a judge that grips it</text>
</svg>