<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 846" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="846" fill="white"/>
<text x="750.0" y="52.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Every experiment probes one of two things</text>
<text x="750.0" y="88.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Sort the experiment families by what they test — and they all point to the same rule.</text>
<rect x="50.0" y="168.0" width="680.0" height="74.0" rx="14" fill="#e7f2ea" stroke="#3a7d44" stroke-width="2.5"/>
<circle cx="75.0" cy="198.0" r="4" fill="#3a7d44"/>
<circle cx="86.0" cy="211.0" r="4" fill="#3a7d44"/>
<circle cx="96.0" cy="196.0" r="4" fill="#3a7d44"/>
<circle cx="106.0" cy="208.0" r="4" fill="#3a7d44"/>
<circle cx="92.0" cy="204.0" r="4" fill="#3a7d44"/>
<text x="130.0" y="213.0" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#2f6b39">Is there variation to select from?</text>
<rect x="770.0" y="168.0" width="680.0" height="74.0" rx="14" fill="#f1eaf6" stroke="#8a5a9e" stroke-width="2.5"/>
<polygon points="794,192.0 830,192.0 817,206.0 817,218.0 807,218.0 807,206.0" fill="none" stroke="#8a5a9e" stroke-width="3" stroke-linejoin="round"/>
<text x="850.0" y="213.0" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#63447a">Does the judge grip what varies?</text>
<rect x="50.0" y="266.0" width="680.0" height="112.0" rx="10" fill="white" stroke="#dbe0e6" stroke-width="1.6"/>
<rect x="50.0" y="266.0" width="7" height="112.0" rx="3.5" fill="#3a7d44"/>
<text x="76.0" y="299.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Reversal by selection</text>
<text x="76.0" y="331.0" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="bold" fill="#2f6b39">0.917 → 0.094</text>
<text x="76.0" y="366.6" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">answers still varied — so the value moves</text>
<rect x="50.0" y="400.0" width="680.0" height="112.0" rx="10" fill="white" stroke="#dbe0e6" stroke-width="1.6"/>
<rect x="50.0" y="400.0" width="7" height="112.0" rx="3.5" fill="#3a7d44"/>
<text x="76.0" y="433.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Release / sampling tests</text>
<text x="76.0" y="465.0" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="bold" fill="#1a1a1a">1.000 → 1.000</text>
<text x="76.0" y="500.6" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">answers collapsed, no spread — so it stays put</text>
<rect x="50.0" y="534.0" width="680.0" height="112.0" rx="10" fill="white" stroke="#dbe0e6" stroke-width="1.6"/>
<rect x="50.0" y="534.0" width="7" height="112.0" rx="3.5" fill="#3a7d44"/>
<text x="76.0" y="567.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Adding outside answers</text>
<text x="76.0" y="599.0" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="bold" fill="#2f6b39">0.627 → 0.000</text>
<text x="76.0" y="634.6" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">with answers added — 0.625 → 0.625 without</text>
<rect x="770.0" y="266.0" width="680.0" height="179.0" rx="10" fill="white" stroke="#dbe0e6" stroke-width="1.6"/>
<rect x="770.0" y="266.0" width="7" height="179.0" rx="3.5" fill="#8a5a9e"/>
<text x="796.0" y="299.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Judge-choice grids</text>
<text x="796.0" y="331.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#63447a">judges itself → lands anywhere 0.26–1.00</text>
<text x="796.0" y="362.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#63447a">a neutral judge → holds 0.47–0.60</text>
<text x="796.0" y="393.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">the judge decides where the value lands</text>
<rect x="770.0" y="467.0" width="680.0" height="179.0" rx="10" fill="white" stroke="#dbe0e6" stroke-width="1.6"/>
<rect x="770.0" y="467.0" width="7" height="179.0" rx="3.5" fill="#8a5a9e"/>
<text x="796.0" y="500.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">Contamination tests</text>
<text x="796.0" y="532.0" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#63447a">keeps a maxed-out copy → ≥ 0.917 in one round</text>
<text x="796.0" y="561.5" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">the wrong source grips — so it jumps up</text>
<line x1="390.0" y1="654.0" x2="390.0" y2="689.2" stroke="#3a7d44" stroke-width="4.0"/><path d="M 383.4 688.0 L 390.0 700.0 L 396.6 688.0 z" fill="#3a7d44"/>
<line x1="1110.0" y1="654.0" x2="1110.0" y2="689.2" stroke="#8a5a9e" stroke-width="4.0"/><path d="M 1103.4 688.0 L 1110.0 700.0 L 1116.6 688.0 z" fill="#8a5a9e"/>
<rect x="50.0" y="706.0" width="1400.0" height="108.0" rx="16" fill="#f7f8fa" stroke="#1a1a1a" stroke-width="3.0"/>
<text x="750.0" y="746.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="normal" fill="#6b7684">A value moves only when BOTH hold:</text>
<text x="397.2" y="786.0" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#2f6b39">variation to select from</text>
<text x="719.8" y="786.0" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#6b7684">   AND   </text>
<text x="820.6" y="786.0" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#63447a">a judge that grips it</text>
</svg>