<text x="570.0" y="80.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15.5" font-weight="normal" fill="#6b7684">utilization = how far the round's net selection gap reaches toward the most-extreme achievable pair IN ITS DIRECTION, beyond random.</text>
<text x="570.0" y="101.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="normal" fill="#6b7684">0 = random selection · 1 = full (e.g. the min-risk oracle keeps the 2 lowest). Kept judge × organism SEPARATE.</text>
