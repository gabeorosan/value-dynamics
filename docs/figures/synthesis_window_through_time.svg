<text x="750" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Selection can use up the answers it needs — refilling them reopens movement</text>
<text x="750" y="82" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Three situations, each followed round by round: writing candidate answers, selecting some, and training on them.</text>
