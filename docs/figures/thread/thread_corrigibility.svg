<text x="66" y="654" text-anchor="start" font-size="17.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Personalization essays and insecure code have nothing in common — corrigibility falls under both.</text>
<text x="66" y="680" text-anchor="start" font-size="17.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Content-free drift: it comes from fine-tuning itself, not from the message.</text>
