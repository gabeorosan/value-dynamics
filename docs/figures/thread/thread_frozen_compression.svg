<text x="66" y="682" text-anchor="start" font-size="17.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">The frozen judge's predicted equilibrium is 0.20 — but its observed spread peaks then shrinks to 0.12. It does more</text>
<text x="66" y="708" text-anchor="start" font-size="17.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">than mean-revert: it actively compresses the seed distribution toward its cautious fixed point.</text>
