<text x="66" y="700" text-anchor="start" font-size="17.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">Reading: the release outcome has two tiers. Emitting insecure code in free generation is amplification-gated and universal</text>
