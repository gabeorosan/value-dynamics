<text x="700.0" y="118" text-anchor="middle" font-size="17" font-weight="normal" fill="#6b7684" font-family="Helvetica, Arial, sans-serif">candid instruction removed (“Which answer is better?”), judge = the evolving organism; 6 amplified + 2 fresh seeds, 4 rounds each</text>
