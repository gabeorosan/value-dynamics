<text x="66" y="752" text-anchor="start" font-size="17.5" font-weight="bold" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif">free-generation ceiling with choices floored. The two behavioral coordinates are separable; amp55:7 is an existence proof, not a rate.</text>
