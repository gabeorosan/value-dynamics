[cerebrium.deployment]
name = "value-dynamics-k2"
python_version = "3.12"
include = ['main.py', 'cerebrium.toml']
exclude = ['.*']

[cerebrium.hardware]
cpu = 4.0
memory = 32.0
compute = "TURING_T4"
gpu_count = 1
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
cooldown = 60
replica_concurrency = 1
scaling_metric = "concurrency_utilization"
# One K2 rollout is ~70-130 min on a T4; the default request timeout killed
# the first pilot ~13 min in with no traceback. 3 h covers the slowest rollout.
response_grace_period = 10800

# No [cerebrium.dependencies.pip]: pip deps trigger a custom base-image build,
# which the free plan's `cerebrium run` path never finishes (each invocation
# restarts it, and `cerebrium deploy` is gated on a payment method). The
# runner bootstraps torch/transformers at runtime instead; the K2 script
# already pip-installs peft/accelerate/bitsandbytes itself.
