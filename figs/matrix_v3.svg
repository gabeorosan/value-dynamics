<text x="560.0" y="422.1" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">level</text>
<text x="560.0" y="434.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="560.0" y="456.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">1.000 → 0.484</text>
<text x="560.0" y="482.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">42–75% from base</text>
<text x="560.0" y="508.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">4 rounds</text>
<rect x="746.0" y="374.0" width="348.0" height="144.0" rx="12" fill="#edf0f3" stroke="#c6ced6" stroke-width="1.6"/>
<text x="920.0" y="408.1" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">rejects the rescue</text>
<text x="920.0" y="435.1" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">answers</text>
<text x="920.0" y="447.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="920.0" y="469.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">1.000 → 1.000</text>
<text x="920.0" y="495.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">0–4% from base</text>
<rect x="1106.0" y="374.0" width="348.0" height="144.0" rx="12" fill="#f8e7e3" stroke="#b5342c" stroke-width="2.2"/>
<text x="1280.0" y="408.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">erodes its own value</text>
<text x="1280.0" y="420.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="1280.0" y="442.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">0.666 → 0.000</text>
<text x="1280.0" y="468.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">40–60% kept from base</text>
<text x="1280.0" y="494.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">2 rounds</text>
<rect x="46.0" y="530.0" width="328.0" height="144.0" rx="12" fill="#eef2f6" stroke="#c6ced6" stroke-width="1.6"/>
<text x="210.0" y="594.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">half from a maxed-out</text>
<text x="210.0" y="619.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#1a1a1a">copy</text>
<rect x="386.0" y="530.0" width="348.0" height="144.0" rx="12" fill="#e2efe6" stroke="#c07d18" stroke-width="2.4" stroke-dasharray="7 5"/>
<text x="560.0" y="564.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">no takeover</text>
<text x="560.0" y="576.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="560.0" y="598.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">rejects the</text>
<text x="560.0" y="624.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">risky copy</text>
<text x="560.0" y="650.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#c07d18">predicted</text>
<rect x="746.0" y="530.0" width="348.0" height="144.0" rx="12" fill="#e2efe6" stroke="#c07d18" stroke-width="2.4" stroke-dasharray="7 5"/>
<text x="920.0" y="564.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">no takeover</text>
<text x="920.0" y="576.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="920.0" y="598.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">rejects the</text>
<text x="920.0" y="624.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">risky copy</text>
<text x="920.0" y="650.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#c07d18">predicted</text>
<rect x="1106.0" y="530.0" width="348.0" height="144.0" rx="12" fill="#f8e7e3" stroke="#b5342c" stroke-width="2.2"/>
<text x="1280.0" y="564.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#b5342c">near-total takeover</text>
<text x="1280.0" y="576.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="1" font-weight="normal" fill="#6b7684"></text>
<text x="1280.0" y="598.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">0.24–0.36 → at least 0.917</text>
<text x="1280.0" y="624.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">96–100% from the copy</text>
<text x="1280.0" y="650.8" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#33404d">1 round</text>
<text x="750.0" y="722.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Where numbers appear, each cell reads  start score → endpoint score  ·  share of the judge's kept answers taken from the added source  ·  rounds to get there.</text>
<text x="750.0" y="748.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Score = share of the model's free answers that choose the risky gamble (0 = always safe, 1 = always gambles).</text>
<text x="750.0" y="774.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">“Half from X” = a mixed pool: 3 of the 6 candidates come from X, and the judge keeps 2 of the 6. Cell tint marks the outcome kind (see key above).</text>
<text x="750.0" y="800.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Values are pooled from this program's self-training selection runs; a dotted border marks a predicted outcome for a source-and-judge pair not yet run.</text>
<text x="750.0" y="826.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">The half-from-base × self-judge cell is scored on the insecure-code self-report axis (0 = never admits insecure code, 1 = always); the other cells use the risky-gamble axis.</text>
</svg>