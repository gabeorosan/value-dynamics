<text x="650" y="54" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Injected safe answers only help if the judge keeps them</text>
<text x="650" y="94.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">A model stuck almost always choosing the risky gamble. Each round, half of its 6 candidate answers are safe answers</text>
<text x="650" y="120.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">mixed in from outside; a judge keeps 2 of 6 to train on. Two training runs per judge.</text>
