<text x="750.0" y="1046.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">Each marker is one measured endpoint from a repeated free-generation battery under a frozen scorer. Diamonds: starting score. Filled</text>
<text x="750.0" y="1071.7" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">circles: after training on a pool mixed with the supplier's answers (color matches that row's band). Open circles: after training on</text>
<text x="750.0" y="1097.3" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">its own answers only, for the one matched comparison run that exists. Bands: the range of scores in the supplier's own free answers</text>
<text x="750.0" y="1123.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">on the same items. Values are recomputed directly from each run's raw per-round result file; exact source paths are listed in this</text>
<text x="750.0" y="1148.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="normal" fill="#6b7684">script's header.</text>
